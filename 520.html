                                                        <button 
                                                            className="btn-link"
                                                            style={{ color: 'var(--danger)', marginRight: 10 }}
                                                            onClick={() => deleteSample(idx)}
                                                        >
                                                            删除
                                                        </button>
                                                        <button className="btn-link">
                                                            <Icons.Eye /> 预览
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    
                    {activeTab === 'batch' && (
                        <BatchCalcPage state={state} currentPlatform={currentPlatform} />
                    )}
                    
                    {activeTab === 'history' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.History />
                                        计算记录
                                    </div>
                                    <div className="card-desc">
                                        查看历史计算任务和结果
                                    </div>
                                </div>
                                <Button>
                                    <Icons.Download />
                                    导出记录
                                </Button>
                            </div>
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>平台</th>
                                            <th>店铺数</th>
                                            <th>状态</th>
                                            <th style={{ width: 120 }}>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {calcHistory.length === 0 ? (
                                            <tr>
                                                <td colSpan={5}>
                                                    <div className="empty" style={{ padding: '40px 20px' }}>
                                                        <div className="empty-icon">📋</div>
                                                        <div className="empty-text">暂无计算记录</div>
                                                        <div className="empty-desc">完成批量计算后会在这里显示记录</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            calcHistory.map((item, idx) => (
                                                <tr key={idx}>
                                                    <td>{formatTime(item.time)}</td>
                                                    <td>{item.platform}</td>
                                                    <td>{item.shopCount}</td>
                                                    <td>
                                                        <Tag type={item.status === 'success' ? 'success' : item.status === 'processing' ? 'warning' : 'danger'}>
                                                            {item.status === 'success' ? '成功' : item.status === 'processing' ? '处理中' : '失败'}
                                                        </Tag>
                                                    </td>
                                                    <td>
                                                        <button className="btn-link">
                                                            <Icons.Download /> 下载
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    
                    {activeTab === 'externals' && (
                        <ExternalsPage state={state} currentPlatform={currentPlatform} />
                    )}
                </div>
            );
        };
        
        // ========== Shops Management Page ==========
        const ShopsPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [searchQuery, setSearchQuery] = useState('');
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingShop, setEditingShop] = useState(null);
            const [formData, setFormData] = useState({ name: '', code: '', note: '' });
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const shops = platform?.shops || [];
            
            const handleSave = () => {
                if (!formData.name.trim()) {
                    addToast('warning', '验证失败', '店铺名称不能为空');
                    return;
                }
                
                const shopData = {
                    id: editingShop ? editingShop.id : `shop_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                    name: formData.name.trim(),
                    code: formData.code.trim(),
                    note: formData.note.trim(),
                    createdAt: editingShop ? editingShop.createdAt : new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                
                Store.set(s => ({
                    ...s,
                    platforms: s.platforms.map(p => {
                        if (p.id !== currentPlatform) return p;
                        const existing = p.shops || [];
                        if (editingShop) {
                            return { ...p, shops: existing.map(sh => sh.id === editingShop.id ? shopData : sh) };
                        }
                        return { ...p, shops: [...existing, shopData] };
                    })
                }));
                
                addToast('success', editingShop ? '更新成功' : '添加成功', `店铺「${shopData.name}」已${editingShop ? '更新' : '添加'}`);
                setShowAddModal(false);
                setEditingShop(null);
                setFormData({ name: '', code: '', note: '' });
            };
            
            const handleDelete = (shop) => {
                if (!window.confirm(`确认删除店铺「${shop.name}」？此操作不可撤销。`)) return;
                Store.set(s => ({
                    ...s,
                    platforms: s.platforms.map(p => {
                        if (p.id !== currentPlatform) return p;
                        return { ...p, shops: (p.shops || []).filter(sh => sh.id !== shop.id) };
                    })
                }));
                addToast('success', '删除成功', `店铺「${shop.name}」已删除`);
            };
            
            const openEdit = (shop) => {
                setEditingShop(shop);
                setFormData({ name: shop.name, code: shop.code || '', note: shop.note || '' });
                setShowAddModal(true);
            };
            
            const openAdd = () => {
                setEditingShop(null);
                setFormData({ name: '', code: '', note: '' });
                setShowAddModal(true);
            };
            
            const handleImportFromExcel = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                try {
                    const result = await ExcelUtils.parse(file);
                    const sheet = Object.values(result.sheets)[0];
                    if (!sheet || !sheet.rows.length) {
                        addToast('warning', '导入失败', '文件中未找到数据');
                        return;
                    }
                    const headers = sheet.headers.map(h => String(h).trim());
                    const nameIdx = headers.findIndex(h => /店铺|名称|name|店名/i.test(h));
                    const codeIdx = headers.findIndex(h => /编号|代码|code|ID/i.test(h));
                    const noteIdx = headers.findIndex(h => /备注|说明|note|描述/i.test(h));
                    
                    if (nameIdx === -1) {
                        addToast('warning', '导入失败', '未找到「店铺名称」列，请确保表头包含「店铺名称」或「name」');
                        return;
                    }
                    
                    const imported = [];
                    sheet.rows.forEach(row => {
                        const name = row[headers[nameIdx]];
                        if (name && String(name).trim()) {
                            imported.push({
                                id: `shop_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                                name: String(name).trim(),
                                code: codeIdx >= 0 ? String(row[headers[codeIdx]] || '').trim() : '',
                                note: noteIdx >= 0 ? String(row[headers[noteIdx]] || '').trim() : '',
                                createdAt: new Date().toISOString(),
                                updatedAt: new Date().toISOString()
                            });
                        }
                    });
                    
                    if (imported.length === 0) {
                        addToast('warning', '导入失败', '未找到有效的店铺数据');
                        return;
                    }
                    
                    Store.set(s => ({
                        ...s,
                        platforms: s.platforms.map(p => {
                            if (p.id !== currentPlatform) return p;
                            return { ...p, shops: [...(p.shops || []), ...imported] };
                        })
                    }));
                    
                    addToast('success', '导入成功', `成功导入 ${imported.length} 个店铺`);
                    ActivityLogger.add('批量导入店铺', `${platform?.name} - ${imported.length}个`);
                } catch (err) {
                    addToast('error', '导入失败', err.message);
                }
                e.target.value = '';
            };
            
            const filteredShops = shops.filter(s => 
                s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                (s.code || '').toLowerCase().includes(searchQuery.toLowerCase())
            );
            
            return (
                <div className="fade-in">
                    <div className="card">
                        <div className="card-header">
                            <div>
                                <div className="card-title">
                                    <Icons.Store />
                                    {platform?.name} 店铺管理
                                </div>
                                <div className="card-desc">
                                    管理{platform?.name}下的店铺，用于批量计算时自动分发数据
                                </div>
                            </div>
                            <div style={{ display: 'flex', gap: 10 }}>
                                <Button onClick={() => document.getElementById('shop-import-input')?.click()}>
                                    <Icons.Upload />
                                    Excel导入
                                </Button>
                                <input 
                                    id="shop-import-input"
                                    type="file" 
                                    accept=".xlsx,.xls"
                                    onChange={handleImportFromExcel}
                                    style={{ display: 'none' }}
                                />
                                <Button type="primary" onClick={openAdd}>
                                    <Icons.Plus />
                                    添加店铺
                                </Button>
                            </div>
                        </div>
                        
                        <Alert type="info">
                            <strong>店铺管理：</strong>店铺信息用于批量计算时识别和分发数据。支持手动添加或通过Excel批量导入。
                        </Alert>
                        
                        <div className="search-bar">
                            <span className="search-bar-icon"><Icons.Search /></span>
                            <input 
                                type="text"
                                className="input"
                                placeholder="搜索店铺名称或编号..."
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                        </div>
                        
                        <div className="data-table-container">
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th style={{ width: 60 }}>#</th>
                                        <th>店铺名称</th>
                                        <th>店铺编号</th>
                                        <th>备注</th>
                                        <th>添加时间</th>
                                        <th style={{ width: 140 }}>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredShops.length === 0 ? (
                                        <tr>
                                            <td colSpan={6}>
                                                <div className="empty" style={{ padding: '40px 20px' }}>
                                                    <div className="empty-icon">🏪</div>
                                                    <div className="empty-text">暂无店铺</div>
                                                    <div className="empty-desc">添加店铺或从Excel导入</div>
                                                </div>
                                            </td>
                                        </tr>
                                    ) : (
                                        filteredShops.map((shop, idx) => (
                                            <tr key={shop.id}>
                                                <td style={{ color: 'var(--text-tertiary)', fontSize: 12 }}>{idx + 1}</td>
                                                <td style={{ fontWeight: 500 }}>{shop.name}</td>
                                                <td>
                                                    {shop.code ? (
                                                        <Tag type="default">{shop.code}</Tag>
                                                    ) : (
                                                        <span style={{ color: 'var(--text-quaternary)' }}>-</span>
                                                    )}
                                                </td>
                                                <td style={{ color: 'var(--text-tertiary)', fontSize: 12, maxWidth: 200 }} className="truncate">
                                                    {shop.note || '-'}
                                                </td>
                                                <td style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>
                                                    {new Date(shop.createdAt).toLocaleDateString('zh-CN')}
                                                </td>
                                                <td>
                                                    <div style={{ display: 'flex', gap: 8 }}>
                                                        <button className="btn-link" onClick={() => openEdit(shop)}>
                                                            <Icons.Settings /> 编辑
                                                        </button>
                                                        <button className="btn-link danger" onClick={() => handleDelete(shop)}>
                                                            <Icons.Trash /> 删除
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                        
                        <div style={{ marginTop: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: 'var(--text-tertiary)' }}>
                            <span>共 {shops.length} 个店铺</span>
                            <span>{platform?.name}平台</span>
                        </div>
                    </div>
                    
                    {showAddModal && (
                        <Modal 
                            title={editingShop ? '编辑店铺' : '添加店铺'}
                            onClose={() => { setShowAddModal(false); setEditingShop(null); }}
                            footer={
                                <>
                                    <Button onClick={() => { setShowAddModal(false); setEditingShop(null); }}>
                                        取消
                                    </Button>
                                    <Button type="primary" onClick={handleSave}>
                                        {editingShop ? '保存修改' : '添加店铺'}
                                    </Button>
                                </>
                            }
                        >
                            <div className="form-item">
                                <label className="form-label">店铺名称 <span style={{ color: 'var(--danger)' }}>*</span></label>
                                <input 
                                    type="text"
                                    className="input"
                                    placeholder="如：旗舰店、专营店等"
                                    value={formData.name}
                                    onChange={e => setFormData({ ...formData, name: e.target.value })}
                                    autoFocus
                                />
                            </div>
                            <div className="form-item">
                                <label className="form-label">店铺编号</label>
                                <input 
                                    type="text"
                                    className="input"
                                    placeholder="店铺内部编号（选填）"
                                    value={formData.code}
                                    onChange={e => setFormData({ ...formData, code: e.target.value })}
                                />
                            </div>
                            <div className="form-item">
                                <label className="form-label">备注</label>
                                <textarea 
                                    className="input"
                                    placeholder="备注信息（选填）"
                                    value={formData.note}
                                    onChange={e => setFormData({ ...formData, note: e.target.value })}
                                    rows={3}
                                    style={{ resize: 'vertical' }}
                                />
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };
        
        // ========== Main App ==========
        const App = () => {
            const [state, setState] = useState(Store.get());
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [currentPlatform, setCurrentPlatform] = useState('pdd');
            const [showShortcuts, setShowShortcuts] = useState(true);
            const [versionInfo, setVersionInfo] = useState({ current: '5.0.0', latest: null, hasUpdate: false });
            
            useEffect(() => {
                const unsub = Store.sub(newState => {
                    setState({ ...newState });
                });
                return unsub;
            }, []);
            
            useEffect(() => {
                const checkVersion = async () => {
                    try {
                        const currentVersion = document.querySelector('meta[name="app-version"]')?.content || '5.0.0';
                        const response = await fetch(window.location.href, { cache: 'no-store', method: 'HEAD' });
                        if (!response.ok) return;
                        
                        const text = await fetch(window.location.href, { cache: 'no-store' }).then(r => r.text());
                        const match = text.match(/<meta[^>]*name=["']app-version["'][^>]*content=["']([^"']+)["']/i) 
                            || text.match(/<meta[^>]*content=["']([^"']+)["'][^>]*name=["']app-version["']/i);
                        const latestVersion = match ? match[1] : currentVersion;
                        
                        const parseVer = (v) => v.split('.').map(Number);
                        const cur = parseVer(currentVersion);
                        const lat = parseVer(latestVersion);
                        let hasUpdate = false;
                        for (let i = 0; i < 3; i++) {
                            if (lat[i] > cur[i]) { hasUpdate = true; break; }
                            if (lat[i] < cur[i]) break;
                        }
                        
                        setVersionInfo({ current: currentVersion, latest: latestVersion, hasUpdate });
                    } catch (e) {}
                };
                
                checkVersion();
                const interval = setInterval(checkVersion, 5 * 60 * 1000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch (e.key) {
                            case '1':
                                e.preventDefault();
                                setCurrentPage('dashboard');
                                break;
                            case '2':
                                e.preventDefault();
                                setCurrentPage('template');
                                break;
                            case '3':
                                e.preventDefault();
                                setCurrentPage('rules');
                                break;
                            case '4':
                                e.preventDefault();
                                setCurrentPage('data');
                                break;
                            case 's':
                                e.preventDefault();
                                break;
                        }
                    }
                    if (e.key === 'Escape') {
                        setShowShortcuts(false);
                    }
                };
                
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);
            
            const navItems = [
                { id: 'dashboard', name: '数据概览', icon: <Icons.Home /> },
                { id: 'template', name: '模板中心', icon: <Icons.FileSpreadsheet /> },
                { id: 'rules', name: '计算规则', icon: <Icons.Calculator /> },
                { id: 'data', name: '数据管理', icon: <Icons.Database /> },
                { id: 'shops', name: '店铺管理', icon: <Icons.Store /> }
            ];
            
            const pageTitles = {
                dashboard: { title: '数据概览', subtitle: '查看系统配置和统计信息' },
                template: { title: '模板中心', subtitle: '上传和配置利润表模板' },
                rules: { title: '计算规则', subtitle: '配置字段的计算逻辑' },
                data: { title: '数据管理', subtitle: '管理样表数据和批量计算' },
                shops: { title: '店铺管理', subtitle: '管理各平台下的店铺信息' }
            };
            
            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <DashboardPage state={state} onNavigate={setCurrentPage} />;
                    case 'template':
                        return <TemplatePage state={state} currentPlatform={currentPlatform} />;
                    case 'rules':
                        return <RulesPage state={state} currentPlatform={currentPlatform} />;
                    case 'data':
                        return <DataPage state={state} currentPlatform={currentPlatform} />;
                    case 'shops':
                        return <ShopsPage state={state} currentPlatform={currentPlatform} onNavigate={setCurrentPage} />;
                    default:
                        return <DashboardPage state={state} onNavigate={setCurrentPage} />;
                }
            };
            
            return (
                <div className="app">
                    <aside className="sidebar">
                        <div className="sidebar-logo">
                            <div className="sidebar-logo-icon">￥</div>
                            <div>
                                <div className="sidebar-logo-text">利润计算系统</div>
                                <div className="sidebar-logo-sub">PROFIT CALCULATOR</div>
                            </div>
                        </div>
                        
                        <nav className="sidebar-nav">
                            {navItems.map(item => (
                                <div 
                                    key={item.id}
                                    className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPage(item.id)}
                                >
                                    <span className="nav-icon">{item.icon}</span>
                                    <span>{item.name}</span>
                                </div>
                            ))}
                        </nav>
                        
                        <div className="sidebar-platforms">
                            <div className="platform-label">平台切换</div>
                            {state.platforms.map(platform => (
                                <div 
                                    key={platform.id}
                                    className={`platform-item ${currentPlatform === platform.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPlatform(platform.id)}
                                >
                                    <span>{platform.emoji}</span>
                                    <span>{platform.name}</span>
                                    <span className="platform-badge">{platform.shops.length}店</span>
                                </div>
                            ))}
                        </div>
                    </aside>
                    
                    <main className="main">
                        {versionInfo.hasUpdate && (
                            <div style={{
                                background: 'linear-gradient(90deg, #6366F1, #8B5CF6)',
                                color: 'white',
                                padding: '10px 20px',
                                fontSize: 13,
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'space-between',
                                gap: 12
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <Icons.Sparkles />
                                    <span>发现新版本 <strong>v{versionInfo.latest}</strong>（当前 v{versionInfo.current}），请刷新页面获取最新功能</span>
                                </div>
                                <button 
                                    onClick={() => window.location.reload()}
                                    style={{
                                        background: 'rgba(255,255,255,0.2)',
                                        border: '1px solid rgba(255,255,255,0.4)',
                                        color: 'white',
                                        padding: '4px 14px',
                                        borderRadius: 6,
                                        fontSize: 12,
                                        cursor: 'pointer',
                                        fontWeight: 600
                                    }}
                                >
                                    立即刷新
                                </button>
                            </div>
                        )}
                        <header className="main-header">
                            <div className="main-header-left">
                                <div>
                                    <div className="main-title">
                                        {pageTitles[currentPage]?.title}
                                        <span style={{ 
                                            marginLeft: 12, 
                                            fontSize: 13, 
                                            fontWeight: 500,
                                            color: 'var(--text-tertiary)'
                                        }}>
                                            {state.platforms.find(p => p.id === currentPlatform)?.emoji}
                                            {state.platforms.find(p => p.id === currentPlatform)?.name}
                                        </span>
                                    </div>
                                    <div className="main-subtitle">
                                        {pageTitles[currentPage]?.subtitle}
                                    </div>
                                </div>
                            </div>
                            <div className="main-header-actions">
                                <Button size="sm" onClick={() => {
                                    const data = Store.exportData();
                                    const blob = new Blob([data], { type: 'application/json' });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.download = `profit-config-${new Date().toISOString().slice(0,10)}.json`;
                                    a.click();
                                    URL.revokeObjectURL(url);
                                }}>
                                    <Icons.Download />
                                    导出配置
                                </Button>
                                <Button size="sm" onClick={() => {
                                    const input = document.createElement('input');
                                    input.type = 'file';
                                    input.accept = '.json';
                                    input.onchange = async (e) => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        const text = await file.text();
                                        try {
                                            Store.importData(text);
                                            ActivityLogger.add('导入配置', file.name);
                                        } catch (err) {
                                            alert('导入失败: ' + err.message);
                                        }
                                    };
                                    input.click();
                                }}>
                                    <Icons.Upload />
                                    导入配置
                                </Button>
                            </div>
                        </header>
                        
                        <div className="main-content">
                            {renderPage()}
                        </div>
                    </main>
                    
                    {showShortcuts && (
                        <div className="shortcut-hint" onClick={() => setShowShortcuts(false)}>
                            <span style={{ marginRight: 8 }}>💡</span>
                            快捷键: 
                            <span className="shortcut-key">Ctrl</span>+
                            <span className="shortcut-key">1-4</span> 切换页面
                            <span style={{ marginLeft: 8, color: 'var(--text-quaternary)', fontSize: 11 }}>
                                (点击关闭)
                            </span>
                        </div>
                    )}
                </div>
            );
        };
        
        const Root = () => (
            <ErrorBoundary>
                <ToastProvider>
                    <App />
                </ToastProvider>
            </ErrorBoundary>
        );
        
        ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
    </script>
</body>
</html>
