                            semanticType = 'date';
                            for (const unit of dateUnits) {
                                if (afterText.startsWith(unit)) {
                                    semanticLabel = unit;
                                    break;
                                }
                            }
                        } else if (beforeText && dateUnits.some(u => beforeText.endsWith(u))) {
                            semanticType = 'date';
                            for (const unit of dateUnits) {
                                if (beforeText.endsWith(unit)) {
                                    semanticLabel = unit;
                                    break;
                                }
                            }
                        } else if (groupText.length === 4) {
                            // 4个X且无日期单位 = 店铺名
                            semanticType = 'shop';
                            semanticLabel = '店铺名';
                        } else {
                            semanticLabel = afterText || beforeText || `第${contexts.length + 1}处`;
                        }
                    }
                    
                    contexts.push({
                        groupIndex: contexts.length,
                        groupText,
                        before: beforeText,
                        after: afterText,
                        semanticLabel,
                        semanticType,
                        xCount: groupText.length
                    });
                }
                return contexts;
            },
            
            isTextMarker(str, debugInfo) {
                if (str == null) {
                    if (debugInfo) debugInfo.reason = 'null value';
                    return false;
                }
                const raw = String(str);
                const s = raw.trim();
                if (!s) {
                    if (debugInfo) debugInfo.reason = 'empty string';
                    return false;
                }
                
                const normalized = this.normalizeText(s);
                const xc = this.getXCharClass();
                const xRegex = this.getXCharRegex();
                
                if (!xRegex.test(s)) {
                    if (debugInfo) debugInfo.reason = 'no X chars found';
                    return false;
                }
                
                // 核心规则1：纯X序列 = 店铺名占位（如 xxxx, xx, xxxxxx）
                if (new RegExp('^[' + xc + ']+$').test(normalized) && normalized.length >= 1 && normalized.length <= 20) {
                    if (debugInfo) { debugInfo.reason = '纯X序列(店铺名占位)'; debugInfo.match = 'shop_name'; }
                    return true;
                }
                
                // 核心规则2：X+日期单位 组合 = 日期占位
                // 支持格式：xx年xx月xx日, xx年xx月, xxxx年xx月, xx年xx月xx日
                const datePattern1 = new RegExp('[' + xc + ']{1,6}\\s*年\\s*[' + xc + ']{1,4}\\s*月\\s*[' + xc + ']{0,4}\\s*日?');
                if (datePattern1.test(s)) {
                    if (debugInfo) { debugInfo.reason = '日期占位(X年X月X日)'; debugInfo.match = 'date_full'; }
                    return true;
                }
                
                // 单独年份: xx年, xxxx年
                if (new RegExp('[' + xc + ']{1,6}\\s*年').test(s)) {
                    if (debugInfo) { debugInfo.reason = '日期占位(X年)'; debugInfo.match = 'date_year'; }
                    return true;
                }
                
                // 单独月份: xx月
                if (new RegExp('[' + xc + ']{1,6}\\s*月').test(s)) {
                    if (debugInfo) { debugInfo.reason = '日期占位(X月)'; debugInfo.match = 'date_month'; }
                    return true;
                }
                
                // 单独日期: xx日
                if (new RegExp('[' + xc + ']{1,6}\\s*日').test(s)) {
                    if (debugInfo) { debugInfo.reason = '日期占位(X日)'; debugInfo.match = 'date_day'; }
                    return true;
                }
                
                // 店铺名占位：xxxx店铺, xxx店, xxxx名称
                if (new RegExp('[' + xc + ']{1,20}\\s*(店|店铺|门店|商店|商城|专柜|网点|站点|品牌|铺|名称|名字)$').test(s)) {
                    if (debugInfo) { debugInfo.reason = 'X+店铺单位(店铺名)'; debugInfo.match = 'x_shop_unit'; }
                    return true;
                }
                
                // 标签+X模式：如 "店铺名：xxxx" "日期：xx年xx月"
                if (new RegExp('(店铺|店铺名|店铺名称|店名|门店|门店名|名称|品牌|商家|商铺|商店|店|铺|名|日期|时间|年月|月份|年度)\\s*[：:]\\s*[' + xc + ']{1,20}').test(s)) {
                    if (debugInfo) { debugInfo.reason = '标签+X模式'; debugInfo.match = 'label_x'; }
                    return true;
                }
                
                // 括号内的X
                if (new RegExp('[（(]\\s*[' + xc + ']+\\s*[）)]').test(s)) {
                    if (debugInfo) { debugInfo.reason = '括号内X'; debugInfo.match = 'parens_x'; }
                    return true;
                }
                
                // 中文占位词
                if (/^(某某|待填|占位|填充|示例|空|无|N\/A|n\/a|NA|na|--|—|－|－－)(年|月|日|期|份|店铺|门店|名称|数据|表|单|店|铺)?$/.test(s)) {
                    if (debugInfo) { debugInfo.reason = '中文占位词'; debugInfo.match = 'zh_placeholder'; }
                    return true;
                }
                
                // 日期范围：xx年xx月 ~ xx年xx月
                if (new RegExp('[' + xc + ']{1,6}\\s*年\\s*[' + xc + ']{1,4}\\s*月?\\s*[～~至\\-—]\\s*[' + xc + ']{1,6}\\s*年\\s*[' + xc + ']{1,4}\\s*月?').test(s)) {
                    if (debugInfo) { debugInfo.reason = '日期范围'; debugInfo.match = 'date_range'; }
                    return true;
                }
                
                // 金额占位：¥xxxx 或 xxxx元
                if (new RegExp('^[¥￥$]\\s*[' + xc + ']{1,12}$').test(s)) {
                    if (debugInfo) { debugInfo.reason = '金额占位'; debugInfo.match = 'currency_x'; }
                    return true;
                }
                if (new RegExp('[' + xc + ']{1,12}\\s*(元|块|万|万元)$').test(s)) {
                    if (debugInfo) { debugInfo.reason = 'X+金额单位'; debugInfo.match = 'x_currency'; }
                    return true;
                }
                
                // 高X占比（兜底）- 提高识别率
                const cleaned = s.replace(/[\s\-_—–·.・，,。、；;：:]/g, '');
                const xCount = this.countXChars(cleaned);
                if (cleaned.length >= 2 && xCount >= 1 && xCount / cleaned.length >= 0.3) {
                    if (debugInfo) { debugInfo.reason = '高X占比(兜底)'; debugInfo.match = 'x_ratio'; }
                    return true;
                }
                
                if (debugInfo) debugInfo.reason = 'no match';
                return false;
            },
            
            isNumberMarker(str, debugInfo) {
                if (str == null) return false;
                const s = String(str).trim();
                if (!s) return false;
                
                if (/^0$/.test(s)) { if (debugInfo) debugInfo.match = 'zero'; return true; }
                
                if (/^0\.0+$/.test(s)) { if (debugInfo) debugInfo.match = 'decimal_zero'; return true; }
                
                if (/^[¥￥$€£]?\s*0(\.0+)?$/.test(s)) { if (debugInfo) debugInfo.match = 'currency_zero'; return true; }
                
                if (/^0(\.0+)?%?$/.test(s)) { if (debugInfo) debugInfo.match = 'percent_zero'; return true; }
                
                if (/^[-—–─―一_－‒—―─˗‑‑⁃−—―]+$/.test(s)) { if (debugInfo) debugInfo.match = 'dash'; return true; }
                
                if (/^[（(]\s*(待[填]?|占位|空|无|--|—|－)\s*[）)]$/.test(s)) { if (debugInfo) debugInfo.match = 'parens_placeholder'; return true; }
                
                if (/^[\/／\\＼]$/.test(s)) { if (debugInfo) debugInfo.match = 'slash'; return true; }
                
                if (/^0[,，]?0*\.?0*$/.test(s)) { if (debugInfo) debugInfo.match = 'formatted_zero'; return true; }
                
                if (/^0(\.0+)?%$/.test(s)) { if (debugInfo) debugInfo.match = 'percent'; return true; }
                
                if (/^[¥￥$€£]\s*0(\.0+)?$/.test(s)) { if (debugInfo) debugInfo.match = 'currency'; return true; }
                
                if (/^\s*[0零〇○]+\s*$/.test(s)) { if (debugInfo) debugInfo.match = 'chinese_zero'; return true; }
                
                if (/^\s*(暂无|空值|空|无|NULL|null|Null|none|None|N\/A|n\/a|NA|na)\s*$/.test(s)) { 
                    if (debugInfo) debugInfo.match = 'null_keyword'; return true; 
                }
                
                if (/^\s*0\.00\s*$/.test(s)) { if (debugInfo) debugInfo.match = 'zero_decimal'; return true; }
                
                if (/^\s*￥\s*0\.00\s*$/.test(s)) { if (debugInfo) debugInfo.match = 'rmb_zero'; return true; }
                
                return false;
            },
            
            isMarker(val) {
                return this.isTextMarker(val) || this.isNumberMarker(val);
            },
            
            findMergedCells(worksheet) {
                const merges = [];
                if (!worksheet || !worksheet['!merges']) return merges;
                
                worksheet['!merges'].forEach(m => {
                    merges.push({
                        sRow: m.s.r,
                        sCol: m.s.c,
                        eRow: m.e.r,
                        eCol: m.e.c,
                        value: null
                    });
                });
                
                return merges;
            },
            
            getCellValue(aoa, row, col, mergedCells) {
                if (!aoa[row]) return null;
                
                for (const m of mergedCells) {
                    if (row >= m.sRow && row <= m.eRow && col >= m.sCol && col <= m.eCol) {
                        return aoa[m.sRow]?.[m.sCol] ?? null;
                    }
                }
                
                return aoa[row][col] ?? null;
            },
            
            isMergedCell(row, col, mergedCells) {
                for (const m of mergedCells) {
                    if (row >= m.sRow && row <= m.eRow && col >= m.sCol && col <= m.eCol) {
                        return m;
                    }
                }
                return null;
            },
            
            findFieldName(aoa, rowIdx, colIdx, markerType, mergedCells) {
                const isMarker = (val) => this.isMarker(val);
                const getVal = (r, c) => this.getCellValue(aoa, r, c, mergedCells);
                
                const isValidName = (val) => {
                    if (val == null) return false;
                    const s = String(val).trim();
                    if (!s) return false;
                    if (s.length > 100) return false;
                    if (isMarker(s)) return false;
                    if (/^[\d.,%￥$¥€£]+$/.test(s)) return false;
                    if (/^[^\u4e00-\u9fa5a-zA-Z\d]+$/.test(s)) return false;
                    return true;
                };
                
                let name = '';
                const searchRadius = 60;
                
                for (let i = colIdx - 1; i >= Math.max(0, colIdx - searchRadius); i--) {
                    const val = getVal(rowIdx, i);
                    if (isValidName(val)) {
                        name = String(val).trim();
                        break;
                    }
                }
                
                if (!name) {
                    for (let i = rowIdx - 1; i >= Math.max(0, rowIdx - searchRadius); i--) {
                        const val = getVal(i, colIdx);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    for (let d = 1; d <= searchRadius; d++) {
                        const r = rowIdx - d;
                        const c = colIdx - d;
                        if (r < 0 || c < 0) break;
                        const val = getVal(r, c);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    for (let r = rowIdx - 1; r >= Math.max(0, rowIdx - 25); r--) {
                        for (let c = colIdx; c >= Math.max(0, colIdx - searchRadius); c--) {
                            const val = getVal(r, c);
                            if (isValidName(val)) {
                                name = String(val).trim();
                                break;
                            }
                        }
                        if (name) break;
                    }
                }
                
                if (!name) {
                    for (let d = 1; d <= Math.min(searchRadius, 30); d++) {
                        const r = rowIdx - d;
                        const c = colIdx + d;
                        if (r < 0) break;
                        const rowLen = aoa[r]?.length || 0;
                        if (c >= rowLen) continue;
                        const val = getVal(r, c);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    const rowLen = aoa[rowIdx]?.length || 0;
                    for (let i = colIdx + 1; i < Math.min(rowLen, colIdx + searchRadius); i++) {
                        const val = getVal(rowIdx, i);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    for (let i = rowIdx + 1; i < Math.min(aoa.length, rowIdx + 20); i++) {
                        const val = getVal(i, colIdx);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    for (let d = 1; d <= 25; d++) {
                        const r = rowIdx + d;
                        const c = colIdx - d;
                        if (r >= aoa.length || c < 0) break;
                        const val = getVal(r, c);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    for (let d = 1; d <= 25; d++) {
                        const r = rowIdx + d;
                        const c = colIdx + d;
                        if (r >= aoa.length) break;
                        const rowLen = aoa[r]?.length || 0;
                        if (c >= rowLen) continue;
                        const val = getVal(r, c);
                        if (isValidName(val)) {
                            name = String(val).trim();
                            break;
                        }
                    }
                }
                
                if (!name) {
                    let lastValid = '';
                    for (let i = 0; i < colIdx; i++) {
                        const val = getVal(rowIdx, i);
                        if (isValidName(val)) {
                            lastValid = String(val).trim();
                        }
                    }
                    if (lastValid) name = lastValid;
                }
                
                if (!name) {
                    for (let c = Math.max(0, colIdx - 8); c <= colIdx + 8; c++) {
                        for (let r = Math.max(0, rowIdx - 8); r <= rowIdx + 8; r++) {
                            const val = getVal(r, c);
                            if (isValidName(val) && !isMarker(val)) {
                                const candidate = String(val).trim();
                                if (candidate.length > 0 && candidate.length < 50) {
                                    name = candidate;
                                    break;
                                }
                            }
                        }
                        if (name) break;
                    }
                }
                
                if (!name) {
                    name = `字段_${this.colLetters(colIdx)}${rowIdx + 1}`;
                }
                
                name = name.replace(/[：:]\s*$/, '').trim();
                name = name.replace(/^[：:]/, '').trim();
                name = name.replace(/^[（(]|[）)]$/g, '').trim();
                name = name.replace(/\s+/g, ' ').trim();
                name = name.replace(/[：:]\s*[xX×✕✖ｘＸ✗✘]*\s*$/g, '').trim();
                name = name.replace(/^[xX×✕✖ｘＸ✗✘]+\s*[：:]\s*/, '').trim();
                
                return name;
            },
            
            findFields(aoa, worksheet) {
                const fields = [];
                const usedCells = new Set();
                const mergedCells = this.findMergedCells(worksheet || {});
                const debugInfo = [];
                
                if (!aoa || aoa.length === 0) return { fields, debugInfo, mergedCells };
                
                for (let rowIdx = 0; rowIdx < aoa.length; rowIdx++) {
                    const row = aoa[rowIdx];
                    if (!row) continue;
                    
                    for (let colIdx = 0; colIdx < row.length; colIdx++) {
                        const key = `${rowIdx}_${colIdx}`;
                        if (usedCells.has(key)) continue;
                        
                        const cell = this.getCellValue(aoa, rowIdx, colIdx, mergedCells);
                        
                        const cellDebug = { row: rowIdx, col: colIdx, value: cell, reason: '' };
                        
                        let type = null;
                        let markerMatch = '';
                        
                        const cellDebugObj = { reason: '', match: '' };
                        
                        if (this.isTextMarker(cell, cellDebugObj)) {
                            type = 'text';
                            markerMatch = cellDebugObj.match;
                        } else if (this.isNumberMarker(cell, cellDebugObj)) {
                            type = 'number';
                            markerMatch = cellDebugObj.match;
                        }
                        
                        if (type) {
                            usedCells.add(key);
                            
                            const mergeInfo = this.isMergedCell(rowIdx, colIdx, mergedCells);
                            if (mergeInfo) {
                                for (let r = mergeInfo.sRow; r <= mergeInfo.eRow; r++) {
                                    for (let c = mergeInfo.sCol; c <= mergeInfo.eCol; c++) {
                                        usedCells.add(`${r}_${c}`);
                                    }
                                }
                            }
                            
                            const baseName = this.findFieldName(aoa, rowIdx, colIdx, type, mergedCells);
                            
                            if (type === 'text') {
                                // 按X分组识别：xxxx = 1个字段(店铺名), xx年xx月xx日 = 3个字段(年/月/日)
                                const groupCount = this.countXGroups(cell);
                                if (groupCount > 1) {
                                    const contexts = this.extractXGroupContexts(cell);
                                    contexts.forEach((ctx, gi) => {
                                        const suffix = ctx.semanticLabel || ctx.after || ctx.before || `第${gi + 1}处`;
                                        const fieldName = baseName + '_' + suffix.replace(/[：:]/g, '');
                                        fields.push({
                                            id: `f_${rowIdx}_${colIdx}_g${gi}`,
                                            name: fieldName,
                                            cell: `${this.colLetters(colIdx)}${rowIdx + 1}`,
                                            row: rowIdx,
                                            col: colIdx,
                                            type,
                                            originalValue: cell,
                                            markerMatch,
                                            groupIndex: gi,
                                            groupCount,
                                            groupContext: ctx,
                                            semanticType: ctx.semanticType || 'unknown',
                                            isMerged: !!mergeInfo,
                                            mergeInfo: mergeInfo ? {
                                                startRow: mergeInfo.sRow,
                                                startCol: mergeInfo.sCol,
                                                endRow: mergeInfo.eRow,
                                                endCol: mergeInfo.eCol
                                            } : null
                                        });
                                        
                                        debugInfo.push({
                                            row: rowIdx,
                                            col: colIdx,
                                            cell: `${this.colLetters(colIdx)}${rowIdx + 1}`,
                                            value: cell,
                                            type,
                                            match: markerMatch,
                                            fieldName,
                                            groupIndex: gi,
                                            groupCount,
                                            groupContext: ctx,
                                            isMerged: !!mergeInfo
                                        });
                                    });
                                } else {
                                    const ctx = this.extractXGroupContexts(cell)[0] || {};
                                    fields.push({
                                        id: `f_${rowIdx}_${colIdx}`,
                                        name: baseName,
                                        cell: `${this.colLetters(colIdx)}${rowIdx + 1}`,
                                        row: rowIdx,
                                        col: colIdx,
                                        type,
                                        originalValue: cell,
                                        markerMatch,
                                        groupIndex: 0,
                                        groupCount: 1,
                                        semanticType: ctx.semanticType || 'shop',
                                        isMerged: !!mergeInfo,
                                        mergeInfo: mergeInfo ? {
                                            startRow: mergeInfo.sRow,
                                            startCol: mergeInfo.sCol,
                                            endRow: mergeInfo.eRow,
                                            endCol: mergeInfo.eCol
                                        } : null
                                    });
                                    
                                    debugInfo.push({
                                        row: rowIdx,
                                        col: colIdx,
                                        cell: `${this.colLetters(colIdx)}${rowIdx + 1}`,
                                        value: cell,
                                        type,
                                        match: markerMatch,
                                        fieldName: baseName,
                                        isMerged: !!mergeInfo
                                    });
                                }
                            } else {
                                fields.push({
                                    id: `f_${rowIdx}_${colIdx}`,
                                    name: baseName,
                                    cell: `${this.colLetters(colIdx)}${rowIdx + 1}`,
                                    row: rowIdx,
                                    col: colIdx,
                                    type,
                                    originalValue: cell,
                                    markerMatch,
                                    isMerged: !!mergeInfo,
                                    mergeInfo: mergeInfo ? {
                                        startRow: mergeInfo.sRow,
                                        startCol: mergeInfo.sCol,
                                        endRow: mergeInfo.eRow,
                                        endCol: mergeInfo.eCol
                                    } : null
                                });
                                
                                debugInfo.push({
                                    row: rowIdx,
                                    col: colIdx,
                                    cell: `${this.colLetters(colIdx)}${rowIdx + 1}`,
                                    value: cell,
                                    type,
                                    match: markerMatch,
                                    fieldName: baseName,
                                    isMerged: !!mergeInfo
                                });
                            }
                        }
                    }
                }
                
                return {
                    fields: fields.sort((a, b) => a.row - b.row || a.col - b.col),
                    debugInfo,
                    mergedCells
                };
            }
        };
        
        // ========== Calculation Engine (Enhanced v7) ==========
        const CalcEngine = {
            extractDateFromFileName(fileName) {
                if (!fileName) return null;
                const name = fileName.toLowerCase();
                const patterns = [
                    /(\d{4})[\-_年](\d{1,2})[\-_月](\d{1,2})?[\-_日]?/,
                    /(\d{4})(\d{2})(\d{2})/,
                    /(\d{4})[\-_年](\d{1,2})[\-_月]/,
                    /(\d{4})[\-_](\d{1,2})/
                ];
                for (const pattern of patterns) {
                    const match = name.match(pattern);
                    if (match) {
                        const year = parseInt(match[1], 10);
                        const month = Math.min(12, Math.max(1, parseInt(match[2], 10)));
                        const day = match[3] ? Math.min(31, Math.max(1, parseInt(match[3], 10))) : null;
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12) {
                            return { year, month, day };
                        }
                    }
                }
                return null;
            },
            
            extractDateFromData(tables) {
                for (const table of tables) {
                    if (table.rows && table.rows.length > 0) {
                        for (const row of table.rows.slice(0, 100)) {
                            for (const val of Object.values(row)) {
                                if (val instanceof Date) {
                                    return { year: val.getFullYear(), month: val.getMonth() + 1, day: val.getDate() };
                                }
                                const str = String(val || '');
                                const datePatterns = [
                                    /(\d{4})[\-_年](\d{1,2})[\-_月](\d{1,2})[\-_日]?/,
                                    /(\d{4})[\-/](\d{1,2})[\-/](\d{1,2})/,
                                    /(\d{4})(\d{2})(\d{2})/
                                ];
                                for (const pattern of datePatterns) {
                                    const match = str.match(pattern);
                                    if (match) {
                                        const year = parseInt(match[1], 10);
                                        const month = Math.min(12, Math.max(1, parseInt(match[2], 10)));
                                        const day = Math.min(31, Math.max(1, parseInt(match[3], 10)));
                                        if (year >= 2000 && year <= 2100) {
                                            return { year, month, day };
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                return null;
            },
            
            exec(rule, tables, context = {}) {
                if (!rule || !rule.steps || rule.steps.length === 0) return null;
                
                let data = [];
                const stepResults = [];
                const externals = context.externals || [];
                
                let dataDate = null;
                const fileName = context.fileName || context.originalName || '';
                if (fileName) {
                    dataDate = this.extractDateFromFileName(fileName);
                }
                if (!dataDate && tables && tables.length > 0) {
                    dataDate = this.extractDateFromData(tables);
                }
                if (!dataDate) {
                    const now = new Date();
                    dataDate = { year: now.getFullYear(), month: now.getMonth() + 1, day: now.getDate() };
                }
                
                for (let stepIdx = 0; stepIdx < rule.steps.length; stepIdx++) {
                    const step = rule.steps[stepIdx];
                    try {
                        switch (step.type) {
                            case 'fill': {
                                const cfg = step.config || {};
                                let fillValue = '';
                                
                                if (cfg.fillType === 'manual') {
                                    fillValue = String(cfg.value ?? '');
                                } else if (cfg.fillType === 'date') {
                                    const y = dataDate.year;
                                    const m = String(dataDate.month).padStart(2, '0');
                                    const d = dataDate.day ? String(dataDate.day).padStart(2, '0') : '01';
                                    switch (cfg.dateFormat) {
                                        case 'yyyy': fillValue = String(y); break;
                                        case 'mm': fillValue = m; break;
                                        case 'dd': fillValue = d; break;
                                        case 'yyyy-mm': fillValue = `${y}年${m}月`; break;
                                        case 'yyyy-mm-dd': fillValue = `${y}年${m}月${d}日`; break;
                                        case 'mm-dd': fillValue = `${m}月${d}日`; break;
                                        default: fillValue = `${y}年${m}月`;
                                    }
                                } else if (cfg.fillType === 'field' && cfg.sourceField) {
                                    if (data.length > 0) {
                                        fillValue = String(data[0][cfg.sourceField] ?? data[0].val ?? '');
                                    }
                                } else if (cfg.fillType === 'shop') {
                                    fillValue = String(cfg.value || context.shopName || '');
                                } else {
                                    if (context.fieldSemanticType === 'shop') {
                                        fillValue = String(cfg.value || context.shopName || '');
                                    } else if (context.fieldSemanticType === 'date') {
                                        const y = dataDate.year;
                                        const m = String(dataDate.month).padStart(2, '0');
                                        fillValue = `${y}年${m}月`;
                                    } else {
                                        fillValue = String(cfg.value ?? '');
                                    }
                                }
                                
                                data = [{ val: fillValue }];
                                break;
                            }
                            case 'source': {
                                const table = tables.find(t => t.id === step.config.table);
                                if (table) {
                                    if (step.config.column) {
                                        data = table.rows.map(r => ({ val: r[step.config.column] }));
                                    } else {
                                        data = table.rows.map(r => ({ ...r }));
                                    }
                                }
                                break;
                            }
                            case 'filter': {
                                if (!step.config.column) break;
                                data = data.filter(row => {
                                    const val = row[step.config.column] ?? row.val;
                                    const target = step.config.value;
                                    const v = val != null ? String(val) : '';
                                    const t = String(target ?? '');
                                    
                                    switch (step.config.op) {
                                        case '==': return v === t;
                                        case '!=': return v !== t;
                                        case '>': return Number(val) > Number(target);
                                        case '<': return Number(val) < Number(target);
                                        case '>=': return Number(val) >= Number(target);
                                        case '<=': return Number(val) <= Number(target);
                                        case 'contains': return v.includes(t);
                                        case 'notContains': return !v.includes(t);
                                        case 'startsWith': return v.startsWith(t);
                                        case 'endsWith': return v.endsWith(t);
                                        case 'isEmpty': return !v;
                                        case 'notEmpty': return !!v;
                                        case 'regex': {
                                            try { return new RegExp(t).test(v); } catch { return true; }
                                        }
                                        default: return true;
                                    }
                                });
                                break;
                            }
                            case 'virtual': {
                                if (!step.config.source || !step.config.target) break;
                                data = data.map(row => {
                                    const src = row[step.config.source] ?? row.val;
                                    let result = src;
                                    
                                    switch (step.config.rule) {
                                        case 'copy': result = src; break;
                                        case 'parseQty': {
                                            let qty = 1;
                                            const s = String(src || '');
                                            const patterns = [
                                                /×(\d+)/g, /\*(\d+)/g, /[Xx](\d+)/g,
                                                /(\d+)件/g, /(\d+)条/g, /(\d+)个/g, /(\d+)套/g,
                                                /(\d+)份/g, /(\d+)盒/g, /(\d+)瓶/g, /(\d+)袋/g,
                                                /\((\d+)\)/g, /（(\d+)）/g
                                            ];
                                            for (const pat of patterns) {
                                                const m = s.match(pat);
                                                if (m) {
                                                    const n = s.match(/(\d+)/);
                                                    qty = n ? Number(n[1]) : 1;
                                                    break;
                                                }
                                            }
                                            result = qty;
                                            break;
                                        }
                                        case 'splitPlus': {
                                            const s = String(src || '');
                                            result = (s.match(/\+/g) || []).length + 1;
                                            break;
                                        }
                                        case 'toNumber': {
                                            const n = Number(String(src).replace(/[,，]/g, '').replace(/[¥￥$€£]/g, ''));
                                            result = isNaN(n) ? 0 : n;
                                            break;
                                        }
                                        case 'toString': result = String(src ?? ''); break;
                                        case 'trim': result = String(src ?? '').trim(); break;
                                        case 'abs': result = Math.abs(Number(src) || 0); break;
                                        case 'round': result = Math.round(Number(src) || 0); break;
                                        case 'floor': result = Math.floor(Number(src) || 0); break;
                                        case 'ceil': result = Math.ceil(Number(src) || 0); break;
                                        case 'toFixed2': result = Number((Number(src) || 0).toFixed(2)); break;
                                        case 'percent': {
                                            result = (Number(src) || 0) / 100;
                                            break;
                                        }
                                        case 'substring': {
                                            const s = String(src ?? '');
                                            const start = Number(step.config.start) || 0;
                                            const len = step.config.length ? Number(step.config.length) : undefined;
                                            result = len !== undefined ? s.substr(start, len) : s.substr(start);
                                            break;
                                        }
                                        case 'replace': {
                                            const s = String(src ?? '');
                                            try {
                                                result = s.replace(new RegExp(step.config.pattern || '', 'g'), step.config.replacement || '');
                                            } catch { result = s; }
                                            break;
                                        }
                                        case 'concat': {
                                            const s = String(src ?? '');
                                            result = (step.config.prefix || '') + s + (step.config.suffix || '');
                                            break;
                                        }
                                        case 'toLowerCase': result = String(src ?? '').toLowerCase(); break;
                                        case 'toUpperCase': result = String(src ?? '').toUpperCase(); break;
                                        case 'length': result = String(src ?? '').length; break;
                                        case 'formatMoney': {
                                            const n = Number(src) || 0;
                                            result = n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                                            break;
                                        }
                                        case 'parsePercent': {
                                            const s = String(src || '').replace('%', '');
                                            result = Number(s) / 100 || 0;
                                            break;
                                        }
                                        case 'ifEmpty': {
                                            const s = String(src ?? '');
                                            result = s || (step.config.defaultValue ?? '');
                                            break;
                                        }
                                        default: result = src;
                                    }
                                    
                                    return { ...row, [step.config.target]: result };
                                });
                                break;
                            }
                            case 'join': {
                                let joinRows = null;
                                const joinTable = tables.find(t => t.id === step.config.table);
                                if (joinTable) {
                                    joinRows = joinTable.rows;
                                } else if (step.config.externalId) {
                                    const ext = externals.find(e => e.id === step.config.externalId || e.sheetKey === step.config.externalId);
                                    if (ext) joinRows = ext.allData || ext.data || [];
                                }
                                if (joinRows && step.config.key && step.config.fk && step.config.col) {
                                    const lookup = {};
                                    joinRows.forEach(r => {
                                        lookup[r[step.config.fk]] = r;
                                    });
                                    data = data.map(row => {
                                        const keyVal = row[step.config.key];
                                        const joined = lookup[keyVal];
                                        if (joined) {
                                            return { ...row, [step.config.col]: joined[step.config.col] };
                                        }
                                        return row;
                                    });
                                }
                                break;
                            }
                            case 'aggregate': {
                                if (data.length === 0) { data = [{ val: 0 }]; break; }
                                const values = data.map(r => {
                                    const v = step.config.column ? r[step.config.column] : r.val;
                                    const n = Number(String(v).replace(/[,，]/g, '').replace(/[¥￥$€£]/g, ''));
                                    return isNaN(n) ? 0 : n;
                                });
                                
                                let result = 0;
                                switch (step.config.func) {
                                    case 'sum': result = values.reduce((a, b) => a + b, 0); break;
                                    case 'avg': result = values.reduce((a, b) => a + b, 0) / values.length; break;
                                    case 'count': result = data.length; break;
                                    case 'countDistinct': {
                                        const key = step.config.column || 'val';
                                        result = new Set(data.map(r => r[key])).size; 
                                        break;
                                    }
                                    case 'max': result = Math.max(...values); break;
                                    case 'min': result = Math.min(...values); break;
                                    case 'median': {
                                        const sorted = [...values].sort((a, b) => a - b);
                                        const mid = Math.floor(sorted.length / 2);
                                        result = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
                                        break;
                                    }
                                    case 'product': result = values.reduce((a, b) => a * b, 1); break;
                                    case 'first': result = values[0] || 0; break;
                                    case 'last': result = values[values.length - 1] || 0; break;
                                    case 'sumAbs': result = values.reduce((a, b) => a + Math.abs(b), 0); break;
                                    case 'stddev': {
                                        const avg = values.reduce((a, b) => a + b, 0) / values.length;
                                        const squareDiffs = values.map(v => Math.pow(v - avg, 2));
                                        const avgSquareDiff = squareDiffs.reduce((a, b) => a + b, 0) / values.length;
                                        result = Math.sqrt(avgSquareDiff);
                                        break;
                                    }
                                    case 'mode': {
                                        const freq = {};
                                        values.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
                                        let maxFreq = 0;
                                        let modeVal = 0;
                                        Object.entries(freq).forEach(([v, f]) => {
                                            if (f > maxFreq) { maxFreq = f; modeVal = Number(v); }
                                        });
                                        result = modeVal;
                                        break;
                                    }
                                    case 'variance': {
                                        const avg = values.reduce((a, b) => a + b, 0) / values.length;
                                        const squareDiffs = values.map(v => Math.pow(v - avg, 2));
                                        result = squareDiffs.reduce((a, b) => a + b, 0) / values.length;
                                        break;
                                    }
                                    default: result = values.reduce((a, b) => a + b, 0);
                                }
                                data = [{ val: result }];
                                break;
                            }
                            case 'formula': {
                                if (!step.config.expr || data.length === 0) break;
                                const row = data[0];
                                let expr = step.config.expr;
                                
                                Object.keys(row).forEach(k => {
                                    const v = Number(String(row[k]).replace(/[,，]/g, '').replace(/[¥￥$€£]/g, '')) || 0;
                                    const safeKey = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                    expr = expr.replace(new RegExp(`\\$\\{${safeKey}\\}`, 'g'), v);
                                });
                                
                                Object.keys(row).forEach(k => {
                                    const v = Number(String(row[k]).replace(/[,，]/g, '').replace(/[¥￥$€£]/g, '')) || 0;
                                    const safeKey = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                    expr = expr.replace(new RegExp(`\\{${safeKey}\\}`, 'g'), v);
                                });
                                
                                if (context.savedFieldValues) {
                                    Object.keys(context.savedFieldValues).forEach(k => {
                                        const v = Number(String(context.savedFieldValues[k]).replace(/[,，]/g, '').replace(/[¥￥$€£]/g, '')) || 0;
                                        const safeKey = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                        expr = expr.replace(new RegExp(`\\{${safeKey}\\}`, 'g'), v);
                                        expr = expr.replace(new RegExp(`\\$\\{${safeKey}\\}`, 'g'), v);
                                    });
                                }
                                
                                try {
                                    const val = Function(`"use strict"; 
                                        const Math = window.Math;
                                        return (${expr})
                                    `)();
                                    data = [{ val: Number(val) || 0 }];
                                } catch (e) {
                                    console.error('Formula error:', e);
                                    data = [{ val: 0, error: e.message }];
                                }
                                break;
                            }
                            case 'constant': {
                                const val = step.config.value;
                                const numVal = Number(val);
                                data = [{ val: isNaN(numVal) ? val : numVal }];
                                break;
                            }
                            case 'text': {
                                let result = step.config.value || '';
                                Object.keys(context).forEach(k => {
                                    result = result.replace(new RegExp(`\\{${k}\\}`, 'g'), context[k] || '');
                                });
                                if (data.length > 0) {
                                    const row = data[0];
                                    Object.keys(row).forEach(k => {
                                        result = result.replace(new RegExp(`\\{${k}\\}`, 'g'), row[k] ?? '');
                                    });
                                }
                                data = [{ val: result }];
                                break;
                            }
                            case 'distinct': {
                                const key = step.config.column || 'val';
                                const seen = new Set();
                                data = data.filter(row => {
                                    const v = row[key];
                                    if (seen.has(v)) return false;
                                    seen.add(v);
                                    return true;
                                });
                                break;
                            }
                            case 'sort': {
                                const key = step.config.column || 'val';
                                const dir = step.config.direction || 'asc';
                                data = [...data].sort((a, b) => {
                                    const av = a[key], bv = b[key];
                                    const an = Number(av), bn = Number(bv);
                                    if (!isNaN(an) && !isNaN(bn)) {
                                        return dir === 'desc' ? bn - an : an - bn;
                                    }
                                    return dir === 'desc' ? String(bv).localeCompare(String(av)) : String(av).localeCompare(String(bv));
                                });
                                break;
                            }
                            case 'limit': {
                                const n = Number(step.config.count) || 100;
                                data = data.slice(0, n);
                                break;
                            }
                            case 'lookup': {
                                const lookupMap = {};
                                (step.config.pairs || []).forEach(p => { lookupMap[p.from] = p.to; });
                                const key = step.config.column || 'val';
                                data = data.map(row => ({ ...row, [key]: lookupMap[row[key]] !== undefined ? lookupMap[row[key]] : row[key] }));
                                break;
                            }
                            case 'condition': {
                                data = data.map(row => {
                                    const col = step.config.column || 'val';
                                    const val = row[col];
                                    let match = false;
                                    const target = step.config.value;
                                    const v = val != null ? String(val) : '';
                                    const t = String(target ?? '');
                                    switch (step.config.op) {
                                        case '==': match = v === t; break;
                                        case '!=': match = v !== t; break;
                                        case '>': match = Number(val) > Number(target); break;
                                        case '<': match = Number(val) < Number(target); break;
                                        case '>=': match = Number(val) >= Number(target); break;
                                        case '<=': match = Number(val) <= Number(target); break;
                                        case 'contains': match = v.includes(t); break;
                                        default: match = true;
                                    }
                                    return { ...row, [step.config.resultCol || 'condition_result']: match ? (step.config.trueValue ?? 1) : (step.config.falseValue ?? 0) };
                                });
                                break;
                            }
                            case 'group': {
                                const key = step.config.column;
                                if (!key) break;
                                const groups = {};
                                data.forEach(row => {
                                    const gk = row[key];
                                    if (!groups[gk]) groups[gk] = [];
                                    groups[gk].push(row);
                                });
                                const func = step.config.func || 'sum';
                                const aggCol = step.config.aggColumn || 'val';
                                data = Object.entries(groups).map(([gk, rows]) => {
                                    const values = rows.map(r => {
                                        const n = Number(String(r[aggCol]).replace(/[,，]/g, '').replace(/[¥￥$€£]/g, ''));
                                        return isNaN(n) ? 0 : n;
                                    });
                                    let result = 0;
                                    switch (func) {
                                        case 'sum': result = values.reduce((a, b) => a + b, 0); break;
                                        case 'avg': result = values.reduce((a, b) => a + b, 0) / values.length; break;
                                        case 'count': result = rows.length; break;
                                        case 'max': result = Math.max(...values); break;
                                        case 'min': result = Math.min(...values); break;
                                        default: result = values.reduce((a, b) => a + b, 0);
                                    }
                                    return { [key]: gk, [aggCol]: result, _groupCount: rows.length };
                                });
                                break;
                            }
                        }
                        
                        stepResults.push({
                            step: stepIdx,
                            type: step.type,
                            rows: data.length,
                            preview: data.slice(0, 5)
                        });
                        
                    } catch (e) {
                        console.error(`Step ${stepIdx} error:`, e);
                        stepResults.push({
                            step: stepIdx,
                            type: step.type,
                            error: e.message,
                            rows: data.length,
                            preview: data.slice(0, 3)
                        });
                    }
                }
                
                if (data.length > 0) {
                    return {
                        value: data[0].val !== undefined ? data[0].val : data[0],
                        data,
                        stepResults,
                        error: data[0]?.error
                    };
                }
                return { value: null, data: [], stepResults };
            },
