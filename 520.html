            );
        };
        
        // ========== Calculation History Page ==========
        const CalcHistoryPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [confirmDialog, setConfirmDialog] = useState(null);
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const calcHistory = state.calcHistory || [];
            const template = state.templates[currentPlatform];
            
            const formatTime = (isoString) => {
                const d = new Date(isoString);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            };
            
            const downloadHistoryEntry = (entry) => {
                if (!template) {
                    addToast('warning', '下载失败', '缺少利润表模板');
                    return;
                }
                const fields = template.parseResult?.fields || [];
                const aoa = [fields.map(f => f.name)];
                
                entry.results.filter(r => r.status === 'success').forEach(r => {
                    const row = fields.map(f => {
                        const v = r.values[f.id];
                        if (v === null || v === undefined) return '';
                        if (typeof v === 'object' && v.val !== undefined) return v.val;
                        return v;
                    });
                    aoa.push(row);
                });
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(aoa);
                XLSX.utils.book_append_sheet(wb, ws, '利润表');
                const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                ExcelUtils.download(buf, `利润表_${platform?.name}_${formatTime(entry.time).replace(/:/g, '-')}.xlsx`);
                addToast('success', '下载成功', '利润表已生成');
            };
            
            const exportAllHistory = () => {
                if (!template || calcHistory.length === 0) {
                    addToast('warning', '导出失败', '缺少模板或暂无记录');
                    return;
                }
                const fields = template.parseResult?.fields || [];
                const wb = XLSX.utils.book_new();
                
                calcHistory.forEach((entry, idx) => {
                    const aoa = [fields.map(f => f.name)];
                    entry.results.filter(r => r.status === 'success').forEach(r => {
                        const row = fields.map(f => {
                            const v = r.values[f.id];
                            if (v === null || v === undefined) return '';
                            if (typeof v === 'object' && v.val !== undefined) return v.val;
                            return v;
                        });
                        aoa.push(row);
                    });
                    const ws = XLSX.utils.aoa_to_sheet(aoa);
                    XLSX.utils.book_append_sheet(wb, ws, `记录${idx + 1}_${formatTime(entry.time).slice(5, 16)}`);
                });
                
                const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                ExcelUtils.download(buf, `利润表_全部记录_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
                addToast('success', '导出成功', '所有计算记录已导出');
            };
            
            const deleteHistoryEntry = (entryId) => {
                setConfirmDialog({
                    title: '确认删除记录',
                    message: '确认删除此计算记录？此操作不可撤销。',
                    type: 'danger',
                    onConfirm: () => {
                        Store.set(s => ({
                            ...s,
                            calcHistory: (s.calcHistory || []).filter(h => h.id !== entryId)
                        }));
                        addToast('success', '删除成功', '计算记录已删除');
                        setConfirmDialog(null);
                    },
                    onCancel: () => setConfirmDialog(null)
                });
            };
            
            return (
                <div className="card">
                    <div className="card-header">
                        <div>
                            <div className="card-title">
                                <Icons.History />
                                计算记录
                            </div>
                            <div className="card-desc">
                                查看历史计算任务和结果
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 10 }}>
                            {calcHistory.length > 0 && (
                                <Button onClick={exportAllHistory}>
                                    <Icons.Download />
                                    导出全部记录
                                </Button>
                            )}
                        </div>
                    </div>
                    
                    <div className="data-table-container">
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>平台</th>
                                    <th>店铺数</th>
                                    <th>成功数</th>
                                    <th>状态</th>
                                    <th style={{ width: 180 }}>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {calcHistory.length === 0 ? (
                                    <tr>
                                        <td colSpan={6}>
                                            <div className="empty" style={{ padding: '40px 20px' }}>
                                                <div className="empty-icon">📋</div>
                                                <div className="empty-text">暂无计算记录</div>
                                                <div className="empty-desc">完成批量计算后会在这里显示记录</div>
                                            </div>
                                        </td>
                                    </tr>
                                ) : (
                                    calcHistory.map((item) => (
                                        <tr key={item.id}>
                                            <td>{formatTime(item.time)}</td>
                                            <td>{item.platform}</td>
                                            <td>{item.shopCount}</td>
                                            <td>{item.successCount}</td>
                                            <td>
                                                <Tag type={item.status === 'success' ? 'success' : item.status === 'processing' ? 'warning' : 'danger'}>
                                                    {item.status === 'success' ? '成功' : item.status === 'processing' ? '处理中' : '部分成功'}
                                                </Tag>
                                            </td>
                                            <td>
                                                <button className="btn-link" onClick={() => downloadHistoryEntry(item)}>
                                                    <Icons.Download /> 下载
                                                </button>
                                                <button className="btn-link danger" onClick={() => deleteHistoryEntry(item.id)}>
                                                    <Icons.Trash /> 删除
                                                </button>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                    
                    {confirmDialog && (
                        <ConfirmModal
                            title={confirmDialog.title}
                            message={confirmDialog.message}
                            type={confirmDialog.type}
                            onConfirm={confirmDialog.onConfirm}
                            onCancel={confirmDialog.onCancel}
                        />
                    )}
                </div>
            );
        };
        
        // ========== Data Management Page ==========
        const DataPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [activeTab, setActiveTab] = useState('samples');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedItems, setSelectedItems] = useState(new Set());
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const samples = state.samples[currentPlatform] || [];
            const calcHistory = state.calcHistory || [];
            
            const tabs = [
                { id: 'samples', name: '样表管理', icon: <Icons.FileSpreadsheet /> },
                { id: 'externals', name: '外部数据', icon: <Icons.Database /> }
            ];
            
            const [aliasInput, setAliasInput] = useState('');
            const [pendingFiles, setPendingFiles] = useState(null);
            const [editAliasIdx, setEditAliasIdx] = useState(null);
            const [editAliasValue, setEditAliasValue] = useState('');
            const [previewSample, setPreviewSample] = useState(null);
            const [previewSheet, setPreviewSheet] = useState('');
            const [previewColumns, setPreviewColumns] = useState([]);
            
            const handleSampleUpload = async (e) => {
                const fileList = e.target.files;
                if (!fileList || fileList.length === 0) return;
                const files = Array.from(fileList);
                e.target.value = '';
                
                // 如果只上传1个文件，弹窗让用户输入备注名
                if (files.length === 1) {
                    const file = files[0];
                    const defaultAlias = file.name.replace(/\.(xlsx|xls|csv|zip)$/i, '');
                    setAliasInput(defaultAlias);
                    setPendingFiles([file]);
                    return;
                }
                
                // 多个文件直接上传，用文件名作为备注
                setIsUploading(true);
                setUploadProgress(0);
                
                try {
                    const newSamples = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const result = await ExcelUtils.parse(file, (p) => {
                            setUploadProgress(Math.round(((i + p / 100) / files.length) * 100));
                        });
                        result.alias = file.name.replace(/\.(xlsx|xls|csv|zip)$/i, '');
                        ExcelUtils.stripForStorage(result);
                        newSamples.push(result);
                    }
                    
                    Store.set(s => ({
                        ...s,
                        samples: {
                            ...s.samples,
                            [currentPlatform]: [...(s.samples[currentPlatform] || []), ...newSamples]
                        }
                    }));
                    
                    addToast('success', '上传成功', `成功上传 ${newSamples.length} 个样表文件`);
                    ActivityLogger.add('上传样表', `${platform?.name} - ${newSamples.length}个文件`);
                } catch (err) {
                    addToast('error', '上传失败', err.message);
                } finally {
                    setIsUploading(false);
                    setUploadProgress(0);
                }
            };
            
            const confirmAliasUpload = async () => {
                if (!pendingFiles || pendingFiles.length === 0) return;
                const filesToUpload = [...pendingFiles];
                setIsUploading(true);
                setUploadProgress(0);
                try {
                    const newSamples = [];
                    for (let i = 0; i < filesToUpload.length; i++) {
                        const file = filesToUpload[i];
                        const result = await ExcelUtils.parse(file, (p) => {
                            setUploadProgress(p);
                        });
                        result.alias = aliasInput.trim() || file.name.replace(/\.(xlsx|xls|csv|zip)$/i, '');
                        ExcelUtils.stripForStorage(result);
                        newSamples.push(result);
                    }
                    Store.set(s => ({
                        ...s,
                        samples: {
                            ...s.samples,
                            [currentPlatform]: [...(s.samples[currentPlatform] || []), ...newSamples]
                        }
                    }));
                    addToast('success', '上传成功', `样表「${newSamples[0].alias}」已上传`);
                    ActivityLogger.add('上传样表', `${platform?.name} - ${newSamples[0].alias}`);
                } catch (err) {
                    addToast('error', '上传失败', err.message);
                } finally {
                    setIsUploading(false);
                    setUploadProgress(0);
                    setPendingFiles(null);
                    setAliasInput('');
                }
            };
            
            const updateSampleAlias = (index, newAlias) => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].map((sample, i) =>
                            i === index ? { ...sample, alias: newAlias } : sample
                        )
                    }
                }));
            };
            
            const deleteSample = (index) => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].filter((_, i) => i !== index)
                    }
                }));
                addToast('success', '删除成功', '样表已删除');
            };
            
            const deleteSelected = () => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].filter((_, i) => !selectedItems.has(i))
                    }
                }));
                setSelectedItems(new Set());
                addToast('success', '批量删除', `已删除 ${selectedItems.size} 个文件`);
            };
            
            const toggleSelect = (index) => {
                const newSet = new Set(selectedItems);
                if (newSet.has(index)) {
                    newSet.delete(index);
                } else {
                    newSet.add(index);
                }
                setSelectedItems(newSet);
            };
            
            const toggleSelectAll = () => {
                if (selectedItems.size === samples.length) {
                    setSelectedItems(new Set());
                } else {
                    setSelectedItems(new Set(samples.map((_, i) => i)));
                }
            };
            
            const filteredSamples = samples.filter(s => 
                s.fileName.toLowerCase().includes(searchQuery.toLowerCase()) ||
                (s.alias || '').toLowerCase().includes(searchQuery.toLowerCase())
            );
            
            const formatTime = (isoString) => {
                return new Date(isoString).toLocaleString('zh-CN');
            };
            
            return (
                <div className="fade-in">
                    <div className="dm-tabs">
                        {tabs.map(tab => (
                            <div 
                                key={tab.id}
                                className={`dm-tab ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                    {tab.icon}
                                    {tab.name}
                                </span>
                            </div>
                        ))}
                    </div>
                    
                    {activeTab === 'samples' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.FileSpreadsheet />
                                        样表管理
                                    </div>
                                    <div className="card-desc">
                                        上传样表文件，用于配置计算规则时引用数据表和字段。支持备注名以便识别乱码文件名。
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: 10 }}>
                                    <Button onClick={() => fileInputRef.current?.click()} loading={isUploading}>
                                        <Icons.Upload />
                                        上传样表
                                    </Button>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        accept=".xlsx,.xls,.csv,.zip"
                                        multiple
                                        onChange={handleSampleUpload}
                                        style={{ display: 'none' }}
                                    />
                                </div>
                            </div>
                            
                            {pendingFiles && (
                                <div style={{ 
                                    marginBottom: 16, 
                                    padding: 16, 
                                    background: 'var(--bg-primary)', 
                                    borderRadius: 12, 
                                    border: '1px solid var(--border)',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: 12
                                }}>
                                    <Icons.FileSpreadsheet />
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>
                                            为上传的文件设置备注名
                                        </div>
                                        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                            原始文件名：{pendingFiles[0]?.name}
                                        </div>
                                    </div>
                                    <input 
                                        type="text"
                                        className="input"
                                        placeholder="输入备注名..."
                                        value={aliasInput}
                                        onChange={e => setAliasInput(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') confirmAliasUpload(); }}
                                        style={{ width: 220, marginBottom: 0 }}
                                        autoFocus
                                    />
                                    <Button size="sm" onClick={() => { setPendingFiles(null); setAliasInput(''); }}>
                                        取消
                                    </Button>
                                    <Button type="primary" size="sm" onClick={confirmAliasUpload} loading={isUploading}>
                                        确认上传
                                    </Button>
                                </div>
                            )}
                            
                            {isUploading && (
                                <div style={{ marginBottom: 16 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                        <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>上传中...</span>
                                        <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{uploadProgress}%</span>
                                    </div>
                                    <div className="progress-bar">
                                        <div className="progress-fill" style={{ width: `${uploadProgress}%` }}></div>
                                    </div>
                                </div>
                            )}
                            
                            <div className="search-bar">
                                <span className="search-bar-icon"><Icons.Search /></span>
                                <input 
                                    type="text"
                                    className="input"
                                    placeholder="搜索备注名或文件名..."
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                            </div>
                            
                            {selectedItems.size > 0 && (
                                <div className="batch-actions-bar">
                                    <span className="batch-actions-count">
                                        已选择 {selectedItems.size} 项
                                    </span>
                                    <div className="batch-actions-actions">
                                        <Button size="sm" onClick={() => setSelectedItems(new Set())}>
                                            取消选择
                                        </Button>
                                        <Button type="danger" size="sm" onClick={deleteSelected}>
                                            <Icons.Trash />
                                            批量删除
                                        </Button>
                                    </div>
                                </div>
                            )}
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                                <th className="checkbox-cell">
                                                    <input 
                                                        type="checkbox"
                                                        checked={selectedItems.size === samples.length && samples.length > 0}
                                                        onChange={toggleSelectAll}
                                                    />
                                                </th>
                                                <th>备注名</th>
                                                <th>原始文件名</th>
                                                <th style={{ width: 120 }}>大小</th>
                                                <th style={{ width: 100 }}>工作表数</th>
                                                <th style={{ width: 140 }}>操作</th>
                                            </tr>
                                    </thead>
                                    <tbody>
                                        {filteredSamples.length === 0 ? (
                                            <tr>
                                                <td colSpan={6}>
                                                    <div className="empty" style={{ padding: '40px 20px' }}>
                                                        <div className="empty-icon">📁</div>
                                                        <div className="empty-text">暂无样表文件</div>
                                                        <div className="empty-desc">上传样表文件以配置计算规则</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredSamples.map((sample, idx) => (
                                                <tr key={idx} className={selectedItems.has(idx) ? 'highlight' : ''}>
                                                    <td className="checkbox-cell">
                                                        <input 
                                                            type="checkbox"
                                                            checked={selectedItems.has(idx)}
                                                            onChange={() => toggleSelect(idx)}
                                                        />
                                                    </td>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                                            <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>
                                                                {sample.alias || sample.fileName}
                                                            </span>
                                                            {!sample.alias && (
                                                                <span style={{ fontSize: 10, color: 'var(--warning)', background: 'rgba(245,158,11,0.1)', padding: '1px 6px', borderRadius: 4 }}>
                                                                    未备注
                                                                </span>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <span style={{ fontSize: 12, color: 'var(--text-tertiary)', maxWidth: 200, display: 'inline-block', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={sample.fileName}>
                                                            {sample.fileName}
                                                        </span>
                                                    </td>
                                                    <td>{ExcelUtils.formatSize(sample.fileSize)}</td>
                                                    <td>{Object.keys(sample.sheets).length}</td>
                                                    <td>
                                                        <button 
                                                            className="btn-link"
                                                            style={{ marginRight: 10 }}
                                                            onClick={() => {
                                                                setEditAliasIdx(idx);
                                                                setEditAliasValue(sample.alias || sample.fileName);
                                                            }}
                                                        >
                                                            <Icons.Settings /> 备注
                                                        </button>
                                                        <button 
                                                            className="btn-link"
                                                            style={{ color: 'var(--danger)', marginRight: 10 }}
                                                            onClick={() => deleteSample(idx)}
                                                        >
                                                            删除
                                                        </button>
                                                        <button 
                                                            className="btn-link"
                                                            onClick={() => {
                                                                const firstSheet = Object.keys(sample.sheets)[0];
                                                                setPreviewSample(sample);
                                                                setPreviewSheet(firstSheet);
                                                                setPreviewColumns(sample.sheets[firstSheet]?.headers || []);
                                                            }}
                                                        >
                                                            <Icons.Eye /> 预览
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    
                    {editAliasIdx !== null && (
                        <div className="modal-mask" onClick={() => setEditAliasIdx(null)}>
                            <div className="modal" style={{ maxWidth: 420 }} onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <div className="modal-title">
                                        <Icons.Edit3 />
                                        修改备注名
                                    </div>
                                    <button className="modal-close" onClick={() => setEditAliasIdx(null)}>
                                        <Icons.X />
                                    </button>
                                </div>
                                <div className="modal-body">
                                    <div className="form-item">
                                        <label className="form-label">备注名</label>
                                        <input 
                                            type="text"
                                            className="input"
                                            value={editAliasValue}
                                            onChange={e => setEditAliasValue(e.target.value)}
                                            onKeyDown={e => { 
                                                if (e.key === 'Enter' && editAliasValue.trim()) {
                                                    updateSampleAlias(editAliasIdx, editAliasValue.trim());
                                                    setEditAliasIdx(null);
                                                }
                                            }}
                                            placeholder="输入备注名..."
                                            autoFocus
                                        />
                                    </div>
                                    <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 8 }}>
                                        备注名用于在计算规则配置中识别数据表，建议使用有意义的名称。
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <Button onClick={() => setEditAliasIdx(null)}>取消</Button>
                                    <Button 
                                        type="primary"
                                        onClick={() => {
                                            if (editAliasValue.trim()) {
                                                updateSampleAlias(editAliasIdx, editAliasValue.trim());
                                                setEditAliasIdx(null);
                                            }
                                        }}
                                    >
                                        确认修改
                                    </Button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {previewSample && (
                        <div className="modal-mask" onClick={() => setPreviewSample(null)}>
                            <div className="modal" style={{ maxWidth: 1200 }} onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <div className="modal-title">
                                        <Icons.Eye />
                                        样表预览 - {previewSample.alias || previewSample.fileName}
                                    </div>
                                    <button className="modal-close" onClick={() => setPreviewSample(null)}>
                                        <Icons.X />
                                    </button>
                                </div>
                                <div className="modal-body">
                                    <div style={{ display: 'flex', gap: 16, marginBottom: 16, alignItems: 'center', flexWrap: 'wrap' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                            <label style={{ fontSize: 13, color: 'var(--text-secondary)', fontWeight: 500 }}>工作表：</label>
                                            <select 
                                                className="select" 
                                                value={previewSheet}
                                                onChange={e => {
                                                    setPreviewSheet(e.target.value);
                                                    setPreviewColumns(previewSample.sheets[e.target.value]?.headers || []);
                                                }}
                                                style={{ width: 200 }}
                                            >
                                                {Object.keys(previewSample.sheets).map(name => (
                                                    <option key={name} value={name}>{name}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, minWidth: 300 }}>
                                            <label style={{ fontSize: 13, color: 'var(--text-secondary)', fontWeight: 500, whiteSpace: 'nowrap' }}>显示列：</label>
                                            <div style={{ 
                                                flex: 1, 
                                                display: 'flex', 
                                                gap: 6, 
                                                flexWrap: 'wrap',
                                                maxHeight: 60,
                                                overflowY: 'auto',
                                                padding: '6px 0'
                                            }}>
                                                <label style={{ 
                                                    fontSize: 12, 
                                                    display: 'flex', 
                                                    alignItems: 'center', 
                                                    gap: 4,
                                                    cursor: 'pointer',
                                                    color: 'var(--primary)',
                                                    fontWeight: 500
                                                }}>
                                                    <input 
                                                        type="checkbox"
                                                        checked={previewColumns.length === (previewSample.sheets[previewSheet]?.headers?.length || 0)}
                                                        onChange={e => {
                                                            if (e.target.checked) {
                                                                setPreviewColumns(previewSample.sheets[previewSheet]?.headers || []);
                                                            } else {
                                                                setPreviewColumns([]);
                                                            }
                                                        }}
                                                    />
                                                    全选
                                                </label>
                                                {(previewSample.sheets[previewSheet]?.headers || []).map(h => (
                                                    <label key={h} style={{ 
                                                        fontSize: 12, 
                                                        display: 'flex', 
                                                        alignItems: 'center', 
                                                        gap: 3,
                                                        cursor: 'pointer',
                                                        padding: '2px 8px',
                                                        background: previewColumns.includes(h) ? 'var(--primary-light)' : 'var(--bg-tertiary)',
                                                        borderRadius: 6,
                                                        color: previewColumns.includes(h) ? 'var(--primary)' : 'var(--text-secondary)',
                                                        transition: 'all 0.15s'
                                                    }}>
                                                        <input 
                                                            type="checkbox"
                                                            checked={previewColumns.includes(h)}
                                                            onChange={e => {
                                                                if (e.target.checked) {
                                                                    setPreviewColumns([...previewColumns, h]);
                                                                } else {
                                                                    setPreviewColumns(previewColumns.filter(c => c !== h));
                                                                }
                                                            }}
                                                            style={{ margin: 0 }}
                                                        />
                                                        <span style={{ maxWidth: 100, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={h}>
                                                            {h}
                                                        </span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        <div style={{ fontSize: 12, color: 'var(--text-tertiary)', whiteSpace: 'nowrap' }}>
                                            共 {previewSample.sheets[previewSheet]?.rows?.length || 0} 行数据
                                        </div>
                                    </div>
                                    
                                    <div className="data-table-container" style={{ maxHeight: 450, overflow: 'auto' }}>
                                        <table className="table">
                                            <thead style={{ position: 'sticky', top: 0, zIndex: 1 }}>
                                                <tr>
                                                    <th style={{ width: 50, position: 'sticky', left: 0, background: 'var(--bg-secondary)' }}>#</th>
                                                    {previewColumns.map(h => (
                                                        <th key={h} title={h} style={{ minWidth: 100, maxWidth: 200 }}>
                                                            <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h}</div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {previewColumns.length === 0 ? (
                                                    <tr>
                                                        <td colSpan={100}>
                                                            <div className="empty" style={{ padding: '30px 20px' }}>
                                                                <div className="empty-icon">👁️</div>
                                                                <div className="empty-text">请选择要显示的列</div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ) : (previewSample.sheets[previewSheet]?.rows || []).slice(0, 100).map((row, idx) => (
                                                    <tr key={idx}>
                                                        <td style={{ position: 'sticky', left: 0, background: 'var(--bg-secondary)', color: 'var(--text-tertiary)', fontSize: 12 }}>
                                                            {idx + 1}
                                                        </td>
                                                        {previewColumns.map(h => (
                                                            <td key={h} title={row[h] != null ? String(row[h]) : ''}>
                                                                <div style={{ 
                                                                    maxWidth: 200, 
                                                                    overflow: 'hidden', 
                                                                    textOverflow: 'ellipsis', 
                                                                    whiteSpace: 'nowrap',
                                                                    fontSize: 13
                                                                }}>
                                                                    {row[h] != null ? String(row[h]) : <span style={{ color: 'var(--text-quaternary)' }}>-</span>}
                                                                </div>
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {(previewSample.sheets[previewSheet]?.rows?.length || 0) > 100 && (
                                        <div style={{ 
                                            marginTop: 10, 
                                            fontSize: 12, 
                                            color: 'var(--text-tertiary)', 
                                            textAlign: 'center',
                                            padding: '8px 0',
                                            background: 'var(--bg-tertiary)',
                                            borderRadius: 8
                                        }}>
                                            仅显示前 100 行（共 {(previewSample.sheets[previewSheet]?.rows?.length || 0)} 行）
                                        </div>

                                </div>
                                <div className="modal-footer">

                    )}
                    
                    {activeTab === 'batch' && (
                        <BatchCalcPage state={state} currentPlatform={currentPlatform} />
                    )}
                    
                    {activeTab === 'history' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.History />
                                        计算记录
                                    </div>
                                    <div className="card-desc">
                                        查看历史计算任务和结果
                                    </div>
                                </div>
                                <Button>
                                    <Icons.Download />
                                    导出记录
                                </Button>
                            </div>
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>平台</th>
                                            <th>店铺数</th>
                                            <th>状态</th>
                                            <th style={{ width: 120 }}>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {calcHistory.length === 0 ? (
                                            <tr>
                                                <td colSpan={5}>
                                                    <div className="empty" style={{ padding: '40px 20px' }}>
                                                        <div className="empty-icon">📋</div>
                                                        <div className="empty-text">暂无计算记录</div>
                                                        <div className="empty-desc">完成批量计算后会在这里显示记录</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            calcHistory.map((item, idx) => (
                                                <tr key={idx}>
                                                    <td>{formatTime(item.time)}</td>
                                                    <td>{item.platform}</td>
                                                    <td>{item.shopCount}</td>
                                                    <td>
                                                        <Tag type={item.status === 'success' ? 'success' : item.status === 'processing' ? 'warning' : 'danger'}>
                                                            {item.status === 'success' ? '成功' : item.status === 'processing' ? '处理中' : '失败'}
                                                        </Tag>
                                                    </td>
                                                    <td>
                                                        <button className="btn-link">
                                                            <Icons.Download /> 下载

                                </table>
                            </div>
