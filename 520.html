                    </div>
                    
                    <div className="template-footer-bar">
                        <Button onClick={() => setTemplateData(null)}>
                            <Icons.Refresh />
                            重置
                        </Button>
                        <Button type="primary" onClick={handleSaveTemplate} disabled={!templateData}>
                            <Icons.Save />
                            保存模板配置
                        </Button>
                    </div>
                </div>
            );
        };
        
        // ========== Rules Page ==========
        const RulesPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [activeField, setActiveField] = useState(null);
            const [expandedStep, setExpandedStep] = useState(null);
            const [showPreview, setShowPreview] = useState(false);
            const [previewResult, setPreviewResult] = useState(null);
            const [presetCategory, setPresetCategory] = useState('all');
            const [fieldSearch, setFieldSearch] = useState('');
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [copySourceFieldId, setCopySourceFieldId] = useState('');
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const template = state.templates[currentPlatform];
            const savedRules = state.rules[currentPlatform] || {};
            
            const fields = template?.parseResult?.fields || [];
            
            useEffect(() => {
                if (fields.length > 0 && !activeField) {
                    setActiveField(fields[0]);
                    setExpandedStep(null);
                }
            }, [fields]);
            
            useEffect(() => {
                setPresetCategory(currentPlatform || 'all');
            }, [currentPlatform]);
            
            const currentRule = activeField ? savedRules[activeField.id] : null;
            
            const filteredFields = fields.filter(f => 
                f.name.toLowerCase().includes(fieldSearch.toLowerCase()) ||
                (f.cell || '').toLowerCase().includes(fieldSearch.toLowerCase())
            );
            
            const completedCount = fields.filter(f => (savedRules[f.id]?.steps || []).length > 0).length;
            const completionRate = fields.length > 0 ? Math.round(completedCount / fields.length * 100) : 0;
            
            const inferFieldLevel = (field) => {
                const steps = savedRules[field.id]?.steps || [];
                if (steps.length === 0) return null;
                const hasJoin = steps.some(s => s.type === 'join');
                const hasVirtual = steps.some(s => s.type === 'virtual');
                const hasFilter = steps.some(s => s.type === 'filter');
                if (hasJoin || hasVirtual) return 2;
                if (hasFilter) return 1;
                return 0;
            };
            
            const validateRule = (rule) => {
                if (!rule || !rule.steps || rule.steps.length === 0) {
                    return { valid: false, msg: '尚未配置任何步骤' };
                }
                const source = rule.steps.find(s => s.type === 'source');
                if (!source) {
                    return { valid: false, msg: '缺少「数据源」步骤' };
                }
                if (!source.config.column) {
                    return { valid: false, msg: '「数据源」步骤未选择列' };
                }
                return { valid: true, msg: '配置完整' };
            };
            
            const recommendPreset = (fieldName) => {
                if (!fieldName) return null;
                const n = fieldName.toLowerCase();
                const allPresets = CalcEngine.getPresetTemplates();
                const list = [...(allPresets[currentPlatform] || []), ...(allPresets.all || [])];
                let score = list.map(p => {
                    let s = 0;
                    const pn = p.name.toLowerCase();
                    if (n.includes('销售') || n.includes('收入') || n.includes('实收') || n.includes('gmv')) {
                        if (p.category === 'sales') s += 10;
                    }
                    if (n.includes('成本') || n.includes('扣点') || n.includes('费用') || n.includes('退款')) {
                        if (p.category === 'cost') s += 10;
                    }
                    if (n.includes('利润') || n.includes('净利') || n.includes('roi')) {
                        if (p.category === 'profit') s += 10;
                    }
                    if (pn.includes(n) || n.includes(pn.split('·').pop().toLowerCase())) s += 5;
                    return { p, s };
                });
                score.sort((a, b) => b.s - a.s);
                return score[0]?.s > 0 ? score[0].p : null;
            };
            
            const copyFieldRule = (sourceId, targetId) => {
                if (!sourceId || !targetId || sourceId === targetId) {
                    addToast('warning', '复制失败', '请选择不同的源字段和目标字段');
                    return;
                }
                const sourceRule = savedRules[sourceId];
                if (!sourceRule?.steps?.length) {
                    addToast('warning', '复制失败', '源字段尚未配置规则');
                    return;
                }
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [targetId]: {
                                ...savedRules[targetId],
                                steps: sourceRule.steps.map((step, i) => ({
                                    ...step,
                                    id: `step_${Date.now()}_${i}`
                                }))
                            }
                        }
                    }
                }));
                addToast('success', '复制成功', `已复制规则到目标字段`);
                setShowCopyModal(false);
                setCopySourceFieldId('');
            };
            
            const clearFieldRule = (fieldId) => {
                if (!window.confirm('确认清空此字段的计算规则？此操作不可撤销。')) return;
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [fieldId]: { steps: [] }
                        }
                    }
                }));
                addToast('info', '已清空', '字段规则已重置');
            };
            
            const getStepTypeInfo = (type) => {
                const types = {
                    source: { name: '数据源', icon: <Icons.Database />, color: 'var(--primary)', bg: 'var(--primary-light)' },
                    filter: { name: '过滤', icon: <Icons.Filter />, color: 'var(--warning)', bg: 'var(--warning-light)' },
                    virtual: { name: '虚拟字段', icon: <Icons.Sparkles />, color: 'var(--purple)', bg: 'var(--purple-light)' },
                    join: { name: '跨表关联', icon: <Icons.Layers />, color: 'var(--info)', bg: 'var(--info-light)' },
                    aggregate: { name: '聚合', icon: <Icons.Calculator />, color: 'var(--success)', bg: 'var(--success-light)' },
                    formula: { name: '公式计算', icon: <Icons.Calculator />, color: 'var(--primary)', bg: 'var(--primary-light)' },
                    constant: { name: '常量值', icon: <Icons.FileText />, color: 'var(--text-tertiary)', bg: 'var(--bg-tertiary)' },
                    text: { name: '文本处理', icon: <Icons.FileText />, color: 'var(--info)', bg: 'var(--info-light)' },
                    distinct: { name: '去重', icon: <Icons.Filter />, color: 'var(--warning)', bg: 'var(--warning-light)' },
                    sort: { name: '排序', icon: <Icons.Layers />, color: 'var(--info)', bg: 'var(--info-light)' },
                    limit: { name: '限制', icon: <Icons.FileText />, color: 'var(--text-tertiary)', bg: 'var(--bg-tertiary)' },
                    lookup: { name: '查找替换', icon: <Icons.Search />, color: 'var(--info)', bg: 'var(--info-light)' },
                    condition: { name: '条件判断', icon: <Icons.Sparkles />, color: 'var(--purple)', bg: 'var(--purple-light)' },
                    group: { name: '分组聚合', icon: <Icons.Calculator />, color: 'var(--success)', bg: 'var(--success-light)' }
                };
                return types[type] || { name: type, icon: <Icons.Settings />, color: 'var(--text-tertiary)', bg: 'var(--bg-tertiary)' };
            };
            
            const getCategoryInfo = (cat) => {
                const map = {
                    sales: { name: '销售类', icon: '💰', color: 'var(--success)' },
                    cost: { name: '成本类', icon: '🧾', color: 'var(--warning)' },
                    profit: { name: '利润类', icon: '📈', color: 'var(--primary)' }
                };
                return map[cat] || { name: cat, icon: '📦', color: 'var(--text-tertiary)' };
            };
            
            const summarizeStep = (step) => {
                if (!step || !step.config) return '';
                const c = step.config;
                switch (step.type) {
                    case 'source': return c.column ? `列: ${c.column}` : '未选列';
                    case 'filter': return c.column && c.op ? `${c.column} ${c.op} ${c.value || ''}` : '未配置';
                    case 'virtual': return c.source && c.target ? `${c.source} → ${c.target} (${c.rule || 'copy'})` : '未配置';
                    case 'join': return c.key && c.fk ? `${c.key}=${c.fk}.${c.col || '?'}` : '未配置';
                    case 'aggregate': return `${c.func || 'sum'}${c.column ? `(${c.column})` : '()'}`;
                    case 'formula': return c.expr || '未配置';
                    case 'constant': return `值: ${c.value}`;
                    case 'text': return c.value || '未配置';
                    case 'distinct': return `去重: ${c.column || 'val'}`;
                    case 'sort': return `排序: ${c.column || 'val'} ${c.direction === 'desc' ? '↓' : '↑'}`;
                    case 'limit': return `限制: ${c.count || 100}行`;
                    case 'lookup': return `查找替换: ${c.column || 'val'} (${(c.pairs || []).length}条映射)`;
                    case 'condition': return `条件: ${c.column || 'val'} ${c.op || '=='} ${c.value || '?'}`;
                    case 'group': return `分组: ${c.column || '?'} → ${c.func || 'sum'}(${c.aggColumn || 'val'})`;
                    default: return '';
                }
            };
            
            const duplicateStep = (stepId) => {
                if (!activeField || !currentRule) return;
                const idx = currentRule.steps.findIndex(s => s.id === stepId);
                if (idx === -1) return;
                const orig = currentRule.steps[idx];
                const newStep = {
                    ...orig,
                    id: `step_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                    config: { ...orig.config }
                };
                const newSteps = [
                    ...currentRule.steps.slice(0, idx + 1),
                    newStep,
                    ...currentRule.steps.slice(idx + 1)
                ];
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
                setExpandedStep(newStep.id);
                addToast('success', '克隆成功', '已克隆该步骤');
            };
            
            const addStep = (type) => {
                if (!activeField) return;
                
                const currentSteps = currentRule?.steps || [];
                
                const stepLogicChecks = {
                    source: () => {
                        const hasSource = currentSteps.some(s => s.type === 'source');
                        if (hasSource) return { ok: false, msg: '每个规则只能有一个「数据源」步骤' };
                        if (currentSteps.length > 0) return { ok: false, msg: '「数据源」必须是第一个步骤' };
                        return { ok: true };
                    },
                    filter: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「过滤」前需要有「数据源」' };
                        const lastAggIdx = currentSteps.map((s, i) => s.type === 'aggregate' ? i : -1).filter(i => i >= 0).pop();
                        if (lastAggIdx !== undefined && lastAggIdx >= 0 && lastAggIdx < currentSteps.length - 1) {
                            return { ok: false, msg: '「聚合」之后不能再添加「过滤」' };
                        }
                        return { ok: true };
                    },
                    virtual: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「虚拟字段」前需要有「数据源」' };
                        return { ok: true };
                    },
                    join: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「跨表关联」前需要有「数据源」' };
                        return { ok: true };
                    },
                    aggregate: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「聚合」前需要有「数据源」' };
                        return { ok: true };
                    },
                    formula: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「公式计算」前需要有「数据源」' };
                        return { ok: true };
                    },
                    constant: () => ({ ok: true }),
                    text: () => ({ ok: true }),
                    distinct: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「去重」前需要有「数据源」' };
                        return { ok: true };
                    },
                    sort: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「排序」前需要有「数据源」' };
                        return { ok: true };
                    },
                    limit: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「限制」前需要有「数据源」' };
                        return { ok: true };
                    },
                    lookup: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「查找替换」前需要有「数据源」' };
                        return { ok: true };
                    },
                    condition: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「条件判断」前需要有「数据源」' };
                        return { ok: true };
                    },
                    group: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「分组聚合」前需要有「数据源」' };
                        return { ok: true };
                    }
                };
                
                const check = stepLogicChecks[type] ? stepLogicChecks[type]() : { ok: true };
                if (!check.ok) {
                    addToast('warning', '步骤顺序不符合逻辑', check.msg);
                    return;
                }
                
                const defaultConfigs = {
                    source: { table: '', column: '' },
                    filter: { column: '', op: '==', value: '' },
                    virtual: { source: '', target: '', rule: 'copy' },
                    join: { table: '', key: '', fk: '', col: '' },
                    aggregate: { column: '', func: 'sum' },
                    formula: { expr: '{val}' },
                    constant: { value: 0 },
                    text: { value: '' },
                    distinct: { column: '' },
                    sort: { column: '', direction: 'asc' },
                    limit: { count: 100 },
                    lookup: { column: '', pairs: [{ from: '', to: '' }] },
                    condition: { column: '', op: '==', value: '', trueValue: 1, falseValue: 0, resultCol: 'condition_result' },
                    group: { column: '', func: 'sum', aggColumn: 'val' }
                };
                
                const newStep = {
                    id: `step_${Date.now()}`,
                    type,
                    config: defaultConfigs[type] || {}
                };
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: [...currentSteps, newStep]
                            }
                        }
                    }
                }));
                
                setExpandedStep(newStep.id);
                addToast('success', '添加步骤', `已添加 ${getStepTypeInfo(type).name} 步骤`);
            };
            
            const updateStepConfig = (stepId, key, value) => {
                if (!activeField || !currentRule) return;
                
                const newSteps = currentRule.steps.map(s => 
                    s.id === stepId ? { ...s, config: { ...s.config, [key]: value } } : s
                );
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
            };
            
            const deleteStep = (stepId) => {
                if (!activeField || !currentRule) return;
                
                const newSteps = currentRule.steps.filter(s => s.id !== stepId);
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,

                                ...savedRules[activeField.id],

                    }

                const newIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (newIdx < 0 || newIdx >= steps.length) return;
                
                [steps[idx], steps[newIdx]] = [steps[newIdx], steps[idx]];
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps
                            }
                        }

                                                    <span className={`field-dot ${(savedRules[field.id]?.steps || []).length > 0 ? (validation.valid ? 'done' : 'partial') : ''}`}></span>

                                                        <div className="field-name">{field.name}</div>

                                                            <span className="field-cell">{field.cell}</span>

                                                                <span className={`field-level-tag level-${level}`}>

                                            <Icons.Calculator />
                                            {activeField ? `「${activeField.name}」计算规则` : '请选择字段'}
                                        </div>
                                        {activeField && (
                                            <div className="card-desc">
                                                单元格 {activeField.cell} · {activeField.type === 'text' ? '文本填充' : '数值填充'}
                                                {(() => {
                                                    const v = validateRule(currentRule);
                                                    return (
                                                        <span className={`field-status ${v.valid ? 'valid' : 'invalid'}`}>
                                                            {v.valid ? '✓ ' + v.msg : '⚠ ' + v.msg}
                                                        </span>
                                                    );
                                                })()}
                                            </div>
                                        )}

                                                            <div 
                                                                className={`flow-step ${idx === expandedStep ? 'active' : ''}`}

                                                                style={{ borderColor: info.color }}

                                                    const isExpanded = expandedStep === step.id;

                                                                        disabled={idx === 0}
                                                                        title="上移"
                                                                    >
                                                                        <Icons.MoveUp />
                                                                    </button>
                                                                    <button 
                                                                        className="step-action-btn"
                                                                        onClick={() => moveStep(step.id, 'down')}
                                                                        disabled={idx === currentRule.steps.length - 1}
                                                                        title="下移"
                                                                    >
                                                                        <Icons.MoveDown />
                                                                    </button>
                                                                    <button 
                                                                        className="step-action-btn"
                                                                        onClick={() => setExpandedStep(isExpanded ? null : step.id)}
                                                                        title={isExpanded ? '收起' : '展开'}
                                                                    >
                                                                        {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                                                                    </button>
                                                                    <button 
                                                                        className="step-action-btn danger"
                                                                        onClick={() => deleteStep(step.id)}
                                                                        title="删除"
                                                                    >
                                                                        <Icons.Trash />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                            {isExpanded && renderStepConfig(step)}
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                        
                                        {renderPresetGrid()}
                                        
                                        <div className="add-step-buttons">
                                            <div className="section-title" style={{ width: '100%', marginBottom: 0 }}>添加步骤</div>

                                                const info = getStepTypeInfo(type);
                                                return (
                                                    <button 
                                                        key={type}
                                                        className="btn btn-default btn-sm"
                                                        onClick={() => addStep(type)}
                                                        style={{ borderColor: info.color, color: info.color }}
                                                        title={info.name}
                                                    >
                                                        {info.icon}
                                                        {info.name}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </>
                                )}
                                
                                {!activeField && (
                                    <div className="empty" style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                                        <div className="empty-icon">👆</div>
                                        <div className="empty-text">请选择左侧字段</div>
                                        <div className="empty-desc">选择字段后配置对应的计算规则</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {showCopyModal && (
                        <Modal 
                            title="复制规则到其他字段"
                            onClose={() => { setShowCopyModal(false); setCopySourceFieldId(''); }}
                            footer={
                                <>
                                    <Button onClick={() => { setShowCopyModal(false); setCopySourceFieldId(''); }}>
                                        取消
                                    </Button>
                                    <Button 
                                        type="primary" 
                                        disabled={!copySourceFieldId}
                                        onClick={() => copyFieldRule(copySourceFieldId, activeField?.id)}
                                    >
                                        确认复制
                                    </Button>
                                </>
                            }
                        >
                            <div className="copy-rule-form">
                                <Alert type="info">
                                    将已配置字段的规则复制到当前字段「{activeField?.name}」。源字段和目标字段不能相同。
                                </Alert>
                                <div className="form-item" style={{ marginTop: 12 }}>
                                    <label className="form-label">选择源字段（要复制其规则的字段）</label>
                                    <select 
                                        className="select"
                                        value={copySourceFieldId}
                                        onChange={e => setCopySourceFieldId(e.target.value)}
                                    >
                                        <option value="">请选择源字段</option>
                                        {fields
                                            .filter(f => (savedRules[f.id]?.steps || []).length > 0 && f.id !== activeField?.id)
                                            .map(f => (
                                                <option key={f.id} value={f.id}>
                                                    {f.name} ({(savedRules[f.id]?.steps || []).length}个步骤)
                                                </option>
                                            ))
                                        }
                                    </select>
                                </div>
                                {copySourceFieldId && (
                                    <div className="copy-rule-preview">
                                        <div className="copy-rule-preview-title">源规则预览：</div>
                                        {(savedRules[copySourceFieldId]?.steps || []).map((s, i) => {
                                            const info = getStepTypeInfo(s.type);
                                            return (
                                                <div key={s.id} className="copy-rule-step">
                                                    <span style={{ color: info.color }}>{i + 1}. {info.name}</span>
                                                    <span className="copy-rule-step-summary">
                                                        {summarizeStep(s)}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </Modal>
                    )}
                    
                    {showPreview && previewResult && (
                        <Modal 
                            title="计算预览"
                            onClose={() => setShowPreview(false)}
                            large
                            footer={
                                <Button onClick={() => setShowPreview(false)}>关闭</Button>
                            }
                        >
                            <div className="preview-result">
                                <div className="preview-result-title">最终计算结果</div>
                                <div className="preview-result-value">
                                    {typeof previewResult.value === 'number' 
                                        ? previewResult.value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                                        : previewResult.value}
                                </div>
                                {previewResult.error && (
                                    <div style={{ marginTop: 10, color: 'var(--danger)', fontSize: 13 }}>
                                        ⚠️ 计算错误: {previewResult.error}
                                    </div>
                                )}
                            </div>
                            
                            <div className="section-title" style={{ marginTop: 20 }}>计算步骤详情</div>
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th style={{ width: 60 }}>步骤</th>
                                            <th>类型</th>
                                            <th style={{ width: 80 }}>行数</th>
                                            <th>预览</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {previewResult.stepResults?.map((sr, i) => (
                                            <tr key={i} className={sr.error ? '' : ''}>
                                                <td style={{ fontWeight: 600 }}>{i + 1}</td>
                                                <td>
                                                    <Tag type={sr.error ? 'danger' : 'primary'}>
                                                        {sr.type}
                                                    </Tag>
                                                </td>
                                                <td>{sr.rows}</td>
                                                <td style={{ fontFamily: 'var(--font-mono)', fontSize: 11 }}>
                                                    {sr.error ? (
                                                        <span style={{ color: 'var(--danger)' }}>错误: {sr.error}</span>
                                                    ) : (
                                                        JSON.stringify(sr.preview?.[0] || {}).slice(0, 80)
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };
        
        // ========== External Data Page ==========
        const ExternalsPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [searchQuery, setSearchQuery] = useState('');
            const [previewExternal, setPreviewExternal] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const fileInputRef = useRef(null);
            const externals = state.externals || [];
            const platform = state.platforms.find(p => p.id === currentPlatform);
            
            const handleUpload = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                setIsUploading(true);
                setUploadProgress(0);
                
                try {
                    const newExternals = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const result = await ExcelUtils.parse(file, (p) => {
                            setUploadProgress(Math.round(((i + p / 100) / files.length) * 100));
                        });
                        
                        const sheetEntries = Object.entries(result.sheets).map(([name, data]) => ({
                            id: `ext_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                            fileName: result.fileName,
                            sheetName: name,
                            sheetKey: name.includes('::') ? name.split('::').pop() : name,
                            rows: data.rows.length,
                            cols: data.headers.length,
                            headers: data.headers,
                            data: data.rows.slice(0, 100),
                            allData: data.rows,
                            uploadTime: new Date().toISOString(),
                            platformId: currentPlatform,
                            fileSize: result.fileSize
                        }));
                        
                        newExternals.push(...sheetEntries);
                    }
                    
                    Store.set(s => ({
                        ...s,
                        externals: [...(s.externals || []), ...newExternals]
                    }));
                    
                    addToast('success', '上传成功', `成功导入 ${newExternals.length} 个外部数据表`);
                    ActivityLogger.add('上传外部数据', `${platform?.name} - ${newExternals.length}个表`);
                } catch (err) {
                    addToast('error', '上传失败', err.message);
                } finally {
                    setIsUploading(false);
                    setUploadProgress(0);
                    if (fileInputRef.current) fileInputRef.current.value = '';
                }
            };
            
            const deleteExternal = (id) => {
                Store.set(s => ({
                    ...s,
                    externals: (s.externals || []).filter(e => e.id !== id)
                }));
                addToast('success', '删除成功', '外部数据表已删除');
            };
            
            const filteredExternals = externals.filter(e => 
                e.fileName.toLowerCase().includes(searchQuery.toLowerCase()) ||
                e.sheetName.toLowerCase().includes(searchQuery.toLowerCase()) ||
                e.sheetKey.toLowerCase().includes(searchQuery.toLowerCase())
            );
            
            return (
                <div className="card">
                    <div className="card-header">
                        <div>
                            <div className="card-title">
                                <Icons.Database />
                                外部数据表
                            </div>
                            <div className="card-desc">
                                管理跨平台共享的外部数据（商品成本表、费率表等），可在计算规则中引用
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 10 }}>
                            <Button onClick={() => fileInputRef.current?.click()} loading={isUploading}>
                                <Icons.Upload />
                                上传数据表
                            </Button>
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept=".xlsx,.xls,.zip"
                                multiple
                                onChange={handleUpload}
                                style={{ display: 'none' }}
                            />
                        </div>
                    </div>
                    
                    {isUploading && (
                        <div style={{ marginBottom: 16 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>上传解析中...</span>
                                <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{uploadProgress}%</span>
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${uploadProgress}%` }}></div>
                            </div>
                        </div>
                    )}
                    
                    <Alert type="info">
                        <strong>外部数据表：</strong>上传商品成本表、平台费率表等，可在「计算规则」的「跨表关联」步骤中引用。支持 .xlsx / .xls / .zip 格式。
                    </Alert>
                    
                    <div className="search-bar">
                        <span className="search-bar-icon"><Icons.Search /></span>
                        <input 
                            type="text"
                            className="input"
                            placeholder="搜索文件名或表名..."
                            value={searchQuery}
                            onChange={e => setSearchQuery(e.target.value)}
                        />
                    </div>
                    
                    <div className="data-table-container">
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>文件名</th>
                                    <th>工作表</th>
                                    <th>数据量</th>
                                    <th>字段数</th>
                                    <th>上传时间</th>
                                    <th style={{ width: 140 }}>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredExternals.length === 0 ? (
                                    <tr>
                                        <td colSpan={6}>
                                            <div className="empty" style={{ padding: '40px 20px' }}>
                                                <div className="empty-icon">🗄️</div>
                                                <div className="empty-text">暂无外部数据表</div>
                                                <div className="empty-desc">上传商品成本表、费率表等外部数据</div>
                                            </div>
                                        </td>
                                    </tr>
                                ) : (
                                    filteredExternals.map(ext => (
                                        <tr key={ext.id}>
                                            <td>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                    <Icons.FileSpreadsheet />
                                                    <span style={{ fontWeight: 500 }}>{ext.fileName}</span>
                                                </div>
                                            </td>
                                            <td>
                                                <Tag type="default">{ext.sheetKey}</Tag>
                                            </td>
                                            <td>{ext.rows.toLocaleString()} 行</td>
                                            <td>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                                                    {ext.headers.slice(0, 3).map(h => (
                                                        <span key={h} className="tag tag-default" style={{ fontSize: 10 }}>{h}</span>
                                                    ))}
                                                    {ext.headers.length > 3 && (
                                                        <span className="tag tag-default" style={{ fontSize: 10 }}>+{ext.headers.length - 3}</span>
                                                    )}
                                                </div>
                                            </td>
                                            <td style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>
                                                {new Date(ext.uploadTime).toLocaleString('zh-CN')}
                                            </td>
                                            <td>
                                                <div style={{ display: 'flex', gap: 8 }}>
                                                    <button className="btn-link" onClick={() => setPreviewExternal(ext)}>
                                                        <Icons.Eye /> 预览
                                                    </button>
                                                    <button className="btn-link danger" onClick={() => deleteExternal(ext.id)}>
                                                        <Icons.Trash /> 删除
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                    
                    {previewExternal && (
                        <Modal 
                            title={`预览: ${previewExternal.sheetKey}`}
                            size="lg"
                            onClose={() => setPreviewExternal(null)}
                        >
                            <div style={{ maxHeight: 400, overflow: 'auto' }}>
                                <table className="table table-sm">
                                    <thead>
                                        <tr>
                                            {previewExternal.headers.map(h => (
                                                <th key={h}>{h}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {previewExternal.data.map((row, i) => (
                                            <tr key={i}>
                                                {previewExternal.headers.map(h => (
                                                    <td key={h} style={{ fontSize: 12 }}>{row[h]}</td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {previewExternal.rows > 100 && (
                                    <div style={{ textAlign: 'center', padding: 12, color: 'var(--text-tertiary)', fontSize: 12 }}>
                                        仅显示前100行，共 {previewExternal.rows} 行
                                    </div>
                                )}
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };
        
        // ========== Batch Calculation Page ==========
        const BatchCalcPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [batchFiles, setBatchFiles] = useState([]);
            const [isCalculating, setIsCalculating] = useState(false);
            const [calcProgress, setCalcProgress] = useState(0);
            const [results, setResults] = useState([]);
            const fileInputRef = useRef(null);
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const template = state.templates[currentPlatform];
            const rules = state.rules[currentPlatform] || {};
            const shops = platform?.shops || [];
            
            const detectShop = (fileName, fileData) => {
                const baseName = fileName.replace(/\.[^.]+$/, '').toLowerCase();
                for (const shop of shops) {
                    const shopName = shop.name.toLowerCase();
                    if (baseName.includes(shopName) || shopName.includes(baseName)) {
                        return shop;
                    }
                }
                const sheetNames = Object.keys(fileData.sheets || {});
                for (const sheetName of sheetNames) {
                    const lowerSheet = sheetName.toLowerCase();
                    for (const shop of shops) {
                        if (lowerSheet.includes(shop.name.toLowerCase())) {
                            return shop;
                        }
                    }
                }
                const firstSheet = Object.values(fileData.sheets || {})[0];
                if (firstSheet?.rows) {
                    for (let i = 0; i < Math.min(5, firstSheet.rows.length); i++) {
                        const row = firstSheet.rows[i];
                        const rowText = Object.values(row).map(v => String(v || '').toLowerCase()).join(' ');
                        for (const shop of shops) {
                            if (rowText.includes(shop.name.toLowerCase())) {
                                return shop;
                            }
                        }
                    }
                }
                return null;
            };
            
            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files || []);
                if (!files.length) return;
                const newFiles = [];
                for (const file of files) {
                    try {
                        const parsed = await ExcelUtils.parse(file);
                        const shop = detectShop(file.name, parsed);
                        newFiles.push({
                            id: `batch_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                            fileName: file.name,
                            fileSize: file.size,
                            data: parsed,
                            detectedShop: shop,
                            status: shop ? 'matched' : 'unmatched',
                            selected: true
                        });
                    } catch (err) {
                        newFiles.push({
                            id: `batch_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                            fileName: file.name,
                            fileSize: file.size,
                            error: err.message,
                            status: 'error',
                            selected: false
                        });
                    }
                }
                setBatchFiles(prev => [...prev, ...newFiles]);
                const matched = newFiles.filter(f => f.status === 'matched').length;
                const unmatched = newFiles.filter(f => f.status === 'unmatched').length;
                if (matched > 0) addToast('success', '识别完成', `成功识别 ${matched} 个店铺，${unmatched} 个未识别`);
            };
            
            const assignShop = (fileId, shopId) => {
                const shop = shops.find(s => s.id === shopId);
                setBatchFiles(prev => prev.map(f => f.id === fileId ? { ...f, detectedShop: shop || null, status: shop ? 'matched' : 'unmatched' } : f));
            };
            
            const removeFile = (fileId) => {
                setBatchFiles(prev => prev.filter(f => f.id !== fileId));
            };
            
            const toggleSelected = (fileId) => {
                setBatchFiles(prev => prev.map(f => f.id === fileId ? { ...f, selected: !f.selected } : f));
            };
            
            const runBatchCalc = async () => {
                const selected = batchFiles.filter(f => f.selected && f.status !== 'error');
                if (!selected.length) {
                    addToast('warning', '请先选择文件', '至少选择一个要计算的文件');
                    return;
                }
                if (!template) {
                    addToast('warning', '缺少模板', '请先在模板中心上传利润表模板');
                    return;
                }
                const fields = template.parseResult?.fields || [];
                const configured = fields.filter(f => (rules[f.id]?.steps || []).length > 0);
                if (configured.length === 0) {
                    addToast('warning', '缺少计算规则', '请先在计算规则页面配置字段规则');
                    return;
                }
                
                setIsCalculating(true);
                setCalcProgress(0);
                const calcResults = [];
                
                for (let i = 0; i < selected.length; i++) {
                    const fileItem = selected[i];
                    try {
                        const firstSheet = Object.values(fileItem.data.sheets)[0];
                        if (!firstSheet) continue;
                        
                        const tables = [{ id: 'main', rows: firstSheet.rows, headers: firstSheet.headers }];
                        const resultValues = {};
                        
                        fields.forEach(field => {
                            const rule = rules[field.id];
                            if (rule?.steps?.length) {
                                const val = CalcEngine.exec(rule, tables, { shopName: fileItem.detectedShop?.name || '' });
                                resultValues[field.id] = val;
                            }
                        });
                        
                        calcResults.push({
                            fileId: fileItem.id,
                            fileName: fileItem.fileName,
                            shop: fileItem.detectedShop,
                            values: resultValues,
                            status: 'success'
                        });
                    } catch (err) {
                        calcResults.push({
                            fileId: fileItem.id,
                            fileName: fileItem.fileName,
                            shop: fileItem.detectedShop,
                            error: err.message,
                            status: 'error'
                        });
                    }
                    setCalcProgress(Math.round(((i + 1) / selected.length) * 100));
                }
                
                setResults(calcResults);
                setIsCalculating(false);
                
                const success = calcResults.filter(r => r.status === 'success').length;
                addToast('success', '计算完成', `成功计算 ${success}/${calcResults.length} 个文件`);
                
                Store.set(s => ({
                    ...s,
                    calcHistory: [{
                        id: Date.now(),
                        time: new Date().toISOString(),
                        platform: platform?.name,
                        shopCount: calcResults.length,
                        successCount: success,
                        status: success === calcResults.length ? 'success' : 'partial',
                        results: calcResults
                    }, ...(s.calcHistory || [])].slice(0, 100)
                }));
            };
            
            const downloadResults = () => {
                if (!template || results.length === 0) return;
                const fields = template.parseResult?.fields || [];
                const aoa = [fields.map(f => f.name)];
                
                results.filter(r => r.status === 'success').forEach(r => {
                    const row = fields.map(f => {
                        const v = r.values[f.id];
                        if (v === null || v === undefined) return '';
                        if (typeof v === 'object' && v.val !== undefined) return v.val;
                        return v;
                    });
                    aoa.push(row);
                });
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(aoa);
                XLSX.utils.book_append_sheet(wb, ws, '利润表');
                const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                ExcelUtils.download(buf, `利润表_${platform?.name}_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
                addToast('success', '下载成功', '利润表已生成');
            };
            
            return (
                <div className="card">
                    <div className="card-header">
                        <div>
                            <div className="card-title">
                                <Icons.Calculator />
                                批量计算
                            </div>
                            <div className="card-desc">
                                上传店铺数据，系统自动识别店铺并生成利润表
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 10 }}>
                            {results.length > 0 && (
                                <Button onClick={downloadResults}>
                                    <Icons.Download />
                                    下载结果
                                </Button>
                            )}
                            <Button 
                                type="primary" 
                                onClick={runBatchCalc}
                                loading={isCalculating}
                                disabled={batchFiles.filter(f => f.selected).length === 0}
                            >
                                <Icons.Play />
                                {isCalculating ? '计算中...' : '开始计算'}
                            </Button>
                        </div>
                    </div>
                    
                    <Alert type="info">
                        <strong>批量计算流程：</strong>① 上传店铺数据文件 → ② 系统自动识别店铺（支持文件名、工作表名、内容匹配）→ ③ 应用计算规则 → ④ 生成利润表
                    </Alert>
                    
                    {isCalculating && (
                        <div style={{ marginBottom: 16 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>正在计算...</span>
                                <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{calcProgress}%</span>
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${calcProgress}%` }}></div>
                            </div>
                        </div>
                    )}
                    
                    {batchFiles.length === 0 ? (
                        <div 
                            className="upload-area" 
                            style={{ padding: '48px 24px', margin: '20px 0' }}
                            onClick={() => fileInputRef.current?.click()}
                        >
                            <div className="upload-icon">📊</div>
                            <div className="upload-text">点击上传店铺数据文件</div>
                            <div className="upload-hint">支持 .xlsx / .xls / .zip 格式，可批量上传多个文件</div>
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept=".xlsx,.xls,.zip"
                                multiple
                                onChange={handleFileUpload}
                                style={{ display: 'none' }}
                            />
                        </div>
                    ) : (
                        <>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                                <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
                                    已上传 {batchFiles.length} 个文件
                                    <span style={{ color: 'var(--text-tertiary)', marginLeft: 8 }}>
                                        (已识别 {batchFiles.filter(f => f.status === 'matched').length} 个店铺)
                                    </span>
                                </div>
                                <Button size="sm" onClick={() => fileInputRef.current?.click()}>
                                    <Icons.Plus /> 继续添加
                                </Button>
                                <input ref={fileInputRef} type="file" accept=".xlsx,.xls,.zip" multiple onChange={handleFileUpload} style={{ display: 'none' }} />
                            </div>
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th style={{ width: 40 }}><input type="checkbox" checked={batchFiles.length > 0 && batchFiles.every(f => f.selected)} onChange={() => setBatchFiles(prev => prev.map(f => ({ ...f, selected: !prev.every(x => x.selected) })))} /></th>
                                            <th>文件名</th>
                                            <th>识别店铺</th>
                                            <th>数据量</th>
                                            <th style={{ width: 100 }}>状态</th>
                                            <th style={{ width: 60 }}>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {batchFiles.map(file => (
                                            <tr key={file.id}>
                                                <td><input type="checkbox" checked={file.selected} onChange={() => toggleSelected(file.id)} disabled={file.status === 'error'} /></td>
                                                <td>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                        <Icons.FileSpreadsheet />
                                                        <span style={{ fontWeight: 500, fontSize: 13 }}>{file.fileName}</span>
                                                    </div>
                                                </td>
                                                <td>
                                                    {file.status === 'error' ? (
                                                        <span style={{ color: 'var(--danger)', fontSize: 12 }}>解析失败</span>
                                                    ) : file.detectedShop ? (
                                                        <Tag type="success">{file.detectedShop.name}</Tag>
                                                    ) : (
                                                        <select 
                                                            className="select" 
                                                            style={{ fontSize: 12, padding: '4px 8px', minWidth: 120 }}
                                                            value=""
                                                            onChange={e => assignShop(file.id, e.target.value)}
                                                        >
                                                            <option value="">手动选择店铺</option>
                                                            {shops.map(s => (
                                                                <option key={s.id} value={s.id}>{s.name}</option>
                                                            ))}
                                                        </select>
                                                    )}
                                                </td>
                                                <td style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>
                                                    {file.data ? `${Object.values(file.data.sheets)[0]?.rows?.length || 0} 行` : '-'}
                                                </td>
                                                <td>
                                                    {file.status === 'matched' ? (
                                                        <Tag type="success">已识别</Tag>
                                                    ) : file.status === 'unmatched' ? (
                                                        <Tag type="warning">待匹配</Tag>
                                                    ) : (
                                                        <Tag type="danger">错误</Tag>
                                                    )}
                                                </td>
                                                <td>
                                                    <button className="btn-link danger" onClick={() => removeFile(file.id)}>
                                                        <Icons.Trash />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </>
                    )}
                    
                    {results.length > 0 && (
                        <div style={{ marginTop: 20 }}>
                            <div className="section-title">计算结果</div>
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>文件名</th>
                                            <th>店铺</th>
                                            <th>状态</th>
                                            <th>计算值预览</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {results.map((r, i) => (
                                            <tr key={i}>
                                                <td style={{ fontSize: 13 }}>{r.fileName}</td>
                                                <td>{r.shop ? <Tag type="success">{r.shop.name}</Tag> : <span style={{ color: 'var(--text-quaternary)' }}>-</span>}</td>
                                                <td>
                                                    {r.status === 'success' ? (
                                                        <Tag type="success">成功</Tag>
                                                    ) : (
                                                        <Tag type="danger">失败</Tag>
                                                    )}
                                                </td>
                                                <td style={{ fontSize: 12, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>
                                                    {r.status === 'success' 
                                                        ? Object.entries(r.values).slice(0, 3).map(([k, v]) => `${k}: ${typeof v === 'object' ? v.val : v}`).join(', ') + (Object.keys(r.values).length > 3 ? '...' : '')
                                                        : r.error
                                                    }
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        // ========== Data Management Page ==========
        const DataPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [activeTab, setActiveTab] = useState('samples');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedItems, setSelectedItems] = useState(new Set());
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const samples = state.samples[currentPlatform] || [];
            const calcHistory = state.calcHistory || [];
            
            const tabs = [
                { id: 'samples', name: '样表管理', icon: <Icons.FileSpreadsheet /> },
                { id: 'batch', name: '批量计算', icon: <Icons.Calculator /> },
                { id: 'history', name: '计算记录', icon: <Icons.History /> },
                { id: 'externals', name: '外部数据', icon: <Icons.Database /> }
            ];
            
            const handleSampleUpload = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                setIsUploading(true);
                setUploadProgress(0);
                
                try {
                    const newSamples = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const result = await ExcelUtils.parse(file, (p) => {
                            setUploadProgress(Math.round(((i + p / 100) / files.length) * 100));
                        });
                        newSamples.push(result);
                    }
                    
                    Store.set(s => ({
                        ...s,
                        samples: {
                            ...s.samples,
                            [currentPlatform]: [...(s.samples[currentPlatform] || []), ...newSamples]
                        }
                    }));
                    
                    addToast('success', '上传成功', `成功上传 ${newSamples.length} 个样表文件`);
                    ActivityLogger.add('上传样表', `${platform?.name} - ${newSamples.length}个文件`);
                } catch (err) {
                    addToast('error', '上传失败', err.message);
                } finally {
                    setIsUploading(false);
                    setUploadProgress(0);
                }
            };
            
            const deleteSample = (index) => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].filter((_, i) => i !== index)
                    }
                }));
                addToast('success', '删除成功', '样表已删除');
            };
            
            const deleteSelected = () => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].filter((_, i) => !selectedItems.has(i))
                    }
                }));
                setSelectedItems(new Set());
                addToast('success', '批量删除', `已删除 ${selectedItems.size} 个文件`);
            };
            
            const toggleSelect = (index) => {
                const newSet = new Set(selectedItems);
                if (newSet.has(index)) {
                    newSet.delete(index);
                } else {
                    newSet.add(index);
                }
                setSelectedItems(newSet);
            };
            
            const toggleSelectAll = () => {
                if (selectedItems.size === samples.length) {
                    setSelectedItems(new Set());
                } else {
                    setSelectedItems(new Set(samples.map((_, i) => i)));
                }
            };
            
            const filteredSamples = samples.filter(s => 
                s.fileName.toLowerCase().includes(searchQuery.toLowerCase())
            );
            
            const formatTime = (isoString) => {
                return new Date(isoString).toLocaleString('zh-CN');
            };
            
            return (
                <div className="fade-in">
                    <div className="dm-tabs">
                        {tabs.map(tab => (
                            <div 
                                key={tab.id}
                                className={`dm-tab ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                    {tab.icon}
                                    {tab.name}
                                </span>
                            </div>
                        ))}
                    </div>
                    
                    {activeTab === 'samples' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.FileSpreadsheet />
                                        样表管理
                                    </div>
                                    <div className="card-desc">
                                        上传样表文件，用于配置计算规则时引用数据表和字段
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: 10 }}>
                                    <Button onClick={() => fileInputRef.current?.click()} loading={isUploading}>
                                        <Icons.Upload />
                                        上传样表
                                    </Button>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        accept=".xlsx,.xls,.zip"
                                        multiple
                                        onChange={handleSampleUpload}
                                        style={{ display: 'none' }}
                                    />
                                </div>
                            </div>
                            
                            {isUploading && (
                                <div style={{ marginBottom: 16 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                        <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>上传中...</span>
                                        <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{uploadProgress}%</span>
                                    </div>
                                    <div className="progress-bar">
                                        <div className="progress-fill" style={{ width: `${uploadProgress}%` }}></div>
                                    </div>
                                </div>
                            )}
                            
                            <div className="search-bar">
                                <span className="search-bar-icon"><Icons.Search /></span>
                                <input 
                                    type="text"
                                    className="input"
                                    placeholder="搜索文件名..."
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                            </div>
                            
                            {selectedItems.size > 0 && (
                                <div className="batch-actions-bar">
                                    <span className="batch-actions-count">
                                        已选择 {selectedItems.size} 项
                                    </span>
                                    <div className="batch-actions-actions">
                                        <Button size="sm" onClick={() => setSelectedItems(new Set())}>
                                            取消选择
                                        </Button>
                                        <Button type="danger" size="sm" onClick={deleteSelected}>
                                            <Icons.Trash />
                                            批量删除
                                        </Button>
                                    </div>
                                </div>
                            )}
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th className="checkbox-cell">
                                                <input 
                                                    type="checkbox"
                                                    checked={selectedItems.size === samples.length && samples.length > 0}
                                                    onChange={toggleSelectAll}
                                                />
                                            </th>
                                            <th>文件名</th>
                                            <th style={{ width: 120 }}>大小</th>
                                            <th style={{ width: 100 }}>工作表数</th>
                                            <th style={{ width: 100 }}>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredSamples.length === 0 ? (
                                            <tr>
                                                <td colSpan={5}>
                                                    <div className="empty" style={{ padding: '40px 20px' }}>
                                                        <div className="empty-icon">📁</div>
                                                        <div className="empty-text">暂无样表文件</div>
                                                        <div className="empty-desc">上传样表文件以配置计算规则</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredSamples.map((sample, idx) => (
                                                <tr key={idx} className={selectedItems.has(idx) ? 'highlight' : ''}>
                                                    <td className="checkbox-cell">
                                                        <input 
                                                            type="checkbox"
                                                            checked={selectedItems.has(idx)}
                                                            onChange={() => toggleSelect(idx)}
                                                        />
                                                    </td>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                                            <Icons.FileSpreadsheet />
                                                            <span style={{ fontWeight: 500 }}>{sample.fileName}</span>
                                                        </div>
                                                    </td>
                                                    <td>{ExcelUtils.formatSize(sample.fileSize)}</td>
                                                    <td>{Object.keys(sample.sheets).length}</td>
                                                    <td>
