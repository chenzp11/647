                    </div>
                    
                    {showPreview && previewResult && (
                        <Modal 
                            title="计算预览"
                            onClose={() => setShowPreview(false)}
                            large
                            footer={
                                <Button onClick={() => setShowPreview(false)}>关闭</Button>
                            }
                        >
                            <div className="preview-result">
                                <div className="preview-result-title">最终计算结果</div>
                                <div className="preview-result-value">
                                    {typeof previewResult.value === 'number' 
                                        ? previewResult.value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                                        : previewResult.value}
                                </div>
                                {previewResult.error && (
                                    <div style={{ marginTop: 10, color: 'var(--danger)', fontSize: 13 }}>
                                        ⚠️ 计算错误: {previewResult.error}
                                    </div>
                                )}
                            </div>
                            
                            <div className="section-title" style={{ marginTop: 20 }}>计算步骤详情</div>
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th style={{ width: 60 }}>步骤</th>
                                            <th>类型</th>
                                            <th style={{ width: 80 }}>行数</th>
                                            <th>预览</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {previewResult.stepResults?.map((sr, i) => (
                                            <tr key={i} className={sr.error ? '' : ''}>
                                                <td style={{ fontWeight: 600 }}>{i + 1}</td>
                                                <td>
                                                    <Tag type={sr.error ? 'danger' : 'primary'}>
                                                        {sr.type}
                                                    </Tag>
                                                </td>
                                                <td>{sr.rows}</td>
                                                <td style={{ fontFamily: 'var(--font-mono)', fontSize: 11 }}>
                                                    {sr.error ? (
                                                        <span style={{ color: 'var(--danger)' }}>错误: {sr.error}</span>
                                                    ) : (
                                                        JSON.stringify(sr.preview?.[0] || {}).slice(0, 80)
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };
        
        // ========== Data Management Page ==========
        const DataPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [activeTab, setActiveTab] = useState('samples');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedItems, setSelectedItems] = useState(new Set());
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const samples = state.samples[currentPlatform] || [];
            const calcHistory = state.calcHistory || [];
            
            const tabs = [
                { id: 'samples', name: '样表管理', icon: <Icons.FileSpreadsheet /> },
                { id: 'batch', name: '批量计算', icon: <Icons.Calculator /> },
                { id: 'history', name: '计算记录', icon: <Icons.History /> },
                { id: 'externals', name: '外部数据', icon: <Icons.Database /> }
            ];
            
            const handleSampleUpload = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                setIsUploading(true);
                setUploadProgress(0);
                
                try {
                    const newSamples = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const result = await ExcelUtils.parse(file, (p) => {
                            setUploadProgress(Math.round(((i + p / 100) / files.length) * 100));
                        });
                        newSamples.push(result);
                    }
                    
                    Store.set(s => ({
                        ...s,
                        samples: {
                            ...s.samples,
                            [currentPlatform]: [...(s.samples[currentPlatform] || []), ...newSamples]
                        }
                    }));
                    
                    addToast('success', '上传成功', `成功上传 ${newSamples.length} 个样表文件`);
                    ActivityLogger.add('上传样表', `${platform?.name} - ${newSamples.length}个文件`);
                } catch (err) {
                    addToast('error', '上传失败', err.message);
                } finally {
                    setIsUploading(false);
                    setUploadProgress(0);
                }
            };
            
            const deleteSample = (index) => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].filter((_, i) => i !== index)
                    }
                }));
                addToast('success', '删除成功', '样表已删除');
            };
            
            const deleteSelected = () => {
                Store.set(s => ({
                    ...s,
                    samples: {
                        ...s.samples,
                        [currentPlatform]: s.samples[currentPlatform].filter((_, i) => !selectedItems.has(i))
                    }
                }));
                setSelectedItems(new Set());
                addToast('success', '批量删除', `已删除 ${selectedItems.size} 个文件`);
            };
            
            const toggleSelect = (index) => {
                const newSet = new Set(selectedItems);
                if (newSet.has(index)) {
                    newSet.delete(index);
                } else {
                    newSet.add(index);
                }
                setSelectedItems(newSet);
            };
            
            const toggleSelectAll = () => {
                if (selectedItems.size === samples.length) {
                    setSelectedItems(new Set());
                } else {
                    setSelectedItems(new Set(samples.map((_, i) => i)));
                }
            };
            
            const filteredSamples = samples.filter(s => 
                s.fileName.toLowerCase().includes(searchQuery.toLowerCase())
            );
            
            const formatTime = (isoString) => {
                return new Date(isoString).toLocaleString('zh-CN');
            };
            
            return (
                <div className="fade-in">
                    <div className="dm-tabs">
                        {tabs.map(tab => (
                            <div 
                                key={tab.id}
                                className={`dm-tab ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                    {tab.icon}
                                    {tab.name}
                                </span>
                            </div>
                        ))}
                    </div>
                    
                    {activeTab === 'samples' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.FileSpreadsheet />
                                        样表管理
                                    </div>
                                    <div className="card-desc">
                                        上传样表文件，用于配置计算规则时引用数据表和字段
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: 10 }}>
                                    <Button onClick={() => fileInputRef.current?.click()} loading={isUploading}>
                                        <Icons.Upload />
                                        上传样表
                                    </Button>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        accept=".xlsx,.xls"
                                        multiple
                                        onChange={handleSampleUpload}
                                        style={{ display: 'none' }}
                                    />
                                </div>
                            </div>
                            
                            {isUploading && (
                                <div style={{ marginBottom: 16 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                        <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>上传中...</span>
                                        <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{uploadProgress}%</span>
                                    </div>
                                    <div className="progress-bar">
                                        <div className="progress-fill" style={{ width: `${uploadProgress}%` }}></div>
                                    </div>
                                </div>
                            )}
                            
                            <div className="search-bar">
                                <span className="search-bar-icon"><Icons.Search /></span>
                                <input 
                                    type="text"
                                    className="input"
                                    placeholder="搜索文件名..."
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                            </div>
                            
                            {selectedItems.size > 0 && (
                                <div className="batch-actions-bar">
                                    <span className="batch-actions-count">
                                        已选择 {selectedItems.size} 项
                                    </span>
                                    <div className="batch-actions-actions">
                                        <Button size="sm" onClick={() => setSelectedItems(new Set())}>
                                            取消选择
                                        </Button>
                                        <Button type="danger" size="sm" onClick={deleteSelected}>
                                            <Icons.Trash />
                                            批量删除
                                        </Button>
                                    </div>
                                </div>
                            )}
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th className="checkbox-cell">
                                                <input 
                                                    type="checkbox"
                                                    checked={selectedItems.size === samples.length && samples.length > 0}
                                                    onChange={toggleSelectAll}
                                                />
                                            </th>
                                            <th>文件名</th>
                                            <th style={{ width: 120 }}>大小</th>
                                            <th style={{ width: 100 }}>工作表数</th>
                                            <th style={{ width: 100 }}>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredSamples.length === 0 ? (
                                            <tr>
                                                <td colSpan={5}>
                                                    <div className="empty" style={{ padding: '40px 20px' }}>
                                                        <div className="empty-icon">📁</div>
                                                        <div className="empty-text">暂无样表文件</div>
                                                        <div className="empty-desc">上传样表文件以配置计算规则</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredSamples.map((sample, idx) => (
                                                <tr key={idx} className={selectedItems.has(idx) ? 'highlight' : ''}>
                                                    <td className="checkbox-cell">
                                                        <input 
                                                            type="checkbox"
                                                            checked={selectedItems.has(idx)}
                                                            onChange={() => toggleSelect(idx)}
                                                        />
                                                    </td>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                                            <Icons.FileSpreadsheet />
                                                            <span style={{ fontWeight: 500 }}>{sample.fileName}</span>
                                                        </div>
                                                    </td>
                                                    <td>{ExcelUtils.formatSize(sample.fileSize)}</td>
                                                    <td>{Object.keys(sample.sheets).length}</td>
                                                    <td>
                                                        <button 
                                                            className="btn-link"
                                                            style={{ color: 'var(--danger)', marginRight: 10 }}
                                                            onClick={() => deleteSample(idx)}
                                                        >
                                                            删除
                                                        </button>
                                                        <button className="btn-link">
                                                            <Icons.Eye /> 预览
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    
                    {activeTab === 'batch' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.Calculator />
                                        批量计算
                                    </div>
                                    <div className="card-desc">
                                        上传店铺数据，一键批量生成利润表
                                    </div>
                                </div>
                                <Button type="primary">
                                    <Icons.Play />
                                    开始计算
                                </Button>
                            </div>
                            
                            <Alert type="info">
                                <strong>使用说明：</strong>批量计算功能需要先完成模板配置和规则配置。请确保已上传利润表模板并配置好各字段的计算规则。
                            </Alert>
                            
                            <div className="batch-upload-section">
                                <div className="batch-shop-list">
                                    <div className="section-title">店铺列表</div>
                                    <div style={{ 
                                        padding: '12px',
                                        background: 'var(--bg-tertiary)',
                                        borderRadius: 'var(--radius-lg)',
                                        textAlign: 'center',
                                        color: 'var(--text-tertiary)',
                                        fontSize: 13
                                    }}>
                                        暂无店铺数据
                                    </div>
                                </div>
                                <div className="batch-main">
                                    <div className="upload-area" style={{ padding: '48px 24px' }}>
                                        <div className="upload-icon">📊</div>
                                        <div className="upload-text">上传店铺数据文件</div>
                                        <div className="upload-hint">支持批量上传多个店铺的数据表</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {activeTab === 'history' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.History />
                                        计算记录
                                    </div>
                                    <div className="card-desc">
                                        查看历史计算任务和结果
                                    </div>
                                </div>
                                <Button>
                                    <Icons.Download />
                                    导出记录
                                </Button>
                            </div>
                            
                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>平台</th>
                                            <th>店铺数</th>
                                            <th>状态</th>
                                            <th style={{ width: 120 }}>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {calcHistory.length === 0 ? (
                                            <tr>
                                                <td colSpan={5}>
                                                    <div className="empty" style={{ padding: '40px 20px' }}>
                                                        <div className="empty-icon">📋</div>
                                                        <div className="empty-text">暂无计算记录</div>
                                                        <div className="empty-desc">完成批量计算后会在这里显示记录</div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            calcHistory.map((item, idx) => (
                                                <tr key={idx}>
                                                    <td>{formatTime(item.time)}</td>
                                                    <td>{item.platform}</td>
                                                    <td>{item.shopCount}</td>
                                                    <td>
                                                        <Tag type={item.status === 'success' ? 'success' : item.status === 'processing' ? 'warning' : 'danger'}>
                                                            {item.status === 'success' ? '成功' : item.status === 'processing' ? '处理中' : '失败'}
                                                        </Tag>
                                                    </td>
                                                    <td>
                                                        <button className="btn-link">
                                                            <Icons.Download /> 下载
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    
                    {activeTab === 'externals' && (
                        <div className="card">
                            <div className="card-header">
                                <div>
                                    <div className="card-title">
                                        <Icons.Database />
                                        外部数据
                                    </div>
                                    <div className="card-desc">
                                        管理跨平台共享的外部数据表（如商品成本、费率等）
                                    </div>
                                </div>
                                <Button type="primary">
                                    <Icons.Plus />
                                    新建数据表
                                </Button>
                            </div>
                            
                            <Alert type="info">
                                <strong>外部数据表：</strong>外部数据可以被所有平台的计算规则引用，支持实时编辑。例如商品成本表、平台费率表等。
                            </Alert>
                            
                            <div className="empty" style={{ padding: '40px 20px' }}>
                                <div className="empty-icon">🗄️</div>
                                <div className="empty-text">暂无外部数据表</div>
                                <div className="empty-desc">点击「新建数据表」添加外部数据</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        // ========== Main App ==========
        const App = () => {
            const [state, setState] = useState(Store.get());
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [currentPlatform, setCurrentPlatform] = useState('pdd');
            const [showShortcuts, setShowShortcuts] = useState(true);
            
            useEffect(() => {
                const unsub = Store.sub(newState => {
                    setState({ ...newState });
                });
                return unsub;
            }, []);
            
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch (e.key) {
                            case '1':
                                e.preventDefault();
                                setCurrentPage('dashboard');
                                break;
                            case '2':
                                e.preventDefault();
                                setCurrentPage('template');
                                break;
                            case '3':
                                e.preventDefault();
                                setCurrentPage('rules');
                                break;
                            case '4':
                                e.preventDefault();
                                setCurrentPage('data');
                                break;
                            case 's':
                                e.preventDefault();
                                break;
                        }
                    }
                    if (e.key === 'Escape') {
                        setShowShortcuts(false);
                    }
                };
                
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);
            
            const navItems = [
                { id: 'dashboard', name: '数据概览', icon: <Icons.Home /> },
                { id: 'template', name: '模板中心', icon: <Icons.FileSpreadsheet /> },
                { id: 'rules', name: '计算规则', icon: <Icons.Calculator /> },
                { id: 'data', name: '数据管理', icon: <Icons.Database /> }
            ];
            
            const pageTitles = {
                dashboard: { title: '数据概览', subtitle: '查看系统配置和统计信息' },
                template: { title: '模板中心', subtitle: '上传和配置利润表模板' },
                rules: { title: '计算规则', subtitle: '配置字段的计算逻辑' },
                data: { title: '数据管理', subtitle: '管理样表数据和批量计算' }
            };
            
            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <DashboardPage state={state} onNavigate={setCurrentPage} />;
                    case 'template':
                        return <TemplatePage state={state} currentPlatform={currentPlatform} />;
                    case 'rules':
                        return <RulesPage state={state} currentPlatform={currentPlatform} />;
                    case 'data':
                        return <DataPage state={state} currentPlatform={currentPlatform} />;
                    default:
                        return <DashboardPage state={state} onNavigate={setCurrentPage} />;
                }
            };
            
            return (
                <div className="app">
                    <aside className="sidebar">
                        <div className="sidebar-logo">
                            <div className="sidebar-logo-icon">￥</div>
                            <div>
                                <div className="sidebar-logo-text">利润计算系统</div>
                                <div className="sidebar-logo-sub">PROFIT CALCULATOR</div>
                            </div>
                        </div>
                        
                        <nav className="sidebar-nav">
                            {navItems.map(item => (
                                <div 
                                    key={item.id}
                                    className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPage(item.id)}
                                >
                                    <span className="nav-icon">{item.icon}</span>
                                    <span>{item.name}</span>
                                </div>
                            ))}
                        </nav>
                        
                        <div className="sidebar-platforms">
                            <div className="platform-label">平台切换</div>
                            {state.platforms.map(platform => (
                                <div 
                                    key={platform.id}
                                    className={`platform-item ${currentPlatform === platform.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPlatform(platform.id)}
                                >
                                    <span>{platform.emoji}</span>
                                    <span>{platform.name}</span>
                                    <span className="platform-badge">{platform.shops.length}店</span>
                                </div>
                            ))}
                        </div>
                    </aside>
                    
                    <main className="main">
                        <header className="main-header">
                            <div className="main-header-left">
                                <div>
                                    <div className="main-title">
                                        {pageTitles[currentPage]?.title}
                                        <span style={{ 
                                            marginLeft: 12, 
                                            fontSize: 13, 
                                            fontWeight: 500,
                                            color: 'var(--text-tertiary)'
                                        }}>
                                            {state.platforms.find(p => p.id === currentPlatform)?.emoji}
                                            {state.platforms.find(p => p.id === currentPlatform)?.name}
                                        </span>
                                    </div>
                                    <div className="main-subtitle">
                                        {pageTitles[currentPage]?.subtitle}
                                    </div>
                                </div>
                            </div>
                            <div className="main-header-actions">
                                <Button size="sm" onClick={() => {
                                    const data = Store.exportData();
                                    const blob = new Blob([data], { type: 'application/json' });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.download = `profit-config-${new Date().toISOString().slice(0,10)}.json`;
                                    a.click();
                                    URL.revokeObjectURL(url);
                                }}>
                                    <Icons.Download />
                                    导出配置
                                </Button>
                                <Button size="sm" onClick={() => {
                                    const input = document.createElement('input');
                                    input.type = 'file';
                                    input.accept = '.json';
                                    input.onchange = async (e) => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        const text = await file.text();
                                        try {
                                            Store.importData(text);
                                            ActivityLogger.add('导入配置', file.name);
                                        } catch (err) {
                                            alert('导入失败: ' + err.message);
                                        }
                                    };
                                    input.click();
                                }}>
                                    <Icons.Upload />
                                    导入配置
                                </Button>
                            </div>
                        </header>
                        
                        <div className="main-content">
                            {renderPage()}
                        </div>
                    </main>
                    
                    {showShortcuts && (
                        <div className="shortcut-hint" onClick={() => setShowShortcuts(false)}>
                            <span style={{ marginRight: 8 }}>💡</span>
                            快捷键: 
                            <span className="shortcut-key">Ctrl</span>+
                            <span className="shortcut-key">1-4</span> 切换页面
                            <span style={{ marginLeft: 8, color: 'var(--text-quaternary)', fontSize: 11 }}>
                                (点击关闭)
                            </span>
                        </div>
                    )}
                </div>
            );
        };
        
        const Root = () => (
            <ErrorBoundary>
                <ToastProvider>
                    <App />
                </ToastProvider>
            </ErrorBoundary>
        );
        
        ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
    </script>
</body>
</html>
