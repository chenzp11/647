        // ========== Rules Page ==========
        const RulesPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [activeField, setActiveField] = useState(null);
            const [expandedStep, setExpandedStep] = useState(null);
            const [showPreview, setShowPreview] = useState(false);
            const [previewResult, setPreviewResult] = useState(null);
            const [presetCategory, setPresetCategory] = useState('all');
            const [fieldSearch, setFieldSearch] = useState('');
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [copySourceFieldId, setCopySourceFieldId] = useState('');
            const [showPresets, setShowPresets] = useState(false);
            const [debugMode, setDebugMode] = useState(false);
            const [confirmDialog, setConfirmDialog] = useState(null);
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const template = state.templates[currentPlatform];
            const savedRules = state.rules[currentPlatform] || {};
            
            const fields = template?.parseResult?.fields || [];
            const currentRule = activeField ? savedRules[activeField.id] : null;
            
            useEffect(() => {
                if (fields.length > 0 && !activeField) {
                    setActiveField(fields[0]);
                    setExpandedStep(null);
                }
            }, [fields]);
            
            useEffect(() => {
                setPresetCategory(currentPlatform || 'all');
            }, [currentPlatform]);
            
            // 调试模式下实时预览
            useEffect(() => {
                if (debugMode && activeField && currentRule && currentRule.steps.length > 0) {
                    const samples = state.samples[currentPlatform] || [];
                    const tables = samples.map((s, i) => ({
                        id: `sample_${i}`,
                        name: s.alias || s.fileName,
                        originalName: s.fileName,
                        headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || [],
                        rows: s.sheets[Object.keys(s.sheets)[0]]?.rows || []
                    }));
                    try {
                        const savedFieldValues = getSavedFieldValues();
                        const result = CalcEngine.exec(currentRule, tables, { 
                            externals: state.externals || [],
                            shopName: platform?.shops?.[0]?.name || '示例店铺',
                            fieldSemanticType: activeField.semanticType || '',
                            fieldType: activeField.type || 'value',
                            savedFieldValues
                        });
                        setPreviewResult(result);
                    } catch (e) {
                        setPreviewResult({ error: e.message });
                    }
                } else {
                    setPreviewResult(null);
                }
            }, [debugMode, activeField, currentRule, state.rules]);
            
            const filteredFields = fields.filter(f => 
                f.name.toLowerCase().includes(fieldSearch.toLowerCase()) ||
                (f.cell || '').toLowerCase().includes(fieldSearch.toLowerCase())
            );
            
            const completedCount = fields.filter(f => (savedRules[f.id]?.steps || []).length > 0).length;
            const completionRate = fields.length > 0 ? Math.round(completedCount / fields.length * 100) : 0;
            
            const inferFieldLevel = (field) => {
                const steps = savedRules[field.id]?.steps || [];
                if (steps.length === 0) return null;
                const hasJoin = steps.some(s => s.type === 'join');
                const hasVirtual = steps.some(s => s.type === 'virtual');
                const hasFilter = steps.some(s => s.type === 'filter');
                if (hasJoin || hasVirtual) return 2;
                if (hasFilter) return 1;
                return 0;
            };
            
            const validateRule = (rule, field) => {
                if (!rule || !rule.steps || rule.steps.length === 0) {
                    return { valid: false, msg: '尚未配置任何步骤' };
                }
                const firstStep = rule.steps[0];
                const semanticType = field?.semanticType || '';
                
                if (['shop', 'year', 'month', 'day', 'date', 'text'].includes(semanticType) && firstStep.type === 'fill') {
                    const cfg = firstStep.config || {};
                    if (cfg.fillType === 'auto' || cfg.fillType === 'shop' || cfg.fillType === 'date') {
                        return { valid: true, msg: '配置完整（自动填充）' };
                    }
                    if (cfg.fillType === 'field') {
                        if (!cfg.sourceTable) return { valid: false, msg: '请选择数据源表' };
                        if (!cfg.sourceField) return { valid: false, msg: '请选择目标字段' };
                        return { valid: true, msg: '配置完整' };
                    }
                }
                
                const source = rule.steps.find(s => s.type === 'source');
                if (!source) {
                    return { valid: false, msg: '缺少「数据源」步骤' };
                }
                if (!source.config.table) {
                    return { valid: false, msg: '「数据源」步骤未选择数据表' };
                }
                return { valid: true, msg: '配置完整' };
            };
            
            const recommendPreset = (fieldName) => {
                if (!fieldName) return null;
                const n = fieldName.toLowerCase();
                const allPresets = CalcEngine.getPresetTemplates();
                const list = [...(allPresets[currentPlatform] || []), ...(allPresets.all || [])];
                let score = list.map(p => {
                    let s = 0;
                    const pn = p.name.toLowerCase();
                    if (n.includes('销售') || n.includes('收入') || n.includes('实收') || n.includes('gmv')) {
                        if (p.category === 'sales') s += 10;
                    }
                    if (n.includes('成本') || n.includes('扣点') || n.includes('费用') || n.includes('退款')) {
                        if (p.category === 'cost') s += 10;
                    }
                    if (n.includes('利润') || n.includes('净利') || n.includes('roi')) {
                        if (p.category === 'profit') s += 10;
                    }
                    if (pn.includes(n) || n.includes(pn.split('·').pop().toLowerCase())) s += 5;
                    return { p, s };
                });
                score.sort((a, b) => b.s - a.s);
                return score[0]?.s > 0 ? score[0].p : null;
            };
            
            const copyFieldRule = (sourceId, targetId) => {
                if (!sourceId || !targetId || sourceId === targetId) {
                    addToast('warning', '复制失败', '请选择不同的源字段和目标字段');
                    return;
                }
                const sourceRule = savedRules[sourceId];
                if (!sourceRule?.steps?.length) {
                    addToast('warning', '复制失败', '源字段尚未配置规则');
                    return;
                }
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [targetId]: {
                                ...savedRules[targetId],
                                steps: sourceRule.steps.map((step, i) => ({
                                    ...step,
                                    id: `step_${Date.now()}_${i}`
                                }))
                            }
                        }
                    }
                }));
                addToast('success', '复制成功', `已复制规则到目标字段`);
                setShowCopyModal(false);
                setCopySourceFieldId('');
            };
            
            const clearFieldRule = (fieldId) => {
                setConfirmDialog({
                    title: '确认清空规则',
                    message: '确认清空此字段的计算规则？此操作不可撤销。',
                    type: 'warning',
                    onConfirm: () => {
                        Store.set(s => ({
                            ...s,
                            rules: {
                                ...s.rules,
                                [currentPlatform]: {
                                    ...savedRules,
                                    [fieldId]: { steps: [], saved: false }
                                }
                            }
                        }));
                        addToast('info', '已清空', '字段规则已重置');
                        setConfirmDialog(null);
                    },
                    onCancel: () => setConfirmDialog(null)
                });
            };
            
            const saveFieldRule = (fieldId) => {
                const rule = savedRules[fieldId];
                if (!rule?.steps?.length) {
                    addToast('warning', '保存失败', '该字段尚未配置任何计算步骤');
                    return;
                }
                const validation = validateRule(rule, fields.find(f => f.id === fieldId));
                if (!validation.valid) {
                    addToast('warning', '保存失败', `规则配置不完整：${validation.msg}`);
                    return;
                }
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [fieldId]: {
                                ...rule,
                                saved: true,
                                savedAt: new Date().toISOString()
                            }
                        }
                    }
                }));
                addToast('success', '保存成功', '字段规则已保存');
            };
            
            const getSavedFieldValues = () => {
                const savedValues = {};
                const allRules = state.rules[currentPlatform] || {};
                const samples = state.samples[currentPlatform] || [];
                const tables = samples.map((s, i) => ({
                    id: `sample_${i}`,
                    name: s.alias || s.fileName,
                    originalName: s.fileName,
                    headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || [],
                    rows: s.sheets[Object.keys(s.sheets)[0]]?.rows || []
                }));
                
                fields.forEach(field => {
                    const rule = allRules[field.id];
                    if (rule?.saved && rule.steps?.length) {
                        try {
                            const result = CalcEngine.exec(rule, tables, {
                                externals: state.externals || [],
                                shopName: platform?.shops?.[0]?.name || '',
                                fieldSemanticType: field.semanticType || '',
                                fieldType: field.type || ''
                            });
                            if (result && result.value !== undefined && result.value !== null) {
                                savedValues[field.name] = typeof result.value === 'number' ? result.value : String(result.value);
                            }
                        } catch (e) {
                            console.warn(`Failed to compute saved field ${field.name}:`, e);
                        }
                    }
                });
                
                return savedValues;
            };
            
            const getStepTypeInfo = (type) => {
                const types = {
                    source: { name: '数据源', icon: <Icons.Database />, color: 'var(--primary)', bg: 'var(--primary-light)' },
                    fill: { name: '填充占位符', icon: <Icons.Edit3 />, color: 'var(--info)', bg: 'var(--info-light)' },
                    filter: { name: '过滤', icon: <Icons.Filter />, color: 'var(--warning)', bg: 'var(--warning-light)' },
                    virtual: { name: '虚拟字段', icon: <Icons.Sparkles />, color: 'var(--purple)', bg: 'var(--purple-light)' },
                    join: { name: '跨表关联', icon: <Icons.Layers />, color: 'var(--info)', bg: 'var(--info-light)' },
                    aggregate: { name: '聚合', icon: <Icons.Calculator />, color: 'var(--success)', bg: 'var(--success-light)' },
                    formula: { name: '公式计算', icon: <Icons.Calculator />, color: 'var(--primary)', bg: 'var(--primary-light)' },
                    constant: { name: '常量值', icon: <Icons.FileText />, color: 'var(--text-tertiary)', bg: 'var(--bg-tertiary)' },
                    text: { name: '文本处理', icon: <Icons.FileText />, color: 'var(--info)', bg: 'var(--info-light)' },
                    distinct: { name: '去重', icon: <Icons.Filter />, color: 'var(--warning)', bg: 'var(--warning-light)' },
                    sort: { name: '排序', icon: <Icons.Layers />, color: 'var(--info)', bg: 'var(--info-light)' },
                    limit: { name: '限制', icon: <Icons.FileText />, color: 'var(--text-tertiary)', bg: 'var(--bg-tertiary)' },
                    lookup: { name: '查找替换', icon: <Icons.Search />, color: 'var(--info)', bg: 'var(--info-light)' },
                    condition: { name: '条件判断', icon: <Icons.Sparkles />, color: 'var(--purple)', bg: 'var(--purple-light)' },
                    group: { name: '分组聚合', icon: <Icons.Calculator />, color: 'var(--success)', bg: 'var(--success-light)' }
                };
                return types[type] || { name: type, icon: <Icons.Settings />, color: 'var(--text-tertiary)', bg: 'var(--bg-tertiary)' };
            };
            
            const validateStep = (step, rule, field) => {
                if (!step) return { valid: true, message: '' };
                const cfg = step.config || {};
                const semanticType = field?.semanticType || '';
                
                switch (step.type) {
                    case 'fill':
                        if (cfg.fillType === 'field') {
                            if (!cfg.sourceTable) return { valid: false, message: '请选择数据源表' };
                            if (!cfg.sourceField) return { valid: false, message: '请选择目标字段' };
                        }
                        if (cfg.fillType === 'auto' && !semanticType) {
                            return { valid: false, message: '无法识别字段类型，请手动选择填充方式' };
                        }
                        return { valid: true, message: '配置完整' };
                    case 'source':
                        if (!cfg.table) return { valid: false, message: '请选择数据表' };
                        return { valid: true, message: '配置完整' };
                    case 'filter':
                        if (!cfg.column) return { valid: false, message: '请选择过滤字段' };
                        if (cfg.op && cfg.op !== 'notEmpty' && cfg.op !== 'empty') {
                            if (cfg.value === undefined || cfg.value === '' || cfg.value === null) {
                                return { valid: false, message: '请输入过滤值' };
                            }
                        }
                        return { valid: true, message: '配置完整' };
                    case 'virtual':
                        if (!cfg.name) return { valid: false, message: '请输入虚拟字段名' };
                        if (!cfg.pattern) return { valid: false, message: '请输入提取规则' };
                        return { valid: true, message: '配置完整' };
                    case 'join':
                        if (!cfg.table) return { valid: false, message: '请选择关联表' };
                        if (!cfg.key) return { valid: false, message: '请选择主表关联键' };
                        if (!cfg.fk) return { valid: false, message: '请选择从表关联键' };
                        if (!cfg.col) return { valid: false, message: '请选择目标列' };
                        return { valid: true, message: '配置完整' };
                    case 'aggregate':
                        if (!cfg.func) return { valid: false, message: '请选择聚合函数' };
                        return { valid: true, message: '配置完整' };
                    case 'formula':
                        if (!cfg.expr) return { valid: false, message: '请输入计算公式' };
                        return { valid: true, message: '配置完整' };
                    case 'condition':
                        if (!cfg.column) return { valid: false, message: '请选择判断字段' };
                        return { valid: true, message: '配置完整' };
                    case 'group':
                        if (!cfg.column) return { valid: false, message: '请选择分组字段' };
                        return { valid: true, message: '配置完整' };
                    case 'limit':
                        if (!cfg.count) return { valid: false, message: '请输入限制数量' };
                        return { valid: true, message: '配置完整' };
                    case 'lookup':
                        if (!cfg.pairs || cfg.pairs.length === 0) return { valid: false, message: '请添加查找替换对' };
                        return { valid: true, message: '配置完整' };
                    case 'sort':
                        if (!cfg.column) return { valid: false, message: '请选择排序字段' };
                        return { valid: true, message: '配置完整' };
                    default:
                        return { valid: true, message: '配置完整' };
                }
            };
            
            const getStepHint = (step, rule, field) => {
                if (!step) return null;
                const hints = [];
                const semanticType = field?.semanticType || '';
                const stepIdx = rule?.steps?.findIndex(s => s.id === step.id) ?? -1;
                
                if (stepIdx === 0 && step.type === 'source') {
                    if (semanticType === 'shop' || semanticType === 'year' || semanticType === 'month') {
                        hints.push({ type: 'info', text: '💡 该字段为占位符，建议使用「填充占位符」步骤，无需数据源' });
                    }
                }
                
                if (stepIdx === 0 && step.type === 'fill' && (semanticType === 'value' || !semanticType)) {
                    if (field?.type === 'value') {
                        hints.push({ type: 'warning', text: '💡 数值字段建议从「数据源」步骤开始配置' });
                    }
                }
                
                if (step.type === 'source' && stepIdx > 0 && rule?.steps?.[0]?.type === 'source') {
                    hints.push({ type: 'warning', text: '⚠ 已有数据源步骤，第二个数据源通常需要「跨表关联」配合使用' });
                }
                
                if (step.type === 'aggregate' && stepIdx > 0) {
                    const prevHasData = rule?.steps?.slice(0, stepIdx)?.some(s => s.type === 'source' || s.type === 'fill');
                    if (!prevHasData) {
                        hints.push({ type: 'error', text: '❌ 聚合步骤前需要有数据源步骤' });
                    }
                }
                
                return hints;
            };
            
            const getCategoryInfo = (cat) => {
                const map = {
                    sales: { name: '销售类', icon: '💰', color: 'var(--success)' },
                    cost: { name: '成本类', icon: '🧾', color: 'var(--warning)' },
                    profit: { name: '利润类', icon: '📈', color: 'var(--primary)' }
                };
                return map[cat] || { name: cat, icon: '📦', color: 'var(--text-tertiary)' };
            };
            
            const summarizeStep = (step) => {
                if (!step || !step.config) return '';
                const c = step.config;
                switch (step.type) {
                    case 'fill': {
                        const typeNames = { auto: '自动', manual: '手动', date: '日期', field: '数据字段', shop: '店铺名' };
                        const tn = typeNames[c.fillType] || '自动';
                        if (c.fillType === 'date') return `日期: ${c.dateFormat || 'yyyy-mm'}`;
                        if (c.fillType === 'manual' || c.fillType === 'shop') return `值: ${c.value || '(空)'}`;
                        if (c.fillType === 'field') return `取: ${c.sourceField || '?'}`;
                        return `类型: ${tn}`;
                    }
                    case 'source': return c.column ? `列: ${c.column}` : '未选列';
                    case 'filter': return c.column && c.op ? `${c.column} ${c.op} ${c.value || ''}` : '未配置';
                    case 'virtual': return c.source && c.target ? `${c.source} → ${c.target} (${c.rule || 'copy'})` : '未配置';
                    case 'join': return c.key && c.fk ? `${c.key}=${c.fk}.${c.col || '?'}` : '未配置';
                    case 'aggregate': return `${c.func || 'sum'}${c.column ? `(${c.column})` : '()'}`;
                    case 'formula': return c.expr || '未配置';
                    case 'constant': return `值: ${c.value}`;
                    case 'text': return c.value || '未配置';
                    case 'distinct': return `去重: ${c.column || 'val'}`;
                    case 'sort': return `排序: ${c.column || 'val'} ${c.direction === 'desc' ? '↓' : '↑'}`;
                    case 'limit': return `限制: ${c.count || 100}行`;
                    case 'lookup': return `查找替换: ${c.column || 'val'} (${(c.pairs || []).length}条映射)`;
                    case 'condition': return `条件: ${c.column || 'val'} ${c.op || '=='} ${c.value || '?'}`;
                    case 'group': return `分组: ${c.column || '?'} → ${c.func || 'sum'}(${c.aggColumn || 'val'})`;
                    default: return '';
                }
            };
            
            const duplicateStep = (stepId) => {
                if (!activeField || !currentRule) return;
                const idx = currentRule.steps.findIndex(s => s.id === stepId);
                if (idx === -1) return;
                const orig = currentRule.steps[idx];
                const newStep = {
                    ...orig,
                    id: `step_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                    config: { ...orig.config }
                };
                const newSteps = [
                    ...currentRule.steps.slice(0, idx + 1),
                    newStep,
                    ...currentRule.steps.slice(idx + 1)
                ];
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
                setExpandedStep(newStep.id);
                addToast('success', '克隆成功', '已克隆该步骤');
            };
            
            const addStep = (type) => {
                if (!activeField) return;
                
                const currentSteps = currentRule?.steps || [];
                
                const stepLogicChecks = {
                    source: () => {
                        const hasSource = currentSteps.some(s => s.type === 'source');
                        if (hasSource) return { ok: false, msg: '每个规则只能有一个「数据源」步骤' };
                        if (currentSteps.length > 0) return { ok: false, msg: '「数据源」必须是第一个步骤' };
                        return { ok: true };
                    },
                    fill: () => {
                        // 填充占位符步骤：文本字段专用，不需要数据源
                        return { ok: true };
                    },
                    filter: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「过滤」前需要有「数据源」' };
                        const lastAggIdx = currentSteps.map((s, i) => s.type === 'aggregate' ? i : -1).filter(i => i >= 0).pop();
                        if (lastAggIdx !== undefined && lastAggIdx >= 0 && lastAggIdx < currentSteps.length - 1) {
                            return { ok: false, msg: '「聚合」之后不能再添加「过滤」' };
                        }
                        return { ok: true };
                    },
                    virtual: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「虚拟字段」前需要有「数据源」' };
                        return { ok: true };
                    },
                    join: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「跨表关联」前需要有「数据源」' };
                        return { ok: true };
                    },
                    aggregate: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「聚合」前需要有「数据源」' };
                        return { ok: true };
                    },
                    formula: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「公式计算」前需要有「数据源」' };
                        return { ok: true };
                    },
                    constant: () => ({ ok: true }),
                    text: () => ({ ok: true }),
                    distinct: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「去重」前需要有「数据源」' };
                        return { ok: true };
                    },
                    sort: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「排序」前需要有「数据源」' };
                        return { ok: true };
                    },
                    limit: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「限制」前需要有「数据源」' };
                        return { ok: true };
                    },
                    lookup: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「查找替换」前需要有「数据源」' };
                        return { ok: true };
                    },
                    condition: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「条件判断」前需要有「数据源」' };
                        return { ok: true };
                    },
                    group: () => {
                        if (currentSteps.length === 0) return { ok: false, msg: '「分组聚合」前需要有「数据源」' };
                        return { ok: true };
                    }
                };
                
                const check = stepLogicChecks[type] ? stepLogicChecks[type]() : { ok: true };
                if (!check.ok) {
                    addToast('warning', '步骤顺序不符合逻辑', check.msg);
                    return;
                }
                
                const defaultConfigs = {
                    source: { table: '', column: '' },
                    fill: { fillType: 'auto', value: '', dateFormat: 'yyyy-mm', sourceField: '', groupIndex: 0 },
                    filter: { column: '', op: '==', value: '' },
                    virtual: { source: '', target: '', rule: 'copy' },
                    join: { table: '', key: '', fk: '', col: '' },
                    aggregate: { column: '', func: 'sum' },
                    formula: { expr: '{val}' },
                    constant: { value: 0 },
                    text: { value: '' },
                    distinct: { column: '' },
                    sort: { column: '', direction: 'asc' },
                    limit: { count: 100 },
                    lookup: { column: '', pairs: [{ from: '', to: '' }] },
                    condition: { column: '', op: '==', value: '', trueValue: 1, falseValue: 0, resultCol: 'condition_result' },
                    group: { column: '', func: 'sum', aggColumn: 'val' }
                };
                
                const newStep = {
                    id: `step_${Date.now()}`,
                    type,
                    config: defaultConfigs[type] || {}
                };
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: [...currentSteps, newStep]
                            }
                        }
                    }
                }));
                
                setExpandedStep(newStep.id);
                addToast('success', '添加步骤', `已添加 ${getStepTypeInfo(type).name} 步骤`);
            };
            
            const updateStepConfig = (stepId, key, value) => {
                if (!activeField || !currentRule) return;
                
                const newSteps = currentRule.steps.map(s => 
                    s.id === stepId ? { ...s, config: { ...s.config, [key]: value } } : s
                );
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
            };
            
            const deleteStep = (stepId) => {
                if (!activeField || !currentRule) return;
                
                const newSteps = currentRule.steps.filter(s => s.id !== stepId);
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
                
                addToast('info', '删除步骤', '已删除计算步骤');
            };
            
            const moveStep = (stepId, direction) => {
                if (!activeField || !currentRule) return;
                
                const steps = [...currentRule.steps];
                const idx = steps.findIndex(s => s.id === stepId);
                if (idx === -1) return;
                
                const newIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (newIdx < 0 || newIdx >= steps.length) return;
                
                [steps[idx], steps[newIdx]] = [steps[newIdx], steps[idx]];
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps
                            }
                        }
                    }
                }));
            };
            
            const applyPreset = (preset) => {
                if (!activeField) return;
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: preset.steps.map((s, i) => ({
                                    ...s,
                                    id: `step_${Date.now()}_${i}`
                                }))
                            }
                        }
                    }
                }));
                
                addToast('success', '套用模板', `已应用「${preset.name}」模板`);
            };
            
            const runPreview = () => {
                if (!activeField || !currentRule) return;
                
                const samples = state.samples[currentPlatform] || [];
                const tables = samples.map((s, i) => ({
                    id: `sample_${i}`,
                    name: s.alias || s.fileName,
                    originalName: s.fileName,
                    headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || [],
                    rows: s.sheets[Object.keys(s.sheets)[0]]?.rows || []
                }));
                
                const result = CalcEngine.exec(currentRule, tables, { externals: state.externals || [] });
                setPreviewResult(result);
                setShowPreview(true);
            };
            
            const renderStepConfig = (step, currentFieldRef) => {
                const samples = state.samples[currentPlatform] || [];
                const sampleTables = samples.map((s, i) => ({
                    id: s.id || `sample_${i}`,
                    name: s.alias || s.fileName,
                    originalName: s.fileName,
                    headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || []
                }));
                
                switch (step.type) {
                    case 'fill': {
                        const currentField = currentFieldRef || {};
                        const detectedType = currentField.semanticType || 'auto';
                        return (
                            <div className="step-config">
                                <div className="form-item">
                                    <label className="form-label">填充方式</label>
                                    <select 
                                        className="select"
                                        value={step.config.fillType}
                                        onChange={e => updateStepConfig(step.id, 'fillType', e.target.value)}
                                    >
                                        <option value="auto">🤖 自动识别（根据占位符类型）</option>
                                        <option value="shop">🏪 店铺名（从当前店铺）</option>
                                        <option value="date">📅 日期（自动填当前日期）</option>
                                        <option value="field">📊 从数据字段取值</option>
                                    </select>
                                </div>
                                
                                {step.config.fillType === 'auto' && (
                                    <div className="step-info-box">
                                        <div className="step-info-title">
                                            <Icons.Sparkles />
                                            <span>自动填充规则</span>
                                        </div>
                                        <div className="step-info-content">
                                            <div className="step-info-row">
                                                <span className="step-info-label">当前字段类型：</span>
                                                <span className="step-info-value">
                                                    {detectedType === 'shop' && '🏪 店铺名占位符'}
                                                    {detectedType === 'year' && '📅 年份占位符'}

        // ========== Batch Calculation Page ==========
        const BatchPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [batchFiles, setBatchFiles] = useState([]);
            const [isCalculating, setIsCalculating] = useState(false);
            const [calcProgress, setCalcProgress] = useState(0);
            const [results, setResults] = useState([]);
            const [expandedShops, setExpandedShops] = useState(new Set());
            const fileInputRef = useRef(null);
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const template = state.templates[currentPlatform];
            const rules = state.rules[currentPlatform] || {};
            const shops = platform?.shops || [];
            const samples = state.samples[currentPlatform] || [];
            
            const toggleShopExpand = (shopId) => {
                setExpandedShops(prev => {
                    const next = new Set(prev);
                    if (next.has(shopId)) {
                        next.delete(shopId);
                    } else {
                        next.add(shopId);
                    }
                    return next;
                });
            };
            
            const groupFilesByShop = () => {
                const groups = {};
                const unmatched = [];
                batchFiles.forEach(f => {
                    if (f.status === 'error') {
                        if (!groups._error) groups._error = [];
                        groups._error.push(f);
                    } else if (f.detectedShop) {
                        if (!groups[f.detectedShop.id]) groups[f.detectedShop.id] = [];
                        groups[f.detectedShop.id].push(f);
                    } else {
                        unmatched.push(f);
                    }
                });
                if (unmatched.length > 0) groups._unmatched = unmatched;
                return groups;
            };
            
            const detectShop = (fileName, fileData) => {
                const baseName = fileName.replace(/\.[^.]+$/, '').toLowerCase();
                for (const shop of shops) {
                    const shopName = shop.name.toLowerCase();
                    if (baseName.includes(shopName) || shopName.includes(baseName)) {
                        return shop;
                    }
                }
                const sheetNames = Object.keys(fileData.sheets || {});
                for (const sheetName of sheetNames) {
                    const lowerSheet = sheetName.toLowerCase();
                    for (const shop of shops) {
                        if (lowerSheet.includes(shop.name.toLowerCase())) {
                            return shop;
                        }
                    }
                }
                const firstSheet = Object.values(fileData.sheets || {})[0];
                if (firstSheet?.rows) {
                    for (let i = 0; i < Math.min(5, firstSheet.rows.length); i++) {
                        const row = firstSheet.rows[i];
                        const rowText = Object.values(row).map(v => String(v || '').toLowerCase()).join(' ');
                        for (const shop of shops) {
                            if (rowText.includes(shop.name.toLowerCase())) {
                                return shop;
                            }
                        }
                    }
                }
                return null;
            };
            
            const getMissingSampleTables = () => {
                const usedTables = new Set();
                const allRules = rules || {};
                Object.values(allRules).forEach(rule => {
                    (rule.steps || []).forEach(step => {
                        if (step.config?.table) {
                            usedTables.add(step.config.table);
                        }
                    });
                });
                const missing = [];
                usedTables.forEach(tableId => {
                    const sampleExists = samples.some(s => s.id === tableId || 
                        (tableId.startsWith('sample_') && samples[parseInt(tableId.replace('sample_', ''))]));
                    if (!sampleExists) {
                        const sampleInfo = samples.find(s => s.id === tableId);
                        missing.push(sampleInfo ? sampleInfo.alias || sampleInfo.fileName : tableId);
                    }
                });
                return missing;
            };
            
            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files || []);
                if (!files.length) return;
                const newFiles = [];
                for (const file of files) {
                    try {
                        const parsed = await ExcelUtils.parse(file);
                        const shop = detectShop(file.name, parsed);
                        newFiles.push({
                            id: `batch_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                            fileName: file.name,
                            fileSize: file.size,
                            data: parsed,
                            detectedShop: shop,
                            status: shop ? 'matched' : 'unmatched',
                            selected: true
                        });
                    } catch (err) {
                        newFiles.push({
                            id: `batch_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                            fileName: file.name,
                            fileSize: file.size,
                            error: err.message,
                            status: 'error',
                            selected: false
                        });
                    }
                }
                setBatchFiles(prev => [...prev, ...newFiles]);
                const matched = newFiles.filter(f => f.status === 'matched').length;
                const unmatched = newFiles.filter(f => f.status === 'unmatched').length;
                if (matched > 0) addToast('success', '识别完成', `成功识别 ${matched} 个店铺，${unmatched} 个未识别`);
            };
            
            const assignShop = (fileId, shopId) => {
                const shop = shops.find(s => s.id === shopId);
                setBatchFiles(prev => prev.map(f => f.id === fileId ? { ...f, detectedShop: shop || null, status: shop ? 'matched' : 'unmatched' } : f));
            };
            
            const removeFile = (fileId) => {
                setBatchFiles(prev => prev.filter(f => f.id !== fileId));
            };
            
            const toggleSelected = (fileId) => {
                setBatchFiles(prev => prev.map(f => f.id === fileId ? { ...f, selected: !f.selected } : f));
            };
            
            const toggleShopSelected = (shopId) => {
                const group = groupFilesByShop()[shopId];
                if (!group) return;
                const allSelected = group.every(f => f.selected);
                setBatchFiles(prev => prev.map(f => {
                    if (f.detectedShop?.id === shopId) {
                        return { ...f, selected: !allSelected };
                    }
                    return f;
                }));
            };
            
            const runBatchCalc = async () => {
                const selected = batchFiles.filter(f => f.selected && f.status !== 'error');
                if (!selected.length) {
                    addToast('warning', '请先选择文件', '至少选择一个要计算的文件');
                    return;
                }
                if (!template) {
                    addToast('warning', '缺少模板', '请先在模板中心上传利润表模板');
                    return;
                }
                const fields = template.parseResult?.fields || [];
                const configured = fields.filter(f => (rules[f.id]?.steps || []).length > 0);
                const unconfigured = fields.filter(f => !(rules[f.id]?.steps || []).length > 0);
                
                if (configured.length === 0) {
                    addToast('warning', '缺少计算规则', '请先在计算规则页面配置字段规则');
                    return;
                }
                
                if (unconfigured.length > 0) {
                    addToast('warning', '存在未配置字段', `以下字段尚未配置计算规则：${unconfigured.map(f => f.name).join(', ')}，计算时这些字段将显示为空`);
                }
                
                const missingSamples = getMissingSampleTables();
                if (missingSamples.length > 0) {
                    addToast('warning', '缺少样本数据', `计算规则引用了以下未上传的样本表：${missingSamples.join(', ')}，请先在样表管理页面上传`);
                    return;
                }
                
                setIsCalculating(true);
                setCalcProgress(0);
                const calcResults = [];
                
                for (let i = 0; i < selected.length; i++) {
                    const fileItem = selected[i];
                    try {
                        const firstSheet = Object.values(fileItem.data.sheets)[0];
                        if (!firstSheet) continue;
                        
                        const tables = [
                            { id: 'main', rows: firstSheet.rows, headers: firstSheet.headers, originalName: fileItem.fileName },
                            ...samples.map((s, idx) => ({
                                id: s.id || `sample_${idx}`,
                                name: s.alias || s.fileName,
                                originalName: s.fileName,
                                headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || [],
                                rows: s.sheets[Object.keys(s.sheets)[0]]?.rows || []
                            }))
                        ];
                        const resultValues = {};
                        
                        fields.forEach(field => {
                            const rule = rules[field.id];
                            if (rule?.steps?.length) {
                                const val = CalcEngine.exec(rule, tables, { 
                                    shopName: fileItem.detectedShop?.name || '',
                                    fieldSemanticType: field.semanticType || '',
                                    fieldType: field.type || '',
                                    fileName: fileItem.fileName,
                                    originalName: fileItem.fileName,
                                    externals: state.externals || []
                                });
                                resultValues[field.id] = val;
                            }
                        });
                        
                        calcResults.push({
                            fileId: fileItem.id,
                            fileName: fileItem.fileName,
                            shop: fileItem.detectedShop,
                            values: resultValues,
                            status: 'success'
                        });
                    } catch (err) {
                        calcResults.push({
                            fileId: fileItem.id,
                            fileName: fileItem.fileName,
                            shop: fileItem.detectedShop,
                            error: err.message,
                            status: 'error'
                        });
                    }
                    setCalcProgress(Math.round(((i + 1) / selected.length) * 100));
                }
                
                setResults(calcResults);
                setIsCalculating(false);
                
                const success = calcResults.filter(r => r.status === 'success').length;
                const shopNames = new Set(calcResults.filter(r => r.shop?.name).map(r => r.shop.name));
                const shopCount = shopNames.size || calcResults.length;
                addToast('success', '计算完成', `成功计算 ${success}/${calcResults.length} 个文件，共 ${shopCount} 个店铺`);
                
                Store.set(s => ({
                    ...s,
                    calcHistory: [{
                        id: Date.now(),
                        time: new Date().toISOString(),
                        platform: platform?.name,
                        shopCount: shopCount,
                        successCount: success,
                        status: success === calcResults.length ? 'success' : 'partial',
                        results: calcResults
                    }, ...(s.calcHistory || [])].slice(0, 100)
                }));
            };
            
            const downloadResults = () => {
                if (!template || results.length === 0) return;
                const fields = template.parseResult?.fields || [];
                const successResults = results.filter(r => r.status === 'success');
                
                const wb = XLSX.utils.book_new();
                
                if (template.aoa && successResults.length > 0) {
                    successResults.forEach((r, idx) => {
                        const filledAoa = template.aoa.map(row => [...row]);
                        
                        fields.forEach(field => {
                            if (field.row !== undefined && field.col !== undefined) {
                                const v = r.values[field.id];
                                const val = (v !== null && v !== undefined) 
                                    ? (typeof v === 'object' && v.val !== undefined ? v.val : v) 
                                    : '';
                                if (filledAoa[field.row] && filledAoa[field.row][field.col] !== undefined) {
                                    filledAoa[field.row][field.col] = val;
                                }
                            }
                        });
                        
                        const ws = XLSX.utils.aoa_to_sheet(filledAoa);
                        const sheetName = r.shop?.name ? `利润表_${r.shop.name}` : `利润表_${idx + 1}`;
                        XLSX.utils.book_append_sheet(wb, ws, sheetName);

                } else {
                    const aoa = [fields.map(f => f.name)];
                    successResults.forEach(r => {
                        const row = fields.map(f => {
                            const v = r.values[f.id];
                            if (v === null || v === undefined) return '';
                            if (typeof v === 'object' && v.val !== undefined) return v.val;
                            return v;

                        aoa.push(row);
                    });
                    const ws = XLSX.utils.aoa_to_sheet(aoa);
                    XLSX.utils.book_append_sheet(wb, ws, '利润表');
                }
                
                const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                ExcelUtils.download(buf, `利润表_${platform?.name}_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
                addToast('success', '下载成功', '利润表已生成');
            };
            
            const downloadSingleResult = (result) => {
                if (!template) return;
                const fields = template.parseResult?.fields || [];
                
                const wb = XLSX.utils.book_new();
                
                if (template.aoa) {

                    fields.forEach(field => {

                            const v = result.values[field.id];
                            const val = (v !== null && v !== undefined) 
                                ? (typeof v === 'object' && v.val !== undefined ? v.val : v) 
                                : '';
                            if (filledAoa[field.row] && filledAoa[field.row][field.col] !== undefined) {

                            }
                        }

                    const ws = XLSX.utils.aoa_to_sheet(filledAoa);
                    const sheetName = result.shop?.name ? `利润表_${result.shop.name}` : '利润表';
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                } else {

                    const row = fields.map(f => {

                        if (typeof v === 'object' && v.val !== undefined) return v.val;
                        return v;

                    aoa.push(row);
                    const ws = XLSX.utils.aoa_to_sheet(aoa);
                    XLSX.utils.book_append_sheet(wb, ws, '利润表');
                }
                
                const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const shopName = result.shop?.name || '未知店铺';
                ExcelUtils.download(buf, `利润表_${shopName}_${new Date().toLocaleDateString('zh-CN')}.xlsx`);

            const fileGroups = groupFilesByShop();
            
            return (

                        <div style={{ display: 'flex', gap: 10 }}>
                            {results.length > 0 && (
                                <Button onClick={downloadResults}>
                                    <Icons.Download />
                                    下载全部结果
                                </Button>
                            )}
                            <Button 
                                type="primary" 
                                onClick={runBatchCalc}
                                loading={isCalculating}
                                disabled={batchFiles.filter(f => f.selected).length === 0}
                            >
                                <Icons.Play />
                                {isCalculating ? '计算中...' : '开始计算'}
                            </Button>
                        </div>
                    </div>
                    
                    <Alert type="info">
                        <strong>批量计算流程：</strong>① 上传店铺数据文件 → ② 系统自动识别店铺（支持文件名、工作表名、内容匹配）→ ③ 应用计算规则 → ④ 生成利润表
                    </Alert>
                    
                    {samples.length === 0 && Object.keys(rules).length > 0 && (
                        <Alert type="warning">
                            <strong>警告：</strong>当前配置了计算规则，但尚未上传样本数据。批量计算时可能无法正确引用数据，请先在<a href="#" onClick={(e) => { e.preventDefault(); window.dispatchEvent(new CustomEvent('navigate', { detail: 'data' })); }}>样表管理</a>页面上传。
                        </Alert>
                    )}
                    
                    {isCalculating && (
                        <div style={{ marginBottom: 16 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>正在计算...</span>
                                <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{calcProgress}%</span>
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${calcProgress}%` }}></div>
                            </div>

                    )}
                    
                    {batchFiles.length === 0 ? (

                            style={{ padding: '48px 24px', margin: '20px 0' }}

                    ) : (

                                                        <td>{files.length}</td>
                                                        <td>{files.reduce((sum, f) => sum + (f.data ? Object.values(f.data.sheets)[0]?.rows?.length || 0 : 0), 0)} 行</td>

                                                        <td>-</td>
                                                    </tr>

                                            }

                                            const isExpanded = expandedShops.has(shopId);
                                            const totalRows = files.reduce((sum, f) => sum + (f.data ? Object.values(f.data.sheets)[0]?.rows?.length || 0 : 0), 0);
                                            return (
                                                <>
                                                    <tr key={shopId} style={{ background: 'var(--bg-tertiary)' }}>
                                                        <td><input type="checkbox" checked={files.every(f => f.selected)} onChange={() => toggleShopSelected(shopId)} /></td>
                                                        <td>
                                                            <button 
                                                                onClick={() => toggleShopExpand(shopId)}
                                                                style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'none', border: 'none', cursor: 'pointer', color: 'inherit' }}
                                                            >
                                                                <Icons.ChevronRight style={{ transform: isExpanded ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s' }} />
                                                                <Tag type="success">{shop?.name || '未知店铺'}</Tag>
                                                            </button>
                                                        </td>
                                                        <td>{files.length} 个文件</td>
                                                        <td>{totalRows.toLocaleString()} 行</td>
                                                        <td><Tag type="success">已识别</Tag></td>
                                                        <td>-</td>
                                                    </tr>
                                                    {isExpanded && files.map(file => (

                                                            <td><input type="checkbox" checked={file.selected} onChange={() => toggleSelected(file.id)} /></td>
                                                            <td style={{ paddingLeft: 32 }}>

                                                                {file.data ? `${Object.values(file.data.sheets)[0]?.rows?.length || 0} 行` : '-'}
                                                            </td>
                                                            <td>
                                                                <Tag type="success">已识别</Tag>
                                                            </td>
                                                            <td>
                                                                <button className="btn-link danger" onClick={() => removeFile(file.id)}>
                                                                    <Icons.Trash />

                                                            </td>

                            </div>
                            
                            {fileGroups._unmatched && (
                                <div className="card" style={{ marginBottom: 16 }}>
                                    <div className="card-header" style={{ padding: '12px 16px' }}>
                                        <div className="card-title" style={{ fontSize: 14 }}>
                                            <Icons.Warning />
                                            未识别文件（请手动分配店铺）
                                        </div>

                                    <div className="data-table-container">
                                        <table className="table">
                                            <thead>
                                                <tr>

                    {results.length > 0 && (

                            <div className="data-table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>文件名</th>
                                            <th>店铺</th>
                                            <th>状态</th>
                                            <th>计算值预览</th>
                                            <th style={{ width: 80 }}>操作</th>

                                    <tbody>
                                        {results.map((r, i) => (
                                            <tr key={i}>
                                                <td style={{ fontSize: 13 }}>{r.fileName}</td>
                                                <td>{r.shop ? <Tag type="success">{r.shop.name}</Tag> : <span style={{ color: 'var(--text-quaternary)' }}>-</span>}</td>
                                                <td>
                                                    {r.status === 'success' ? (
                                                        <Tag type="success">成功</Tag>
                                                    ) : (
                                                        <Tag type="danger">失败</Tag>

                                                </td>
                                                <td style={{ fontSize: 12, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>
                                                    {r.status === 'success' 
                                                        ? Object.entries(r.values).slice(0, 3).map(([k, v]) => `${k}: ${typeof v === 'object' ? v.val : v}`).join(', ') + (Object.keys(r.values).length > 3 ? '...' : '')
                                                        : r.error

                                                <td>

                    )}
