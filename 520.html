                                        <ul className="field-list">
                                            {parseResult.fields.map(field => (
                                                <li 
                                                    key={field.id}
                                                    className={`field-item ${selectedField?.id === field.id ? 'active' : ''}`}
                                                    onClick={() => setSelectedField(field)}
                                                >
                                                    <span className={`field-dot ${field.type === 'number' ? 'done' : ''}`}></span>
                                                    <span className="field-name">{field.name}</span>
                                                    <span className="field-cell">{field.cell}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                
                                <div className="workspace-right">
                                    <div className="card">
                                        <div className="card-header">
                                            <div className="card-title" style={{ fontSize: 14 }}>
                                                <Icons.Edit />
                                                字段配置
                                            </div>
                                        </div>
                                        <div className="card-scroll">
                                            {selectedField ? (
                                                <div>
                                                    <div className="form-item">
                                                        <label className="form-label">字段名称</label>
                                                        <input 
                                                            type="text"
                                                            className="input"
                                                            value={selectedField.name}
                                                            onChange={e => {
                                                                handleFieldNameChange(selectedField.id, e.target.value);
                                                                setSelectedField({ ...selectedField, name: e.target.value });
                                                            }}
                                                        />
                                                    </div>
                                                    <div className="form-item">
                                                        <label className="form-label">单元格位置</label>
                                                        <div style={{ 
                                                            padding: '10px 14px',
                                                            background: 'var(--bg-tertiary)',
                                                            borderRadius: 'var(--radius-md)',
                                                            fontFamily: 'var(--font-mono)',
                                                            fontWeight: 600
                                                        }}>
                                                            {selectedField.cell}
                                                        </div>
                                                    </div>
                                                    <div className="form-item">
                                                        <label className="form-label">字段类型</label>
                                                        <Tag type={selectedField.type === 'text' ? 'primary' : 'success'}>
                                                            {selectedField.type === 'text' ? '文本填充' : '数值填充'}
                                                        </Tag>
                                                    </div>
                                                    <div className="form-item">
                                                        <label className="form-label">原始值</label>
                                                        <div style={{ 
                                                            padding: '10px 14px',
                                                            background: 'var(--bg-tertiary)',
                                                            borderRadius: 'var(--radius-md)',
                                                            fontFamily: 'var(--font-mono)',
                                                            fontSize: 12
                                                        }}>
                                                            {selectedField.originalValue || '(空)'}
                                                        </div>
                                                    </div>
                                                    <div className="form-item">
                                                        <label className="form-label">匹配模式</label>
                                                        <Tag type="info">{selectedField.markerMatch}</Tag>
                                                    </div>
                                                    {selectedField.isMerged && (
                                                        <div className="form-item">
                                                            <label className="form-label">合并单元格</label>
                                                            <div style={{ 
                                                                padding: '10px 14px',
                                                                background: 'var(--warning-light)',
                                                                borderRadius: 'var(--radius-md)',
                                                                fontSize: 12,
                                                                color: 'var(--warning-dark)'
                                                            }}>
                                                                合并区域: {TemplateParser.colLetters(selectedField.mergeInfo.startCol)}{selectedField.mergeInfo.startRow + 1} 
                                                                : {TemplateParser.colLetters(selectedField.mergeInfo.endCol)}{selectedField.mergeInfo.endRow + 1}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ) : (
                                                <div className="empty" style={{ padding: '40px 20px' }}>
                                                    <div className="empty-icon">👆</div>
                                                    <div className="empty-text">选择左侧字段查看详情</div>
                                                    <div className="empty-desc">点击字段可编辑名称和查看属性</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <div className="template-footer-bar">
                        <Button onClick={() => setTemplateData(null)}>
                            <Icons.Refresh />
                            重置
                        </Button>
                        <Button type="primary" onClick={handleSaveTemplate} disabled={!templateData}>
                            <Icons.Save />
                            保存模板配置
                        </Button>
                    </div>
                </div>
            );
        };
        
        // ========== Rules Page ==========
        const RulesPage = ({ state, currentPlatform }) => {
            const { addToast } = useToast();
            const [activeField, setActiveField] = useState(null);
            const [expandedStep, setExpandedStep] = useState(null);
            const [showPreview, setShowPreview] = useState(false);
            const [previewResult, setPreviewResult] = useState(null);
            
            const platform = state.platforms.find(p => p.id === currentPlatform);
            const template = state.templates[currentPlatform];
            const savedRules = state.rules[currentPlatform] || {};
            
            const fields = template?.parseResult?.fields || [];
            
            useEffect(() => {
                if (fields.length > 0 && !activeField) {
                    setActiveField(fields[0]);
                    setExpandedStep(null);
                }
            }, [fields]);
            
            const currentRule = activeField ? savedRules[activeField.id] : null;
            
            const getStepTypeInfo = (type) => {
                const types = {
                    source: { name: '数据源', icon: <Icons.Database />, color: 'var(--primary)' },
                    filter: { name: '过滤', icon: <Icons.Filter />, color: 'var(--warning)' },
                    virtual: { name: '虚拟字段', icon: <Icons.Sparkles />, color: 'var(--purple)' },
                    join: { name: '跨表关联', icon: <Icons.Layers />, color: 'var(--info)' },
                    aggregate: { name: '聚合', icon: <Icons.Calculator />, color: 'var(--success)' },
                    formula: { name: '公式计算', icon: <Icons.Calculator />, color: 'var(--primary)' },
                    constant: { name: '常量值', icon: <Icons.FileText />, color: 'var(--text-tertiary)' },
                    text: { name: '文本处理', icon: <Icons.FileText />, color: 'var(--info)' }
                };
                return types[type] || { name: type, icon: <Icons.Settings />, color: 'var(--text-tertiary)' };
            };
            
            const addStep = (type) => {
                if (!activeField) return;
                
                const defaultConfigs = {
                    source: { table: '', column: '' },
                    filter: { column: '', op: '==', value: '' },
                    virtual: { source: '', target: '', rule: 'copy' },
                    join: { table: '', key: '', fk: '', col: '' },
                    aggregate: { column: '', func: 'sum' },
                    formula: { expr: '{val}' },
                    constant: { value: 0 },
                    text: { value: '' }
                };
                
                const newStep = {
                    id: `step_${Date.now()}`,
                    type,
                    config: defaultConfigs[type] || {}
                };
                
                const currentSteps = currentRule?.steps || [];
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: [...currentSteps, newStep]
                            }
                        }
                    }
                }));
                
                setExpandedStep(newStep.id);
                addToast('success', '添加步骤', `已添加 ${getStepTypeInfo(type).name} 步骤`);
            };
            
            const updateStepConfig = (stepId, key, value) => {
                if (!activeField || !currentRule) return;
                
                const newSteps = currentRule.steps.map(s => 
                    s.id === stepId ? { ...s, config: { ...s.config, [key]: value } } : s
                );
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
            };
            
            const deleteStep = (stepId) => {
                if (!activeField || !currentRule) return;
                
                const newSteps = currentRule.steps.filter(s => s.id !== stepId);
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: newSteps
                            }
                        }
                    }
                }));
                
                addToast('info', '删除步骤', '已删除计算步骤');
            };
            
            const moveStep = (stepId, direction) => {
                if (!activeField || !currentRule) return;
                
                const steps = [...currentRule.steps];
                const idx = steps.findIndex(s => s.id === stepId);
                if (idx === -1) return;
                
                const newIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (newIdx < 0 || newIdx >= steps.length) return;
                
                [steps[idx], steps[newIdx]] = [steps[newIdx], steps[idx]];
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps
                            }
                        }
                    }
                }));
            };
            
            const applyPreset = (preset) => {
                if (!activeField) return;
                
                Store.set(s => ({
                    ...s,
                    rules: {
                        ...s.rules,
                        [currentPlatform]: {
                            ...savedRules,
                            [activeField.id]: {
                                ...savedRules[activeField.id],
                                steps: preset.steps.map((s, i) => ({
                                    ...s,
                                    id: `step_${Date.now()}_${i}`
                                }))
                            }
                        }
                    }
                }));
                
                addToast('success', '套用模板', `已应用「${preset.name}」模板`);
            };
            
            const runPreview = () => {
                if (!activeField || !currentRule) return;
                
                const samples = state.samples[currentPlatform] || [];
                const tables = samples.map((s, i) => ({
                    id: `sample_${i}`,
                    name: s.fileName,
                    headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || [],
                    rows: s.sheets[Object.keys(s.sheets)[0]]?.rows || []
                }));
                
                const result = CalcEngine.exec(currentRule, tables);
                setPreviewResult(result);
                setShowPreview(true);
            };
            
            const renderStepConfig = (step) => {
                const samples = state.samples[currentPlatform] || [];
                const sampleTables = samples.map((s, i) => ({
                    id: `sample_${i}`,
                    name: s.fileName,
                    headers: s.sheets[Object.keys(s.sheets)[0]]?.headers || []
                }));
                
                switch (step.type) {
                    case 'source':
                        return (
                            <div className="step-config">
                                <div className="form-item">
                                    <label className="form-label">选择数据表</label>
                                    <select 
                                        className="select"
                                        value={step.config.table}
                                        onChange={e => updateStepConfig(step.id, 'table', e.target.value)}
                                    >
                                        <option value="">请选择数据表</option>
                                        {sampleTables.map(t => (
                                            <option key={t.id} value={t.id}>{t.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-item">
                                    <label className="form-label">选择列（可选）</label>
                                    <select 
                                        className="select"
                                        value={step.config.column}
                                        onChange={e => updateStepConfig(step.id, 'column', e.target.value)}
                                    >
                                        <option value="">全部列</option>
                                        {sampleTables.find(t => t.id === step.config.table)?.headers.map(h => (
                                            <option key={h} value={h}>{h}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="step-desc">
                                    <Icons.Info /> 选择计算的数据源，可以是整表或单列
                                </div>
                            </div>
                        );
                    
                    case 'filter':
                        return (
                            <div className="step-config">
                                <div className="form-item">
                                    <label className="form-label">过滤列</label>
                                    <select 
                                        className="select"
                                        value={step.config.column}
                                        onChange={e => updateStepConfig(step.id, 'column', e.target.value)}
                                    >
                                        <option value="">请选择列</option>
                                        <option value="val">当前值 (val)</option>
                                    </select>
                                </div>
                                <div className="grid-2">
                                    <div className="form-item">
                                        <label className="form-label">操作符</label>
                                        <select 
                                            className="select"
                                            value={step.config.op}
                                            onChange={e => updateStepConfig(step.id, 'op', e.target.value)}
                                        >
                                            <option value="==">等于</option>
                                            <option value="!=">不等于</option>
                                            <option value=">">大于</option>
                                            <option value="<">小于</option>
                                            <option value=">=">大于等于</option>
                                            <option value="<=">小于等于</option>
                                            <option value="contains">包含</option>
                                            <option value="notContains">不包含</option>
                                            <option value="startsWith">开头是</option>
                                            <option value="endsWith">结尾是</option>
                                            <option value="isEmpty">为空</option>
                                            <option value="notEmpty">不为空</option>
                                            <option value="regex">正则匹配</option>
                                        </select>
                                    </div>
                                    <div className="form-item">
                                        <label className="form-label">对比值</label>
                                        <input 
                                            type="text"
                                            className="input"
                                            value={step.config.value}
                                            onChange={e => updateStepConfig(step.id, 'value', e.target.value)}
                                            placeholder="输入对比值"
                                        />
                                    </div>
                                </div>
                                <div className="step-desc">
                                    <Icons.Info /> 过滤数据，只保留符合条件的行
                                </div>
                            </div>
                        );
                    
                    case 'aggregate':
                        return (
                            <div className="step-config">
                                <div className="form-item">
                                    <label className="form-label">聚合列（可选）</label>
                                    <select 
                                        className="select"
                                        value={step.config.column}
                                        onChange={e => updateStepConfig(step.id, 'column', e.target.value)}
                                    >
                                        <option value="">当前值 (val)</option>
                                    </select>
                                </div>
                                <div className="form-item">
                                    <label className="form-label">聚合函数</label>
                                    <select 
                                        className="select"
                                        value={step.config.func}
                                        onChange={e => updateStepConfig(step.id, 'func', e.target.value)}
                                    >
                                        <option value="sum">求和 (SUM)</option>
                                        <option value="avg">平均值 (AVG)</option>
                                        <option value="count">计数 (COUNT)</option>
                                        <option value="countDistinct">去重计数</option>
                                        <option value="max">最大值 (MAX)</option>
                                        <option value="min">最小值 (MIN)</option>
                                        <option value="median">中位数</option>
                                        <option value="product">乘积</option>
                                        <option value="stddev">标准差</option>
                                        <option value="variance">方差</option>
                                        <option value="mode">众数</option>
                                        <option value="first">第一个值</option>
                                        <option value="last">最后一个值</option>
                                        <option value="sumAbs">绝对值求和</option>
                                    </select>
                                </div>
                                <div className="step-desc">
                                    <Icons.Info /> 将多行数据聚合成单个结果值
                                </div>
                            </div>
                        );
                    
                    case 'formula':
                        return (
                            <div className="step-config">
                                <div className="form-item">
                                    <label className="form-label">计算公式</label>
                                    <div className="formula-editor">
                                        <input 
                                            type="text"
                                            className="input"
                                            value={step.config.expr}
                                            onChange={e => updateStepConfig(step.id, 'expr', e.target.value)}
                                            placeholder="{val} * 0.7 + 100"
                                            style={{ fontFamily: 'var(--font-mono)' }}
                                        />
                                    </div>
                                </div>
                                <div className="formula-hints">
                                    <div style={{ marginBottom: 8, fontWeight: 600 }}>语法提示：</div>
                                    {CalcEngine.getFormulaHints().map((hint, i) => (
                                        <div 
                                            key={i} 
                                            className="formula-hint-item"
                                            onClick={() => {
                                                const newExpr = step.config.expr + hint.key;
                                                updateStepConfig(step.id, 'expr', newExpr);
                                            }}
                                        >
                                            <span className="formula-hint-key">{hint.key}</span>
                                            <span>{hint.desc}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="step-desc">
                                    <Icons.Info /> 使用 {'{val}'} 引用上一步结果，支持标准JavaScript数学运算
                                </div>
                            </div>
                        );
                    
                    case 'virtual':
                        return (
                            <div className="step-config">
                                <div className="grid-2">
                                    <div className="form-item">
                                        <label className="form-label">源字段</label>
                                        <input 
                                            type="text"
                                            className="input"
                                            value={step.config.source}
                                            onChange={e => updateStepConfig(step.id, 'source', e.target.value)}
                                            placeholder="源字段名"
                                        />
                                    </div>
                                    <div className="form-item">
                                        <label className="form-label">目标字段</label>
                                        <input 
                                            type="text"
                                            className="input"
                                            value={step.config.target}
                                            onChange={e => updateStepConfig(step.id, 'target', e.target.value)}
                                            placeholder="目标字段名"
                                        />
                                    </div>
                                </div>
                                <div className="form-item">
                                    <label className="form-label">转换规则</label>
                                    <select 
                                        className="select"
                                        value={step.config.rule}
                                        onChange={e => updateStepConfig(step.id, 'rule', e.target.value)}
                                    >
                                        <option value="copy">复制</option>
                                        <option value="toNumber">转数字</option>
                                        <option value="toString">转文本</option>
                                        <option value="trim">去除空格</option>
                                        <option value="parseQty">提取数量</option>
                                        <option value="splitPlus">按+号拆分计数</option>
                                        <option value="abs">绝对值</option>
                                        <option value="round">四舍五入</option>
                                        <option value="floor">向下取整</option>
                                        <option value="ceil">向上取整</option>
                                        <option value="toFixed2">保留2位小数</option>
                                        <option value="percent">百分比转小数</option>
                                        <option value="parsePercent">解析百分比</option>
                                        <option value="formatMoney">格式化金额</option>
                                        <option value="toLowerCase">转小写</option>
                                        <option value="toUpperCase">转大写</option>
                                        <option value="length">字符串长度</option>
                                        <option value="substring">截取子串</option>
                                        <option value="replace">替换</option>
                                        <option value="concat">拼接前后缀</option>
                                        <option value="ifEmpty">空值替换</option>
                                    </select>
                                </div>
                                <div className="step-desc">
                                    <Icons.Info /> 创建虚拟字段，对数据进行转换处理
                                </div>
                            </div>
                        );
                    
                    case 'join':
                        return (
                            <div className="step-config">
                                <div className="form-item">
                                    <label className="form-label">关联数据表</label>
                                    <select 
                                        className="select"
                                        value={step.config.table}
                                        onChange={e => updateStepConfig(step.id, 'table', e.target.value)}
                                    >
                                        <option value="">请选择数据表</option>
                                        {sampleTables.map(t => (
                                            <option key={t.id} value={t.id}>{t.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="grid-2">
                                    <div className="form-item">
                                        <label className="form-label">主表关联键</label>
                                        <input 
                                            type="text"
                                            className="input"
                                            value={step.config.key}
                                            onChange={e => updateStepConfig(step.id, 'key', e.target.value)}
                                            placeholder="主表字段名"
                                        />
                                    </div>
                                    <div className="form-item">
                                        <label className="form-label">关联表外键</label>
                                        <input 
                                            type="text"
                                            className="input"
                                            value={step.config.fk}
                                            onChange={e => updateStepConfig(step.id, 'fk', e.target.value)}
                                            placeholder="关联表字段名"
                                        />
                                    </div>
                                </div>
                                <div className="form-item">
                                    <label className="form-label">取关联表列</label>
                                    <input 
                                        type="text"
                                        className="input"
                                        value={step.config.col}
                                        onChange={e => updateStepConfig(step.id, 'col', e.target.value)}
                                        placeholder="要提取的字段名"
                                    />
                                </div>
                                <div className="step-desc">
                                    <Icons.Info /> 根据关联键从另一个表中获取数据
                                </div>
                            </div>
                        );
                    
                    default:
                        return (
                            <div className="step-config">
                                <div className="step-desc">
                                    <Icons.Info /> 此步骤类型配置开发中...
                                </div>
                            </div>
                        );
                }
            };
            
            return (
                <div className="fade-in">
                    <Alert type="info">
                        <strong>配置说明：</strong>选择左侧字段，然后在右侧配置计算步骤。系统将按照步骤顺序依次计算，最终结果填入模板对应单元格。
                    </Alert>
                    
                    <div className="workspace">
                        <div className="workspace-left">
                            <div className="card">
                                <div className="card-header">
                                    <div className="card-title" style={{ fontSize: 14 }}>
                                        <Icons.Layers />
                                        模板字段
                                    </div>
                                    <span className="tag tag-default">{fields.length}</span>
                                </div>
                                <ul className="field-list">
                                    {fields.length === 0 ? (
                                        <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-tertiary)', fontSize: 13 }}>
                                            请先在模板中心上传模板
                                        </div>
                                    ) : (
                                        fields.map(field => (
                                            <li 
                                                key={field.id}
                                                className={`field-item ${activeField?.id === field.id ? 'active' : ''}`}
                                                onClick={() => setActiveField(field)}
                                            >
                                                <span className={`field-dot ${savedRules[field.id]?.steps?.length > 0 ? 'done' : ''}`}></span>
                                                <span className="field-name">{field.name}</span>
                                                <span className="field-cell">{field.cell}</span>
                                            </li>
                                        ))
                                    )}
                                </ul>
                            </div>
                        </div>
                        
                        <div className="workspace-right">
                            <div className="card">
                                <div className="card-header">
                                    <div>
                                        <div className="card-title" style={{ fontSize: 14 }}>
                                            <Icons.Calculator />
                                            {activeField ? `「${activeField.name}」计算规则` : '请选择字段'}
                                        </div>
                                        {activeField && (
                                            <div className="card-desc">
                                                单元格 {activeField.cell} · {activeField.type === 'text' ? '文本填充' : '数值填充'}
                                            </div>
                                        )}
                                    </div>
                                    {activeField && currentRule?.steps?.length > 0 && (
                                        <Button type="primary" size="sm" onClick={runPreview}>
                                            <Icons.Play />
                                            预览结果
                                        </Button>
                                    )}
                                </div>
                                
                                {activeField && (
                                    <>
                                        {currentRule?.steps?.length > 0 && (
                                            <div className="step-visual-flow">
                                                {currentRule.steps.map((step, idx) => {
                                                    const info = getStepTypeInfo(step.type);
                                                    return (
                                                        <React.Fragment key={step.id}>
                                                            <div 
                                                                className={`flow-step ${idx === expandedStep ? 'active' : ''}`}
                                                                onClick={() => setExpandedStep(expandedStep === step.id ? null : step.id)}
                                                            >
                                                                {info.icon}
                                                                <span>{idx + 1}. {info.name}</span>
                                                            </div>
                                                            {idx < currentRule.steps.length - 1 && (
                                                                <span className="flow-arrow">→</span>
                                                            )}
                                                        </React.Fragment>
                                                    );
                                                })}
                                            </div>
                                        )}
                                        
                                        <div className="steps-list">
                                            {!currentRule?.steps?.length ? (
                                                <div className="empty" style={{ padding: '40px 20px' }}>
                                                    <div className="empty-icon">🧮</div>
                                                    <div className="empty-text">暂无计算步骤</div>
                                                    <div className="empty-desc">点击下方按钮添加计算步骤</div>

                                                    const info = getStepTypeInfo(step.type);
                                                    const isExpanded = expandedStep === step.id;
                                                    
                                                    return (
                                                        <div key={step.id} className="step-card">
                                                            <div className="step-header">
                                                                <div className="step-number">{idx + 1}</div>
                                                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                                    {info.icon}
                                                                    <span className="step-title">{info.name}</span>
                                                                </div>
                                                                <div className="step-actions">
                                                                    <button 
                                                                        className="step-action-btn"
                                                                        onClick={() => moveStep(step.id, 'up')}
                                                                        disabled={idx === 0}
                                                                    >
                                                                        <Icons.MoveUp />
                                                                    </button>
                                                                    <button 
                                                                        className="step-action-btn"
                                                                        onClick={() => moveStep(step.id, 'down')}
                                                                        disabled={idx === currentRule.steps.length - 1}
                                                                    >
                                                                        <Icons.MoveDown />
                                                                    </button>
                                                                    <button 
                                                                        className="step-action-btn"
                                                                        onClick={() => setExpandedStep(isExpanded ? null : step.id)}
                                                                    >
                                                                        {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                                                                    </button>
                                                                    <button 
                                                                        className="step-action-btn danger"
                                                                        onClick={() => deleteStep(step.id)}
                                                                    >
                                                                        <Icons.Trash />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                            {isExpanded && renderStepConfig(step)}
                                                        </div>
                                                    );

                                            )}
                                        </div>
                                        
                                        <div className="preset-grid">
                                            {CalcEngine.getPresetTemplates().map(preset => (
                                                <div 
                                                    key={preset.id}
                                                    className="preset-card"
                                                    onClick={() => applyPreset(preset)}
                                                >
                                                    <div className="preset-card-title">{preset.name}</div>
                                                    <div className="preset-card-desc">{preset.desc}</div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="add-step-buttons">
                                            <div className="section-title" style={{ width: '100%', marginBottom: 0 }}>添加步骤</div>
                                            {['source', 'filter', 'virtual', 'join', 'aggregate', 'formula'].map(type => {
                                                const info = getStepTypeInfo(type);
                                                return (
                                                    <button 
                                                        key={type}
                                                        className="btn btn-default btn-sm"
                                                        onClick={() => addStep(type)}
                                                    >
                                                        {info.icon}
                                                        {info.name}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </>
                                )}
                                
                                {!activeField && (
                                    <div className="empty" style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                                        <div className="empty-icon">👆</div>
                                        <div className="empty-text">请选择左侧字段</div>
                                        <div className="empty-desc">选择字段后配置对应的计算规则</div>
                                    </div>
                                )}
                            </div>
